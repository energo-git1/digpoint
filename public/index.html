// ── LOCAL STORAGE helpers (session, theme, eso-task) ──────────
function lsGet(k){ try{var v=localStorage.getItem(k); return v?JSON.parse(v):null}catch(e){return null} }

// ── SERVER STORE helpers (analogiškai kaip geopoint) ──────────
async function sGet(k){try{var r=await fetch("/api/store/"+encodeURIComponent(k));var d=await r.json();return d.value}catch(e){return null}}
async function sSet(k,v){try{await fetch("/api/store/"+encodeURIComponent(k),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({value:v})})}catch(e){}}

// ── Vartotojai: importuojami iš Geopoint (gp-users) ──────────
// Geopoint rolių atitikimas:
//   admin    → admin
//   orderer  → orderer
//   surveyor → orderer (geodezininkai čia gali pateikti paraiškas)
//   pending  → pending
// Papildomai visada užtikrinamas kladmin admin vartotojas.
(function initUsers(){
  var gpUsers = lsGet('gp-users');
  var klUsers = lsGet('kl-users') || [];

  // Surenkame jau esančių kl vartotojų id sąrašą
  var existingIds = klUsers.map(function(u){ return u.id });

  if(gpUsers && gpUsers.length){
    var toAdd = gpUsers
      .filter(function(u){ return !existingIds.includes(u.id) })
      .map(function(u){
        var role = u.role === 'admin' ? 'admin'
                 : u.role === 'pending' ? 'pending'
                 : 'orderer'; // orderer ir surveyor → orderer
        // slaptažodis perkeliamas tik vietiniams vartotojams
        return {
          id: u.id,
          name: u.name,
          username: u.username || '',
          email: u.email || '',
          password: u.adAuth ? null : (u.password || null),
          role: role,
          adAuth: u.adAuth || false,
          mustChangePassword: u.mustChangePassword || false,
          createdAt: u.createdAt || new Date().toISOString(),
          importedFromGeopoint: true,
        };
      });
    klUsers = klUsers.concat(toAdd);
    if(toAdd.length) console.log('[KL] Importuota iš Geopoint: ' + toAdd.length + ' vartotojai');
  }

  // Užtikriname, kad kladmin visada egzistuoja
  var hasAdmin = klUsers.find(function(u){ return !u.adAuth && u.username === 'kladmin' });
  if(!hasAdmin){
    klUsers = klUsers.concat([{id:'admin1',name:'Administratorius',username:'kladmin',password:'Admin99',email:'',role:'admin',adAuth:false,mustChangePassword:false,createdAt:new Date().toISOString()}]);
  }

  lsSet('kl-users', klUsers);
})();

  try{

function FileDropZone(p){
  var _drag=useState(false);var drag=_drag[0],sDrag=_drag[1];
  var ref=useRef(null);
  function readFiles(fileList){
    Array.from(fileList).forEach(function(file){
      var reader=new FileReader();
      reader.onload=function(e){
        p.onAdd({name:file.name,size:file.size,type:file.type,data:e.target.result});
      };
      reader.readAsDataURL(file);
    });
  }
  return <div>
    <div onDragOver={function(e){e.preventDefault();sDrag(true)}} onDragLeave={function(){sDrag(false)}}
      onDrop={function(e){e.preventDefault();sDrag(false);readFiles(e.dataTransfer.files)}}
      onClick={function(){ref.current&&ref.current.click()}}
      style={{border:"2px dashed "+(drag?C.ac:C.b1),borderRadius:8,padding:"14px 12px",textAlign:"center",cursor:"pointer",background:drag?C.acD:C.bg,transition:"all .15s",marginBottom:8}}>

      <div style={{fontSize:9,color:C.t3,fontFamily:F,marginTop:2}}>PDF, DWG, DXF, JPG, PNG</div>
      <input ref={ref} type="file" multiple accept=".pdf,.dwg,.dxf,.jpg,.jpeg,.png" style={{display:"none"}} onChange={function(e){readFiles(e.target.files);e.target.value=""}}/>
    </div>
    {p.files&&p.files.length>0&&<div>
      {p.files.map(function(f,i){return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",background:C.s2,borderRadius:6,border:"1px solid "+C.b1,marginBottom:3}}>

      </div>})}
    </div>}
  </div>
}

function workDaysUntil(dateStr){
  if(!dateStr)return null;
  var today=new Date();today.setHours(0,0,0,0);
  var target=new Date(dateStr);target.setHours(0,0,0,0);
  if(target<today)return -1;
  var LTH={"01-01":1,"02-16":1,"03-11":1,"05-01":1,"06-24":1,"07-06":1,"08-15":1,"11-01":1,"11-02":1,"12-24":1,"12-25":1,"12-26":1};
  var count=0;var cur=new Date(today);
  while(cur<=target){
    var dow=cur.getDay();
    var mm=String(cur.getMonth()+1).padStart(2,"0");
    var dd=String(cur.getDate()).padStart(2,"0");
    if(dow!==0&&dow!==6&&!LTH[mm+"-"+dd])count++;
    cur=new Date(cur.getTime()+24*60*60*1000);
  }
  return count;
}

function PermitRow(p){

    if(wd>=0&&wd<=5){
      rowBg=C.ylD;rowBorder=C.yl;rowBorderW="1.5px";

  return <div onClick={p.onClick} onMouseEnter={function(){sH(true)}} onMouseLeave={function(){sH(false)}}

function ScheduleView(p){
  var now=new Date();
  var _vm=useState(now.getMonth());var viewMonth=_vm[0],sViewMonth=_vm[1];
  var _vy=useState(now.getFullYear());var viewYear=_vy[0],sViewYear=_vy[1];
  var _orgF=useState("");var orgF=_orgF[0],sOrgF=_orgF[1];
  var _stF=useState("");var stF=_stF[0],sStF=_stF[1];
  var _locF=useState("");var locF=_locF[0],sLocF=_locF[1];

  function goPrev(){if(viewMonth===0){sViewMonth(11);sViewYear(viewYear-1);}else sViewMonth(viewMonth-1);}
  function goNext(){if(viewMonth===11){sViewMonth(0);sViewYear(viewYear+1);}else sViewMonth(viewMonth+1);}

  var rangeStart=new Date(viewYear,viewMonth,1);
  var rangeEnd=new Date(viewYear,viewMonth+1,0);
  var totalDays=rangeEnd.getDate();

  // LT šventės
  var LTH={"01-01":1,"02-16":1,"03-11":1,"05-01":1,"06-24":1,"07-06":1,"08-15":1,"11-01":1,"11-02":1,"12-24":1,"12-25":1,"12-26":1};
  function isLtHoliday(d){
    var mm=String(d.getMonth()+1).padStart(2,"0");
    var dd=String(d.getDate()).padStart(2,"0");
    return !!LTH[mm+"-"+dd];
  }

  // Dienos žymės
  var DAY_LT=["S","P","A","T","K","Pn","\u0160"];
  var dayLabels=[];
  for(var di=1;di<=totalDays;di++){
    var dt=new Date(viewYear,viewMonth,di);
    var dow=dt.getDay();
    var isWeekend=dow===0||dow===6;
    var isHoliday=isLtHoliday(dt);
    var isNonWork=isWeekend||isHoliday;
    var isToday=dt.toDateString()===now.toDateString();
    dayLabels.push({
      date:di,letter:DAY_LT[dow],
      offsetPct:(di-1)/totalDays*100,
      widthPct:1/totalDays*100,
      isMonday:dow===1,isWeekend:isWeekend,isHoliday:isHoliday,
      isNonWork:isNonWork,isToday:isToday
    });
  }

  var todayPct=(now.getFullYear()===viewYear&&now.getMonth()===viewMonth)
    ?(now.getDate()-1)/totalDays*100:-1;

  // Filtravimas
  var allLocs=[...new Set(p.permits.map(function(x){return x.location||""}).filter(Boolean))].sort();
  var orgs=[...new Set(p.permits.map(function(x){return x.organization}).filter(Boolean))];
  var filtered=p.permits.filter(function(permit){
    if(orgF&&permit.organization!==orgF)return false;
    if(stF&&permit.status!==stF)return false;
    if(locF&&(permit.location||"")!==locF)return false;
    return true;
  });

  // Grupuojame pagal lokaciją
  var locMap={};
  filtered.forEach(function(permit){
    var loc=permit.location||"(vieta nenurodyta)";
    if(!locMap[loc])locMap[loc]=[];
    locMap[loc].push(permit);
  });
  var locKeys=Object.keys(locMap).sort(function(a,b){
    var aMin=locMap[a].reduce(function(m,x){return (!m||x.startDate<m)?x.startDate:m},null)||"";
    var bMin=locMap[b].reduce(function(m,x){return (!m||x.startDate<m)?x.startDate:m},null)||"";
    return aMin>bMin?1:-1;
  });

  function barStyle(permit){
    if(!permit.startDate||!permit.endDate)return null;
    var s=new Date(permit.startDate);var e=new Date(permit.endDate);
    if(s>rangeEnd||e<rangeStart)return null;
    var effS=s<rangeStart?rangeStart:s;
    var effE=e>rangeEnd?rangeEnd:e;
    var left=(effS.getDate()-1)/totalDays*100;
    var width=Math.max(0.5,(effE.getDate()-effS.getDate()+1)/totalDays*100);
    var sm=STATUS_MAP[permit.status]||STATUS_MAP["Naujas"];
    return {left:left+"%",width:width+"%",background:sm.dot,opacity:0.85};
  }

  function permitBarStyle(permit){
    if(!permit.permitValidFrom||!permit.permitValidUntil)return null;
    var s=new Date(permit.permitValidFrom);var e=new Date(permit.permitValidUntil);
    if(s>rangeEnd||e<rangeStart)return null;
    var effS=s<rangeStart?rangeStart:s;
    var effE=e>rangeEnd?rangeEnd:e;
    var left=(effS.getDate()-1)/totalDays*100;
    var width=Math.max(0.5,(effE.getDate()-effS.getDate()+1)/totalDays*100);
    var expired=new Date(permit.permitValidUntil)<now;
    var expiring=!expired&&(new Date(permit.permitValidUntil)-now)/(1000*60*60*24)<=14;
    var col=expired?C.rd:expiring?C.yl:C.gn;
    return {left:left+"%",width:width+"%",color:col};
  }

  var BAR_H=18;var PERMIT_H=7;var ROW_H=44;var LEFT_W=240;

  return <div>
    {/* Antraštė su navigacija */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
      <h2 style={{fontSize:18,fontWeight:800,color:C.tx,fontFamily:F}}>Leidimu grafikas</h2>
      <div style={{display:"flex",alignItems:"center",gap:6,background:C.s2,borderRadius:9,border:"1px solid "+C.b1,padding:"3px 6px"}}>
        <button onClick={goPrev} style={{background:"none",border:"none",color:C.t2,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>&#8249;</button>
        <span style={{fontSize:13,fontWeight:700,color:C.tx,fontFamily:F,minWidth:120,textAlign:"center"}}>
          {new Date(viewYear,viewMonth,1).toLocaleDateString("lt-LT",{month:"long",year:"numeric"})}
        </span>
        <button onClick={goNext} style={{background:"none",border:"none",color:C.t2,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>&#8250;</button>
        <button onClick={function(){sViewMonth(now.getMonth());sViewYear(now.getFullYear())}} style={{background:C.acD,border:"none",color:C.ac,cursor:"pointer",fontSize:10,padding:"3px 8px",borderRadius:5,fontFamily:F,fontWeight:600,marginLeft:2}}>Siandien</button>
      </div>
    </div>

    {/* Filtrai */}
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
      <select value={locF} onChange={function(e){sLocF(e.target.value)}} style={{padding:"5px 8px",borderRadius:7,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none",maxWidth:200}}>
        <option value="">Visi objektai</option>
        {allLocs.map(function(l){return <option key={l} value={l}>{l}</option>})}
      </select>
      <select value={orgF} onChange={function(e){sOrgF(e.target.value)}} style={{padding:"5px 8px",borderRadius:7,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none"}}>
        <option value="">Visos institucijos</option>
        {orgs.map(function(o){return <option key={o} value={o}>{o}</option>})}
      </select>
      <select value={stF} onChange={function(e){sStF(e.target.value)}} style={{padding:"5px 8px",borderRadius:7,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none"}}>
        <option value="">Visos busenos</option>
        {Object.keys(STATUS_MAP).map(function(s){return <option key={s} value={s}>{SL[s]||s}</option>})}
      </select>
    </div>

    {/* Legenda */}
    <div style={{display:"flex",gap:12,marginBottom:10,flexWrap:"wrap"}}>
      {[{c:C.ac,l:"Darbu laikotarpis"},{c:C.gn,l:"Leidimas galioja"},{c:C.yl,l:"Baigiasi (<14d.)"},{c:C.rd,l:"Nebegalioja"}].map(function(item){return <div key={item.l} style={{display:"flex",alignItems:"center",gap:5}}>
        <div style={{width:18,height:7,borderRadius:2,background:item.c,opacity:.9}}/>
        <span style={{fontSize:10,color:C.t2,fontFamily:F}}>{item.l}</span>
      </div>})}
    </div>

    {locKeys.length===0
      ?<Empty icon="&#128197;" title="Paraiskas pagal filtrus nerasta."/>
      :<div style={{background:C.s1,borderRadius:12,border:"1px solid "+C.b1,overflow:"hidden"}}>

        {/* Antraštė: Objektas + dienos */}
        <div style={{display:"flex",borderBottom:"2px solid "+C.b1,background:C.s2}}>
          <div style={{width:LEFT_W,flexShrink:0,padding:"6px 12px",fontSize:10,fontWeight:700,color:C.t3,fontFamily:F,textTransform:"uppercase",letterSpacing:1,borderRight:"1px solid "+C.b1,display:"flex",alignItems:"flex-end"}}>Objektas</div>
          <div style={{flex:1,position:"relative",overflow:"hidden"}}>
            {/* Dienų antraštė */}
            <div style={{position:"relative",height:34}}>
              {dayLabels.map(function(d,i){return <div key={i} style={{
                position:"absolute",left:d.offsetPct+"%",width:d.widthPct+"%",
                top:0,bottom:0,
                borderLeft:d.isMonday?"2px solid "+C.b2:"1px solid "+C.b1,
                background:d.isToday?C.acD:d.isNonWork?"rgba(239,68,68,.07)":"transparent",
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden",gap:1
              }}>
                <span style={{fontSize:7,fontWeight:d.isToday?800:400,color:d.isToday?C.ac:d.isNonWork?C.rd:C.t3,fontFamily:FM,lineHeight:1}}>{d.date}</span>
                <span style={{fontSize:6,color:d.isToday?C.ac:d.isNonWork?C.rd+"99":C.t3+"88",fontFamily:FM,lineHeight:1}}>{d.letter}</span>
              </div>})}
              {todayPct>=0&&<div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,width:2,background:C.ac,opacity:.9,zIndex:2}}/>}
            </div>
          </div>
        </div>

        {/* Objektų grupės */}
        {locKeys.map(function(loc,gIdx){
          var permits=locMap[loc];
          var isLastGroup=gIdx===locKeys.length-1;
          return <div key={loc} style={{borderBottom:isLastGroup?"none":"2px solid "+C.b1}}>

            {/* Objekto antraštė */}
            <div style={{display:"flex",background:"linear-gradient(90deg,"+C.acD+" 0%,"+C.s2+" 100%)",borderTop:"2px solid "+C.ac,borderBottom:"1px solid "+C.b1}}>
              <div style={{width:LEFT_W,flexShrink:0,padding:"6px 12px",borderRight:"1px solid "+C.b1,display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:12,color:C.ac}}>&#128205;</span>
                <span style={{fontSize:12,fontWeight:800,color:C.tx,fontFamily:F,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{loc}</span>
              </div>
              <div style={{flex:1,position:"relative",height:28}}>
                {dayLabels.map(function(d,i){return <div key={i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:d.widthPct+"%",background:d.isNonWork?"rgba(239,68,68,.04)":"transparent",pointerEvents:"none"}}/>})}
                {dayLabels.map(function(d,i){return <div key={"l"+i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:1,background:d.isMonday?C.b2:C.b1,opacity:d.isMonday?.4:.15,pointerEvents:"none"}}/>})}
                {todayPct>=0&&<div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,width:1,background:C.ac,opacity:.3}}/>}
              </div>
            </div>

            {/* Leidimų eilutės */}
            {permits.map(function(permit,pIdx){
              var bs=barStyle(permit);
              var ps=permitBarStyle(permit);
              var sm=STATUS_MAP[permit.status]||STATUS_MAP["Naujas"];
              var isLastRow=pIdx===permits.length-1;
              return <div key={permit.id} onClick={function(){p.onSelect(permit)}}
                style={{display:"flex",borderBottom:isLastRow?"none":"1px solid "+C.b1,cursor:"pointer",transition:"background .1s"}}
                onMouseEnter={function(e){e.currentTarget.style.background=C.s3}}
                onMouseLeave={function(e){e.currentTarget.style.background="transparent"}}>

                <div style={{width:LEFT_W,flexShrink:0,padding:"5px 12px 5px 24px",borderRight:"1px solid "+C.b1,display:"flex",flexDirection:"column",justifyContent:"center",gap:2}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    <span style={{width:6,height:6,borderRadius:"50%",background:sm.dot,flexShrink:0}}/>
                    <span style={{fontSize:10,fontWeight:700,color:C.tx,fontFamily:F}}>{permit.organization}</span>
                    <span style={{fontSize:8,color:C.t3,fontFamily:FM,background:C.bg,padding:"1px 3px",borderRadius:2}}>#{permit.id.slice(-5).toUpperCase()}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:5,paddingLeft:11}}>
                    <span style={{fontSize:9,color:C.t3,fontFamily:F}}>{SL[permit.status]||permit.status}</span>
                    {permit.permitValidUntil&&<span style={{fontSize:8,color:ps?ps.color:C.t3,fontFamily:FM,fontWeight:600}}>iki {permit.permitValidUntil}</span>}
                  </div>
                </div>

                <div style={{flex:1,position:"relative",height:ROW_H}}>
                  {dayLabels.map(function(d,i){return <div key={i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:d.widthPct+"%",background:d.isNonWork?"rgba(239,68,68,.04)":"transparent",pointerEvents:"none"}}/>})}
                  {dayLabels.map(function(d,i){return <div key={"l"+i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:1,background:d.isMonday?C.b2:C.b1,opacity:d.isMonday?.4:.15,pointerEvents:"none"}}/>})}
                  {todayPct>=0&&<div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,width:2,background:C.ac,opacity:.4,zIndex:1}}/>}
                  {bs&&<div style={Object.assign({position:"absolute",top:8,height:BAR_H,borderRadius:3,opacity:.85,zIndex:2,minWidth:3},bs)}>
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:3,overflow:"hidden"}}>
                      <span style={{fontSize:7,color:"#fff",fontFamily:FM,whiteSpace:"nowrap",textShadow:"0 1px 2px rgba(0,0,0,.5)"}}>{permit.startDate} — {permit.endDate}</span>
                    </div>
                  </div>}
                  {ps&&<div style={{position:"absolute",left:ps.left,width:ps.width,top:30,height:PERMIT_H,borderRadius:2,background:ps.color,opacity:.9,zIndex:2,minWidth:3}}/>}
                </div>
              </div>;
            })}
          </div>;
        })}
      </div>}

    {/* Statistika */}
    {p.permits.length>0&&<div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
      {(function(){
        var wp=p.permits.filter(function(x){return x.permitValidUntil});
        var exp=wp.filter(function(x){return new Date(x.permitValidUntil)<now}).length;
        var soon=wp.filter(function(x){var d=(new Date(x.permitValidUntil)-now)/(1000*60*60*24);return d>=0&&d<=14}).length;
        var ok=wp.filter(function(x){return new Date(x.permitValidUntil)>=now&&(new Date(x.permitValidUntil)-now)/(1000*60*60*24)>14}).length;
        return [{n:p.permits.length,l:"Is viso",c:C.tx},{n:wp.length,l:"Turi leidima",c:C.ac},{n:ok,l:"Galioja",c:C.gn},{n:soon,l:"Baigiasi",c:C.yl},{n:exp,l:"Pasibaige",c:C.rd}]
          .map(function(item){return <div key={item.l} style={{padding:"8px 12px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1,flex:"1 1 80px",minWidth:80}}>
            <div style={{fontSize:18,fontWeight:800,color:item.c,fontFamily:F}}>{item.n}</div>
            <div style={{fontSize:9,color:C.t2,fontFamily:F}}>{item.l}</div>
          </div>});
      })()}
    </div>}
  </div>
}

// USER MANAGEMENT
// ═════════════════════════════════════════════════════════════
function UserMgmt(p){
  var _ar=useState(null);var assignId=_ar[0],sAR=_ar[1];
  var _arole=useState("");var aRole=_arole[0],sARole=_arole[1];
  var _add=useState(false);var showAdd=_add[0],sAdd=_add[1];
  var _nn=useState("");var nn=_nn[0],sNN=_nn[1];
  var _nu=useState("");var nu=_nu[0],sNU=_nu[1];
  var _ne=useState("");var ne=_ne[0],sNE=_ne[1];
  var _np=useState("");var np=_np[0],sNP=_np[1];
  var _nr=useState("");var nr=_nr[0],sNR=_nr[1];
  var _del=useState(null);var delId=_del[0],sDel=_del[1];

  function openUser(u){sAR(u.id);sARole(u.role==="pending"?"":u.role)}
  function closeUser(){sAR(null);sARole("")}
  function doAssign(){
    if(!assignId||!aRole)return;
    p.onAssignRole(assignId,aRole);
    closeUser();
  }
  function doAdd(){
    if(!nn||!nu||!np||np.length<4||!nr)return;
    p.onAddUser({id:uid(),name:nn,username:nu,email:ne,password:np,role:nr,mustChangePassword:false,adAuth:false,createdAt:new Date().toISOString()});
    sAdd(false);sNN("");sNU("");sNE("");sNP("");sNR("");
  }

  var pending=p.users.filter(function(u){return u.role==="pending"});
  var active=p.users.filter(function(u){return u.role!=="pending"});

  return <div>
    {pending.length>0&&<div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <h2 style={{fontSize:14,fontWeight:800,color:C.tx,fontFamily:F}}>Laukia roles priskyrimo</h2>
        <span style={{background:C.rdD,color:C.rd,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10}}>{pending.length}</span>
      </div>
      {pending.map(function(u){return <div key={u.id} style={{padding:"10px 14px",background:C.s2,borderRadius:8,border:"1.5px solid "+C.yl+"44",display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
        <Av name={u.name} size={34}/>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600,color:C.tx,fontFamily:F}}>{u.name}</div>
          <div style={{fontSize:10,color:C.t3,fontFamily:F}}>{u.email||u.username}</div>
        </div>
        <Btn sm onClick={function(){openUser(u)}}>Priskirti role</Btn>
        <Btn v="danger" sm onClick={function(){sDel(u.id)}}>Istrinti</Btn>
      </div>})}
    </div>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <h2 style={{fontSize:14,fontWeight:800,color:C.tx,fontFamily:F}}>Aktyvus vartotojai</h2>
      <Btn sm onClick={function(){sAdd(true)}}>+ Sukurti vartotoja</Btn>
    </div>
    {active.map(function(u){return <div key={u.id} style={{padding:"10px 14px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1,display:"flex",alignItems:"center",gap:10,marginBottom:4,cursor:"pointer"}} onClick={function(){openUser(u)}}>
      <Av name={u.name} size={34}/>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:600,color:C.tx,fontFamily:F}}>{u.name}</div>
        <div style={{fontSize:10,color:C.t3,fontFamily:F}}>{u.email||u.username} / {ROLES[u.role]||u.role}</div>
      </div>
      {u.role!=="admin"&&<Btn v="danger" sm onClick={function(e){e.stopPropagation();sDel(u.id)}}>Istrinti</Btn>}
    </div>})}

    <Modal open={assignId!==null} onClose={closeUser} title="Pakeisti role" w={420}>
      {(function(){var u=p.users.find(function(x){return x.id===assignId});if(!u)return null;
        return <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 12px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1}}>
            <Av name={u.name} size={40}/>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.tx,fontFamily:F}}>{u.name}</div>
              <div style={{fontSize:10,color:C.t3,fontFamily:F}}>Dabar: {ROLES[u.role]||u.role}</div>
            </div>
          </div>
          <Sel label="Nauja role" value={aRole} onChange={sARole} req options={[{value:"orderer",label:"Uzsakovas"},{value:"dokumentacija",label:"Dokumentacija"},{value:"admin",label:"Administratorius"}]} ph="Pasirinkite role..."/>
          <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
            <Btn v="secondary" onClick={closeUser} sm>Atsaukti</Btn>
            <Btn onClick={doAssign} disabled={!aRole} sm>Issaugoti</Btn>
          </div>
        </div>
      })()}
    </Modal>

    <Modal open={showAdd} onClose={function(){sAdd(false)}} title="Sukurti vartotoja" w={380}>
      <Inp label="Vardas Pavarde" value={nn} onChange={sNN} req ph="Petras Petraitis"/>
      <Inp label="Prisijungimo vardas" value={nu} onChange={sNU} req ph="ppetraitis"/>
      <Inp label="El. pastas" type="email" value={ne} onChange={sNE} ph="p@imone.lt"/>
      <Inp label="Slaptazodis (min. 4 simboliai)" type="password" value={np} onChange={sNP} req ph="...."/>
      <Sel label="Role" value={nr} onChange={sNR} req options={[{value:"orderer",label:"Uzsakovas"},{value:"dokumentacija",label:"Dokumentacija"},{value:"admin",label:"Administratorius"}]}/>
      <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
        <Btn v="secondary" onClick={function(){sAdd(false)}} sm>Atsaukti</Btn>
        <Btn onClick={doAdd} disabled={!nn||!nu||!np||np.length<4||!nr} sm>Sukurti</Btn>
      </div>
    </Modal>

    <Modal open={delId!==null} onClose={function(){sDel(null)}} title="Istrinti vartotoja" w={360}>
      <p style={{fontSize:12,color:C.tx,fontFamily:F,marginBottom:16}}>Ar tikrai norite istrinti si vartotoja? Veiksmas negrizstamas.</p>
      <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
        <Btn v="secondary" onClick={function(){sDel(null)}} sm>Atsaukti</Btn>
        <Btn v="danger" onClick={function(){p.onDeleteUser(delId);sDel(null)}} sm>Istrinti</Btn>
      </div>
    </Modal>
  </div>
}

// ═════════════════════════════════════════════════════════════
// PASSWORD CHANGE
// ═════════════════════════════════════════════════════════════
function PasswordChangePage(p){
  var _o=useState("");var old=_o[0],sO=_o[1];
  var _n=useState("");var nw=_n[0],sN=_n[1];
  var _c=useState("");var conf=_c[0],sC=_c[1];
  var _err=useState("");var err=_err[0],sErr=_err[1];
  var _ok=useState(false);var ok=_ok[0],sOk=_ok[1];
  var forced=p.user.mustChangePassword;
  function doChange(){
    if(nw!==conf){sErr("Slaptazodziai nesutampa.");return}
    if(nw.length<4){sErr("Slaptazodis per trumpas.");return}
    sErr("");
    var users=lsGet('kl-users')||[];
    var u=users.find(function(x){return x.id===p.user.id});
    if(!u){sErr("Vartotojas nerastas.");return}
    if(!forced&&u.password!==old){sErr("Neteisingas dabartinis slaptazodis.");return}
    var updated=Object.assign({},u,{password:nw,mustChangePassword:false});
    lsSet('kl-users',users.map(function(x){return x.id===updated.id?updated:x}));
    sOk(true);
    if(p.onChanged)p.onChanged(Object.assign({},p.user,{mustChangePassword:false}));
  }
  return <div style={{maxWidth:400,margin:"0 auto"}}>
    <h2 style={{fontSize:18,fontWeight:800,color:C.tx,fontFamily:F,marginBottom:4}}>Slaptazodzio keitimas</h2>
    {forced&&<div style={{background:C.ylD,border:"1px solid "+C.yl+"33",borderRadius:8,padding:"8px 12px",marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:600,color:C.yl,fontFamily:F}}>Privalote pakeisti slaptazodi pries tesdami.</div>
    </div>}
    {!forced&&<Inp label="Dabartinis slaptazodis" type="password" value={old} onChange={sO} req ph="......"/>}
    <Inp label="Naujas slaptazodis" type="password" value={nw} onChange={sN} req ph="Min. 4 simboliai"/>
    <Inp label="Pakartoti nauja slaptazodi" type="password" value={conf} onChange={sC} req ph="......"/>
    {err&&<div style={{color:C.rd,fontSize:11,marginBottom:8,fontFamily:F}}>{err}</div>}
    {ok&&<div style={{color:C.gn,fontSize:11,marginBottom:8,fontFamily:F}}>Slaptazodis sekmingai pakeistas.</div>}
    <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
      {!forced&&p.onCancel&&<Btn v="secondary" onClick={p.onCancel}>Atsaukti</Btn>}
      <Btn onClick={doChange} disabled={!nw||!conf}>Pakeisti</Btn>
    </div>
  </div>
}

// DEMO VIEW
// ═════════════════════════════════════════════════════════════
function DemoView(p){
  var demoPermits=generateDemoPermits(p.user.id);
  var byOrg={};
  demoPermits.forEach(function(permit){
    if(!byOrg[permit.organization])byOrg[permit.organization]=[];
    byOrg[permit.organization].push(permit);
  });
  var byStatus={};
  demoPermits.forEach(function(permit){
    byStatus[permit.status]=(byStatus[permit.status]||0)+1;
  });

function AuthScreen(p){
  var _tab=useState("ad");var tab=_tab[0],sTab=_tab[1];

  var _lp=useState("");var lp=_lp[0],sLP=_lp[1];

  function loginAD(){
    sErr("");
    if(!un||!ap){sErr("Iveskite prisijungimo duomenis.");return}
    sLd(true);
    fetch("/api/auth/ldap",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:un,password:ap})})
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})})
      .then(function(res){
        sLd(false);
        if(!res.ok){sErr(res.d.error||"Prisijungimo klaida.");return}
        var u=res.d.user;
        // Atnaujiname vartotoją localStorage
        var users=lsGet('kl-users')||[];
        var idx=users.findIndex(function(x){return x.id===u.id});
        if(idx===-1){lsSet('kl-users',users.concat([u]))}
        else{var upd=users.slice();upd[idx]=Object.assign({},users[idx],u);lsSet('kl-users',upd)}
        p.onLogin(u);
      })
      .catch(function(){sLd(false);sErr("Serverio klaida. Bandykite dar kartą.");});
  }
  function loginLocal(){

    sLd(true);

    if(!user){sLd(false);sErr("Neteisingas vartotojo vardas arba slaptazodis.");return}
    var safeUser=Object.assign({},user);delete safeUser.password;
    sLd(false);p.onLogin(safeUser);
  }
  function tabSt(t){return{padding:"8px 20px",border:"none",borderBottom:tab===t?"2px solid "+C.ac:"2px solid transparent",background:"transparent",color:tab===t?C.ac:C.t2,fontFamily:F,fontSize:12,fontWeight:tab===t?700:500,cursor:"pointer",transition:"color .15s"}}
  return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{width:"100%",maxWidth:380,textAlign:"center"}}>
      <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#F97316,#EAB308)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px",boxShadow:"0 8px 28px rgba(249,115,22,.3)"}}>🚧</div>
      <h1 style={{fontSize:22,fontWeight:800,color:C.tx,fontFamily:F,marginBottom:2}}>Kasimo leidimai</h1>
      <p style={{color:C.t2,fontSize:11,fontFamily:F,marginBottom:20}}>Zemes darbu leidimo sistema</p>
      <div style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:12,overflow:"hidden",textAlign:"left"}}>
        <div style={{display:"flex",borderBottom:"1px solid "+C.b1,background:C.s2}}>
          <button style={tabSt("ad")} onClick={function(){sTab("ad");sErr("")}}>Active Directory</button>
          <button style={tabSt("local")} onClick={function(){sTab("local");sErr("")}}>Vietinis</button>
        </div>
        <div style={{padding:20}}>
          {tab==="ad"&&<div>
            <div style={{fontSize:11,color:C.t2,fontFamily:F,marginBottom:14}}>Prisijunkite naudodami <strong>hata.local</strong> paskyrą.</div>
            <Inp label="Vartotojo vardas" value={un} onChange={sUN} ph="vardas.pavardenis"/>
            <Inp label="Slaptazodis" type="password" value={ap} onChange={sAP} ph="........"/>
            {err&&<div style={{color:C.rd,fontSize:10,marginBottom:8,fontFamily:F,padding:"6px 8px",background:C.rdD,borderRadius:6}}>{err}</div>}
            <Btn onClick={loginAD} disabled={!un||!ap||ld} style={{width:"100%",justifyContent:"center"}}>{ld?"Jungiamasi...":"Prisijungti per AD"}</Btn>
          </div>}
          {tab==="local"&&<div>
            <div style={{fontSize:11,color:C.t2,fontFamily:F,marginBottom:14}}>Vietinio administratoriaus prisijungimas.</div>
            <Inp label="Vartotojo vardas" value={lu} onChange={sLU} ph="kladmin"/>
            <div onKeyDown={function(e){if(e.key==="Enter")loginLocal()}}><Inp label="Slaptazodis" type="password" value={lp} onChange={sLP} ph="........"/></div>
            {err&&<div style={{color:C.rd,fontSize:10,marginBottom:8,fontFamily:F,padding:"6px 8px",background:C.rdD,borderRadius:6}}>{err}</div>}
            <Btn onClick={loginLocal} disabled={!lu||!lp||ld} style={{width:"100%",justifyContent:"center"}}>{ld?"Jungiamasi...":"Prisijungti"}</Btn>
          </div>}
        </div>
      </div>
    </div>
  </div>
}

function checkExpired(arr){
  var today=fmtDate(new Date());
  var changed=false;
  var result=arr.map(function(permit){
    if(permit.status==="Gautas"&&permit.permitValidUntil&&permit.permitValidUntil<today){
      changed=true;
      return Object.assign({},permit,{status:"Nebegalioja",history:(permit.history||[]).concat([{status:"Nebegalioja",date:today,note:"Leidimo terminas pasibaige"}])});
    }
    return permit;
  });
  result.forEach(function(permit){
    if(permit.status!=="Gautas"||!permit.permitValidUntil)return;
    var wd=workDaysUntil(permit.permitValidUntil);
    if(wd!==5)return;
    var nKey="kl-notif-"+permit.id+"-5dd";
    if(lsGet(nKey))return;
    lsSet(nKey,true);
    var subj="Kasimo leidimas baigiasi per 5 d.d. - "+permit.organization;
    var rows=emailRow("Organizacija:",permit.organization)+emailRow("Paraiskas:",permit.id.slice(-5).toUpperCase())+emailRow("Galioja iki:",permit.permitValidUntil);
    var body=emailWrap("Leidimo terminas baigiasi","#EAB308","<p style=\"color:#374151;font-size:14px;margin:0 0 12px\">Leidimas baigia galioti "+permit.permitValidUntil+" &mdash; liko 5 darbo dienos.</p><table style=\"border-collapse:collapse;width:100%\">"+rows+"</table>");
    if(permit.email)sendEmail(permit.email,subj,body);
    sendEmail("uzklausos@enrgolt.eu",subj,body);
  });
  return changed?result:arr;
}

  var _theme=useState(_t0);var theme=_theme[0],setTheme=_theme[1];
  var _filter=useState("");var filter=_filter[0],setFilter=_filter[1];
  var _loaded=useState(false);var loaded=_loaded[0],sL=_loaded[1];

  useEffect(function(){(async function(){

      var u=await sGet("kl-users");
      var raw=await sGet("kl-permits");

          }
          return permit;

    }catch(e){}
    sL(true);
  })()},[]);

  useEffect(function(){

    else setView("inbox");

  function savePermits(arr){var checked=checkExpired(arr);setPermits(checked);}

  function handleLogin(u){
    setUser(u);

  }
  function deleteUser(id){
    var full=lsGet('kl-users')||[];var updated=full.filter(function(u){return u.id!==id});
    lsSet('kl-users',updated);
    setUsers(updated.map(function(x){var s=Object.assign({},x);delete s.password;return s}));
  }
  function onPasswordChanged(u){
    setUser(u);try{localStorage.setItem('kl-session',JSON.stringify(u))}catch(e){}
    if(u.role==="orderer")setView("mine");
    else if(u.role==="dokumentacija")setView("assigned");
    else setView("inbox");
  }

  if(!user)return <AuthScreen onLogin={handleLogin}/>;
  if(user.mustChangePassword)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,padding:16}}><PasswordChangePage user={user} onChanged={onPasswordChanged}/></div>;
  if(user.role==="pending")return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,padding:16}}>
    <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>&#x23F3;</div>
      <h2 style={{fontSize:20,fontWeight:800,color:C.tx,marginBottom:8}}>Laukiama patvirtinimo</h2>
      <p style={{color:C.t2,fontSize:13,marginBottom:24,lineHeight:1.6}}>Jusu paskyra sekmingai sukurta.<br/>Administratorius turi priskirti jums role.</p>
      <div style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:12,padding:16,marginBottom:20}}>
        <div style={{fontSize:11,color:C.t3,fontFamily:FM,marginBottom:4}}>Prisijunges kaip</div>
        <div style={{fontSize:13,fontWeight:700,color:C.tx}}>{user.name}</div>
        <div style={{fontSize:11,color:C.t2}}>{user.email||user.username}</div>
      </div>
      <button onClick={handleLogout} style={{background:"none",border:"1px solid "+C.b1,borderRadius:8,color:C.t2,padding:"8px 20px",cursor:"pointer",fontFamily:F,fontSize:12}}>Atsijungti</button>
    </div>
  </div>;

  var docsWorkers=users.filter(function(u){return u.role==="dokumentacija"});
  var newCount=permits.filter(function(p){return p.status==="Naujas"||p.status==="Pateikta"}).length;
  var pendingCount=users.filter(function(u){return u.role==="pending"}).length;
  var closingCount=permits.filter(function(p){return p.closingSubmitted&&!p.closingDone}).length;

  var visible=[];
  if(view==="mine") visible=permits.filter(function(p){return p.createdBy===user.id});
  else if(view==="assigned") visible=permits.filter(function(p){return p.assignedTo===user.id});
  else if(view==="inbox") visible=permits.filter(function(p){return p.status==="Naujas"||p.status==="Pateikta"});
  else if(view==="all") visible=permits.slice();
  if(filter)visible=visible.filter(function(p){return p.status===filter});
  visible=visible.slice().sort(function(a,b){return (b.createdAt||"")>(a.createdAt||"")?1:-1});

  var main=null;
  if(view==="new"&&(user.role==="orderer"||user.role==="admin")){
    main=<PermitForm user={user} onSubmit={addPermit} onCancel={function(){setView(user.role==="admin"?"inbox":"mine")}}/>;
  }else if(view==="schedule"){
    main=<ScheduleView permits={permits} users={users} onSelect={function(permit){setDetail(permit)}}/>;
  }else if(view==="demo"){
    main=<DemoView user={user} permits={permits} onLoad={function(newPermits){savePermits(permits.concat(newPermits));setView("schedule");}} onClear={function(){savePermits([]);setView("inbox");}}/>;
  }else if(view==="pwd"){
    main=<PasswordChangePage user={user} onChanged={onPasswordChanged} onCancel={function(){if(user.role==="orderer")setView("mine");else if(user.role==="dokumentacija")setView("assigned");else setView("inbox");}}/>;
  }else if(view==="users"){
    main=<UserMgmt users={users} permits={permits} onAddUser={addUser} onAssignRole={assignRole} onDeleteUser={deleteUser} onOpenPermit={function(id){var pm=permits.find(function(x){return x.id===id});if(pm){setDetail(pm);setView("all")}}}/>;
  }else{
    var titles={inbox:"Naujos paraiskas",mine:"Mano paraiskas",assigned:"Priskirtos man",all:"Visos paraiskas"};
    main=<div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:18,fontWeight:800,color:C.tx,fontFamily:F}}>{titles[view]||""}</h2>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <select value={filter} onChange={function(e){setFilter(e.target.value)}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none",cursor:"pointer"}}>
            <option value="">Visos busenos</option>
            {Object.keys(STATUS_MAP).map(function(s){return <option key={s} value={s}>{SL[s]||s}</option>})}
          </select>
          {user.role==="orderer"&&<Btn sm onClick={function(){setView("new")}}>+ Nauja</Btn>}
        </div>
      </div>
      {(view==="all"||view==="inbox")&&<div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
        {Object.keys(STATUS_MAP).map(function(s){var n=permits.filter(function(p){return p.status===s}).length;if(!n)return null;
          return <div key={s} style={{padding:"8px 10px",borderRadius:8,background:C.s2,border:"1px solid "+C.b1,flex:"1 1 80px",minWidth:80}}>
            <div style={{fontSize:16,fontWeight:800,color:C.tx,fontFamily:F}}>{n}</div>
            <div style={{fontSize:9,color:C.t2,fontFamily:F,display:"flex",alignItems:"center",gap:3}}><span style={{width:4,height:4,borderRadius:"50%",background:STATUS_MAP[s].dot}}/>{SL[s]||s}</div>
          </div>})}
      </div>}
      {visible.length===0?<Empty icon="&#128077;" title="Paraiskas nera."/>:visible.map(function(permit){return <PermitRow key={permit.id} permit={permit} users={users} onClick={function(){setDetail(permit)}}/>})}
    </div>;
  }

  return <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
    <Sidebar user={user} view={view} onNav={setView} onLogout={handleLogout} onTheme={toggleTheme} theme={theme} newCount={newCount} pendingCount={pendingCount} closingCount={closingCount}/>
    <main style={{flex:1,overflowY:"auto",padding:"24px 28px"}}>{main}</main>
    {detail&&<PermitDetail permit={detail} user={user} users={users} surveyors={docsWorkers}
      onUpdate={function(u){updatePermit(u);setDetail(u)}}
      onDelete={function(id){deletePermit(id);setDetail(null)}}
      onClose={function(){setDetail(null)}}/>}
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);</script>
</body>
</html>
