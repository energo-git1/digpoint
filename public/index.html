// ── PDF teksto nuskaitymas (investicinis nr.) ─────────────────
async function extractPdfText(dataUrl){
  try{
    var base64=dataUrl.split(',')[1];
    var binary=atob(base64);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    var pdf=await pdfjsLib.getDocument({data:bytes}).promise;
    var text='';
    for(var p=1;p<=Math.min(pdf.numPages,5);p++){
      var page=await pdf.getPage(p);
      var tc=await page.getTextContent();
      text+=tc.items.map(function(i){return i.str}).join(' ')+'\n';
    }
    return text;
  }catch(e){return ''}
}

// Skaito KIEKVIENO puslapio tekstą atskirai į masyvą
// (skirtingai nei extractPdfText, kuris nuskaito tik 5 pirmus puslapius ir sumuoja)
async function extractPdfTextByPage(dataUrl){
  try{
    var base64=dataUrl.split(',')[1];
    var binary=atob(base64);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    var pdf=await pdfjsLib.getDocument({data:bytes}).promise;
    var pages=[];
    for(var p=1;p<=pdf.numPages;p++){
      var page=await pdf.getPage(p);
      var tc=await page.getTextContent();
      pages.push(tc.items.map(function(i){return i.str}).join(' '));
    }
    return pages; // 1-mas puslapis = pages[0], etc.
  }catch(e){return []}
}

// Telia derinimo aptikimas — daugiapakopis algoritmas:
//   1) Brėžinys + derintojo vardas (geriausias variantas)
//   2) Bet koks puslapis + derintojo vardas + Telia požymiai
//   3) Bet koks puslapis + derintojo vardas (be brėžinio reikalavimo)
//   4) Fallback: brėžinys + bendrieji Telia raktažodžiai
//   5) Fallback: bet koks puslapis su SUDERINTA/PRITARTA + Telia
function findTeliaApprovalPage(pageTexts){
  var tablePage=findProjectApprovalsTablePage(pageTexts);
  if(tablePage){
    var name=extractTeliaApproverName(pageTexts[tablePage-1]);
    if(name){
      var nameRe=buildApproverNameRegex(name);
      if(nameRe){
        // 1) Brėžinys + vardas
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(isDrawingPageText(pageTexts[i])&&nameRe.test(pageTexts[i]))return i+1;
        }
        // 2) Bet koks puslapis + vardas + Telia marker
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(nameRe.test(pageTexts[i])&&hasTeliaMarkers(pageTexts[i]))return i+1;
        }
        // 3) Bet koks puslapis + tik vardas (paskutinis šansas su vardu)
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(nameRe.test(pageTexts[i]))return i+1;
        }
      }
    }
  }
  // 4) Fallback — brėžinys + Telia raktažodžiai
  for(var j=0;j<pageTexts.length;j++){
    if(j+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[j])&&hasTeliaMarkers(pageTexts[j]))return j+1;
  }
  // 5) Fallback — bet koks puslapis su SUDERINTA/PRITARTA + Telia
  for(var k=0;k<pageTexts.length;k++){
    if(k+1===tablePage)continue;
    if(hasTeliaMarkers(pageTexts[k])&&/SUDERINT|PRITART|suderint|pritart/i.test(pageTexts[k]))return k+1;
  }
  return null;
}

// PROJEKTO PRITARIMŲ LENTELĖS puslapio aptikimas — labiau lanksti paieška.
// Ieškome "PRITARIM" + "LENTEL" žodžių dalių tame pačiame puslapyje (PDF teksto
// ekstrakcija gali iškraipyti tarpus ar specialius simbolius, todėl negalima reikalauti
// griežto fraziavimo). Tikrinama tik per pirmuosius 20 puslapių (lentelė visada projekto pradžioje).
function findProjectApprovalsTablePage(pageTexts){
  var max=Math.min(pageTexts.length,20);
  for(var i=0;i<max;i++){
    var t=pageTexts[i];
    if(t&&/PRITARIM/i.test(t)&&/LENTEL/i.test(t))return i+1;
  }
  return null;
}

// Iš pritarimų lentelės teksto ištraukia VISŲ institucijų derintojų vardus.
// Naudojama projekto brėžinio aptikime — atrenkant puslapius BE jokio derintojo vardo.
function extractAllApproverNames(tableText){
  if(!tableText)return [];
  var names=[];
  var nameRegex=/\b([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]{2,})\s+([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]{3,})\b/g;
  // Žodžiai, dažnai pasitaikantys institucijų pavadinimuose ir lentelės antraštėse —
  // jeigu pirmasis ar antrasis žodis sutampa su šiuo sąrašu, tai NĖRA asmens vardas.
  var instWord=/^(Telia|Kauno|Lietuvos|UAB|AB|Energijos|Eil|Statybos|Tinklo|Vyresnioji|Vyresnysis|Vyresnis|Inžinierius|Inžinierė|Kultūros|Miesto|Infrastruktūros|Techninio|Techninės|Projektų|Dujų|paveldo|Ministerijos|Skirstymo|Operatoriaus|Vandenys|Šilumos|Energija|Pavadinimas|Asmuo|Pastabos|Specialistas|Komanda|Resursų|Lietuva|Departamento|Teritorinio|Skyriaus|Poskyrio|Administravimo|Eksplotavimo|Valdymo|Grupės|Padalinio|Savivaldybės|Savivaldybes|Administracijos)$/i;
  var match;
  while((match=nameRegex.exec(tableText))!==null){
    if(instWord.test(match[1])||instWord.test(match[2]))continue;
    names.push(match[0]);
  }
  // Pašaliname dublikatus
  var seen={};
  return names.filter(function(n){if(seen[n])return false;seen[n]=true;return true;});
}

// Iš pritarimų lentelės teksto ištraukia Telia derintojo vardą.
// Tikisi, kad PDF tekste eilutė atrodo: "...Telia Lietuva  Vytautas Stravinskas  2025-11-03..."
// Palaiko tiek pilną vardą, tiek inicialinį formatą.
function extractTeliaApproverName(tableText){
  if(!tableText)return null;
  // Lokali paieška ~250 simbolių aplink "Telia"
  var ctx=tableText.match(/(?:AB\s+)?Telia\s+Lietuva[\s\S]{0,250}/i);
  if(!ctx)return null;
  var seg=ctx[0];
  // "Vytautas Stravinskas" arba "V. Stravinskas" arba "V Stravinskas"
  var m=seg.match(/([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+\s+[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/);
  if(m&&m[1]){
    var candidate=m[1].trim();
    // Atmetame, jei vardas pateko į institucijos pavadinimą („Telia Lietuva")
    if(/^Telia\s+Lietuva$/i.test(candidate)){
      // Pereiname į pratęsimą po šio matčo
      var rest=seg.slice(seg.indexOf(candidate)+candidate.length);
      var m2=rest.match(/([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+\s+[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/);
      if(m2&&m2[1])return m2[1].trim();
      return null;
    }
    return candidate;
  }
  // Inicialinis formatas: V. Stravinskas
  var mi=seg.match(/([A-ZĄČĘĖĮŠŲŪŽ]\.\s*[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/);
  return mi&&mi[1]?mi[1].trim():null;
}

// Sudaro lankstų regex iš vardo, kuris pagauna variacijas:
//   "Vytautas Stravinskas" → pagaus ir "V. Stravinskas" / "V Stravinskas" / "VYTAUTAS STRAVINSKAS"
function buildApproverNameRegex(name){
  if(!name)return null;
  var parts=name.split(/\s+/).filter(function(p){return p.length>0});
  if(parts.length<2)return null;
  var firstRaw=parts[0].replace(/\.+$/,"");
  var lastName=parts[parts.length-1];
  var firstInitial=firstRaw.charAt(0);
  // Escape special regex chars in names (just in case)
  function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}
  var pat="("+esc(firstRaw)+"\\s+"+esc(lastName)+"|"+esc(firstInitial)+"\\.?\\s+"+esc(lastName)+")";
  return new RegExp(pat,"i");
}

// Projekto brėžinio raktažodžiai — bendras šablonas, naudojamas tiek projekto brėžinio,
// tiek Telia derinimo (kuris yra brėžinys + Telia parašas) aptikime.
//
// SVARBU: tikras brėžinio puslapis turi turėti ne tik antraštės pavadinimą,
// bet ir bent vieną iš brėžinio specifinių požymių (mastelis, koordinatės, žymėjimai).
// Tai būtina, kad nesukluptume ant informacinių sąrašų (pvz., "8. BRĖŽINIAI" turinio puslapio,
// kuriame brėžiniai tik išvardyti tekstu, bet pati grafinė schema nėra).
function isDrawingPageText(text){
  if(!text)return false;
  // Kampinis štampas — patikimiausias požymis kad tai tikras brėžinys.
  // EnergoLT projektuose štampe visada yra: PDV + Proj. + STATYTOJAS arba DOKUMENTO PAVADINIMAS
  var hasStampas=(
    /\bPDV\b/.test(text)&&/\bProj\./.test(text)&&
    (/STATYTOJAS/i.test(text)||/DOKUMENTO\s+PAVADINIMAS/i.test(text)||/UAB\s+.{0,10}EnergoLT/i.test(text))
  );
  if(hasStampas){
    // Papildoma apsauga — jei tai titulinis lapas ar sudėties žiniaraštis, atmetame
    // (jie taip pat turi štampą, bet nėra brėžiniai)
    var isNotDrawing=/PROJEKTO\s+DOKUMENTŲ\s+SUDĖTIES|PROJEKTO\s+BENDRIEJI\s+RODIKLIAI|PROJEKTO\s+PRITARIMŲ\s+LENTELĖ|AIŠKINAMOJI\s+DALIS|ŽINIARAŠTIS|KABELIŲ\s+MONTAVIMO|TEISĖS\s+AKTAI|ĮTAKOS\s+SKIRSTOMAJAM|PRINCIPIN[ĖE]\s+SCHEMA|Principin[ėe]\s+schema|PRINCIPIN[ĖE]S?\s+SCHEМ|VIZUALIZACIJ|Vizualizacij|SCHEMA\s+\d|Principin/i.test(text);
    if(!isNotDrawing)return true;
  }
  // Papildomas patikrinimas — antraštė + brėžinio specifiniai požymiai
  var titlePatterns=[
    /ELEKTROS\s+TINK[LŲU]+\s+(PLANAS|BR[ĖE][ŽZ]INYS)/i,
    /IN[ŽZ]INERINI[UŲ]\s+TINK[LŲU]+\s+(PLANAS|BR[ĖE][ŽZ]INYS)/i,
    /\b\d+[,.]?\d*\s*kV\s+(KL|kabel)\s.{0,40}plan/i,
    /kabel[iuų]\s+linij[oų]\s+plan/i,
    /(0[,.]?\d+|10|20)\s*kV\s+KL\s+plan/i,
  ];
  // Bendroji apsauga — jei puslapis yra schema ar vizualizacija, atmetame
  var isSchema=/PRINCIPIN[ĖE]|Principin[ėe]|VIZUALIZACIJ|Vizualizacij/i.test(text);
  if(isSchema)return false;
  var hasTitle=titlePatterns.some(function(re){return re.test(text)});
  var hasMastelis=/M\s*1\s*:\s*\d{2,}/i.test(text);
  var coordCount=(text.match(/[XY]\s*=\s*\d/g)||[]).length;
  var hasDrawingMarkers=/(SUTARTINIAI\s+ŽYM|kabelis\s+vamzdyje|kabelis\s+klojamas|kryptiniu\s+gręžimu|Žemės\s+sklypo\s+riba|Apsaugos\s+zon[oų])/i.test(text);
  if(hasTitle&&hasMastelis)return true;
  if(hasTitle&&coordCount>=3)return true;
  if(hasTitle&&hasDrawingMarkers)return true;
  if(hasMastelis&&coordCount>=3)return true;
  if(hasMastelis&&hasDrawingMarkers)return true;
  return false;
}

// Kauno energija parašo raktažodžiai — bendrieji (fallback'as)
function hasKauoenergijaMarkers(text){
  var markers=[
    /(?:UAB\s+|AB\s+)?[„"]?[Kk]auno\s+energija["“]?/,
    /Kauno\s+energij/i,
    /[šs]ilumos\s+tinkl/i,
    /[šs]ilumos\s+tiekim/i,
    /[šs]ilumos\s+perdavim/i,
  ];
  return markers.some(function(re){return re.test(text)});
}

// Iš pritarimų lentelės teksto ištraukia Kauno energija derintojo vardą.
// Lokali paieška ~300 simb. aplink "Kauno energij" žodį, ieškoma asmens vardas+pavardė.
function extractKauoenergijaApproverName(tableText){
  if(!tableText)return null;
  var ctx=tableText.match(/(?:AB\s+|UAB\s+)?[„"]?[Kk]auno\s+energij[a-ząčęėįšųūž]*[„"]?[\s\S]{0,300}/i);
  if(!ctx)return null;
  var seg=ctx[0];
  // Filtruojame žodžius, kurie tikrai NĖRA asmens vardas
  var instWord=/^(Kauno|Energija|Energij|Projektų|Valdymo|Skyriaus|Vyresnioji|Vyresnysis|Vyresnis|Inžinieri[eu]?|UAB|AB|Šilumos|Tinklai|Tinklų|Lietuva|Lietuvos|Pareigos|Asmuo|Pastabos|Specialist|Komanda|Padalinio)$/i;
  var matches=seg.match(/([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+\s+[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/g);
  if(matches){
    for(var i=0;i<matches.length;i++){
      var pair=matches[i].split(/\s+/);
      if(pair.length===2&&!instWord.test(pair[0])&&!instWord.test(pair[1]))return matches[i].trim();
    }
  }
  // Inicialinis formatas
  var mi=seg.match(/([A-ZĄČĘĖĮŠŲŪŽ]\.\s*[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/);
  return mi&&mi[1]?mi[1].trim():null;
}

// Kauno energija derinimo aptikimas — drawing + KE markers (vardo-pagrįstas su fallback)
function findKauoenergijaApprovalPage(pageTexts){
  var tablePage=findProjectApprovalsTablePage(pageTexts);
  if(tablePage){
    var name=extractKauoenergijaApproverName(pageTexts[tablePage-1]);
    if(name){
      var nameRe=buildApproverNameRegex(name);
      if(nameRe){
        // 1) Brėžinys + vardas
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(isDrawingPageText(pageTexts[i])&&nameRe.test(pageTexts[i]))return i+1;
        }
        // 2) Bet koks puslapis + vardas + KE marker
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(nameRe.test(pageTexts[i])&&hasKauoenergijaMarkers(pageTexts[i]))return i+1;
        }
        // 3) Bet koks puslapis + tik vardas
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(nameRe.test(pageTexts[i]))return i+1;
        }
      }
    }
  }
  // 4) Fallback — brėžinys + KE raktažodžiai
  for(var j=0;j<pageTexts.length;j++){
    if(j+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[j])&&hasKauoenergijaMarkers(pageTexts[j]))return j+1;
  }
  // 5) Fallback — bet koks puslapis su SUDERINTA/PRITARTA + KE
  for(var k=0;k<pageTexts.length;k++){
    if(k+1===tablePage)continue;
    if(hasKauoenergijaMarkers(pageTexts[k])&&/SUDERINT|PRITART|suderint|pritart/i.test(pageTexts[k]))return k+1;
  }
  return null;
}

// KAUNO VANDENYS derinimo puslapio aptikimas (5 lygių kaskada)
// ═══════════════════════════════════════════════════════════════
function hasKaunoVandenysiMarkers(text){
  var markers=[
    /Kauno\s+vandenys/i,
    /UAB\s+Kauno\s+vandenys/i,
    /kaunovandenys/i,
    /vandens\s+tiekimo/i,
    /nuotekų\s+šalinimo/i,
  ];
  return markers.some(function(re){return re.test(text)});
}

function extractKaunoVandenysiApproverName(tableText){
  var ctx=tableText.match(/(?:Kauno\s+vandenys|UAB\s+Kauno\s+vandenys)[\s\S]{0,250}/i);
  if(!ctx)return null;
  var sub=ctx[0];
  var lines=sub.split(/\n/).map(function(l){return l.trim();}).filter(function(l){return l.length>2;});
  for(var i=1;i<Math.min(lines.length,8);i++){
    var candidate=lines[i].replace(/[^A-ZĄČĘĖĮŠŲŪŽa-ząčęėįšųūž\s\-]/g,' ').trim();
    if(/^[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+\s+[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+/.test(candidate))return candidate.split(/\s+/).slice(0,2).join(' ');
  }
  return null;
}

function findKaunoVandenysiApprovalPage(pageTexts){
  var tablePage=findProjectApprovalsTablePage(pageTexts);
  if(tablePage){
    var name=extractKaunoVandenysiApproverName(pageTexts[tablePage-1]);
    if(name){
      var nameRe=buildApproverNameRegex(name);
      if(nameRe){
        // 1) Brėžinys + vardas
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(isDrawingPageText(pageTexts[i])&&nameRe.test(pageTexts[i]))return i+1;
        }
        // 2) Bet koks puslapis + vardas + KV marker
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(nameRe.test(pageTexts[i])&&hasKaunoVandenysiMarkers(pageTexts[i]))return i+1;
        }
        // 3) Bet koks puslapis + tik vardas
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(nameRe.test(pageTexts[i]))return i+1;
        }
      }
    }
  }
  // 4) Fallback — brėžinys + KV raktažodžiai
  for(var j=0;j<pageTexts.length;j++){
    if(j+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[j])&&hasKaunoVandenysiMarkers(pageTexts[j]))return j+1;
  }
  // 5) Fallback — bet koks puslapis su SUDERINTA/PRITARTA + KV
  for(var k=0;k<pageTexts.length;k++){
    if(k+1===tablePage)continue;
    if(hasKaunoVandenysiMarkers(pageTexts[k])&&/SUDERINT|PRITART|suderint|pritart/i.test(pageTexts[k]))return k+1;
  }
  return null;
}

// Ieško „BRĖŽINIAI" turinio lapo — pvz. "8. BRĖŽINIAI" su sąrašu "8.1 Inžinerinių tinklų planas"
// Grąžina puslapio numerį arba null
function findDrawingsIndexPage(pageTexts){
  for(var i=0;i<pageTexts.length;i++){
    var t=pageTexts[i];
    // Puslapis turi turėti "BRĖŽINIAI" antraštę ir bent vieną numeruotą įrašą
    if(/\bBR[ĖE][ŽZ]INIAI\b/i.test(t)&&/\b\d+[\.,]\d+\s+In[žz]/i.test(t)){
      return i+1; // 1-indexed
    }
  }
  return null;
}

// Projekto brėžinio aptikimas — daugiapakopis algoritmas:
//   0) NAUJAS: Jei rastas „BRĖŽINIAI" turinys — iš karto ieškome pirmo tinklų plano PO jo
//   1) Surenkam VISUS „švarius" brėžinio puslapius (be jokio derintojo vardo)
//   2) PIRMENYBĖ — puslapiai su „1 dalis" (trasos planas, jį Telia kasimo paraiškai reikia)
//   3) ATMETAM puslapius su „2 dalis", „3 dalis" ir t.t. (montavimo schemos, ne trasos)
//   4) Jei yra keli kandidatai — paimam paskutinį (galutinė BRĖŽINIAI skyriaus versija)
function findProjectDrawingPage(pageTexts){
  // 0) PIRMA: ieškome „BRĖŽINIAI" turinio lapo
  // Po jo pirmas tinklų planas (ne schema, ne vizualizacija) yra mūsų tikslas
  var drawingsIndexPage=findDrawingsIndexPage(pageTexts);
  if(drawingsIndexPage){
    for(var di=drawingsIndexPage;di<pageTexts.length;di++){
      var dt=pageTexts[di];
      if(isDrawingPageText(dt)&&/IN[ŽZ]INERINI[UŲ]\s+TINK[LŲU]/i.test(dt)){
        return di+1;
      }
    }
    // Jei tikslaus titulo nerado — pirmasis brėžinys po turinio
    for(var di2=drawingsIndexPage;di2<pageTexts.length;di2++){
      if(isDrawingPageText(pageTexts[di2])){
        return di2+1;
      }
    }
  }
  var tablePage=findProjectApprovalsTablePage(pageTexts);
  var allNames=tablePage?extractAllApproverNames(pageTexts[tablePage-1]):[];
  var allRes=allNames.map(buildApproverNameRegex).filter(function(re){return re!==null});
  // 1) Surenkam visus švarius brėžinio puslapius
  var cleanPages=[];
  for(var i=0;i<pageTexts.length;i++){
    if(i+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[i])&&!allRes.some(function(re){return re.test(pageTexts[i])})){
      cleanPages.push({idx:i,text:pageTexts[i]});
    }
  }
  if(cleanPages.length>0){
    // 2) Prioritetas — „1 dalis" (Telia reikia trasos plano, ne montavimo)
    var firstPart=cleanPages.filter(function(p){return /\b1\s*-?\s*[oa]?ji?\s*dalis|\b1\s*dalis\b|\b1dalis\b/i.test(p.text)});
    if(firstPart.length>0)return firstPart[firstPart.length-1].idx+1;
    // 3) Atmetam vėlesnes dalis (2, 3, 4...)
    var notLaterPart=cleanPages.filter(function(p){return !/\b[2-9]\s*-?\s*[oa]?ji?\s*dalis|\b[2-9]\s*dalis\b|\b[2-9]dalis\b/i.test(p.text)});
    if(notLaterPart.length>0)return notLaterPart[notLaterPart.length-1].idx+1;
    // 4) Visi „švarūs" turi „2 dalis" ar pan. — paimam paskutinį (mažai tikėtina situacija)
    return cleanPages[cleanPages.length-1].idx+1;
  }
  // Fallback'ai — kai nėra pritarimų lentelės arba derintojo vardų
  for(var j=pageTexts.length-1;j>=0;j--){
    if(j+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[j])&&!hasTeliaMarkers(pageTexts[j]))return j+1;
  }
  for(var k=pageTexts.length-1;k>=0;k--){
    if(k+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[k]))return k+1;
  }
  return null;
}

// Iš originalaus PDF ištraukia nurodytus puslapius (1-indexed) į naują PDF.
// Grąžina base64 string, paruoštą siuntimui kaip email priedą.
async function extractPagesToNewPdf(dataUrl,pageNumbers){
  if(!Array.isArray(pageNumbers)||pageNumbers.length===0)return null;
  if(typeof PDFLib==="undefined")return null;
  try{
    var base64=dataUrl.split(',')[1];
    var binary=atob(base64);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    var src=await PDFLib.PDFDocument.load(bytes);
    var dst=await PDFLib.PDFDocument.create();
    var totalPages=src.getPageCount();
    var indices=pageNumbers
      .map(function(n){return n-1})
      .filter(function(idx){return idx>=0&&idx<totalPages});
    if(indices.length===0)return null;
    var copied=await dst.copyPages(src,indices);
    copied.forEach(function(page){dst.addPage(page)});
    var newBytes=await dst.save();
    // Uint8Array -> base64 (chunk'ais, kad nesusimuštų į stack overflow)
    var binStr='';
    var chunkSize=8192;
    for(var k=0;k<newBytes.length;k+=chunkSize){
      binStr+=String.fromCharCode.apply(null,newBytes.subarray(k,k+chunkSize));
    }
    return btoa(binStr);
  }catch(e){console.warn("PDF puslapių išskyrimo klaida:",e);return null;}
}

// Parsina input'ą "27, 28, 29" arba "27-29" arba "27, 30-32" į puslapių masyvą
function parsePageNumbers(str){
  if(!str)return [];
  var pages=[];
  String(str).split(/[,;]/).forEach(function(part){
    part=part.trim();
    if(!part)return;
    var rangeMatch=part.match(/^(\d+)\s*[-–—]\s*(\d+)$/);
    if(rangeMatch){
      var a=parseInt(rangeMatch[1],10),b=parseInt(rangeMatch[2],10);
      if(a>0&&b>0&&a<=b)for(var i=a;i<=b;i++)pages.push(i);
    }else if(/^\d+$/.test(part)){
      pages.push(parseInt(part,10));
    }
  });
  // Pašaliname dublikatus, surūšiuojame didėjančia tvarka
  var seen={};
  return pages.filter(function(p){if(seen[p])return false;seen[p]=true;return true}).sort(function(a,b){return a-b});
}

// Formatuoja puslapių masyvą į "27, 28, 29" string'ą
function formatPageNumbers(pages){
  if(!Array.isArray(pages))return "";
  return pages.join(", ");
}

// Atgalinis suderinamumas — palaikom tiek pageNumbers (naujas), tiek pageNumber (senas)
function getAttachmentPages(src){
  if(src&&Array.isArray(src.pageNumbers))return src.pageNumbers;
  if(src&&typeof src.pageNumber==="number")return [src.pageNumber];
  return [];
}

// Gauna PDF data URL — iš atminties (jei turime) arba fetch'ina iš serverio URL.
async function getPdfDataUrl(file){
  if(file.data)return file.data;
  if(file.url){
    try{
      var r=await fetch(file.url);
      var blob=await r.blob();
      return await new Promise(function(res){
        var rd=new FileReader();
        rd.onload=function(e){res(e.target.result);};
        rd.readAsDataURL(blob);
      });
    }catch(e){return null;}
  }
  return null;
}

// Atidaro paraiškos PDF naujame naršyklės skirtuke — admin gali peržiūrėti.
function openPermitPdfInNewTab(permit){
  var pdf=(permit.files||[]).find(function(f){return f.name&&f.name.match(/\.pdf$/i)});
  if(!pdf){alert("Paraiškoje nerastas PDF failas.");return;}
  // Jei yra serverio URL — atidarome tiesiogiai
  if(pdf.url){window.open(pdf.url,'_blank');return;}
  // Fallback — iš data URL
  if(!pdf.data){alert("PDF failas nepasiekiamas.");return;}
  try{
    var arr=pdf.data.split(',');
    var bin=atob(arr[1]);
    var len=bin.length;
    var u8=new Uint8Array(len);
    for(var i=0;i<len;i++)u8[i]=bin.charCodeAt(i);
    var blob=new Blob([u8],{type:'application/pdf'});
    window.open(URL.createObjectURL(blob),'_blank');
  }catch(e){alert("Nepavyko atidaryti PDF: "+e.message);}
}

function parseLocation(text){
  // Nukerpa PDF antraštės fragmentus nuo galo (pvz. "PRO." iš "PROJEKTO...")
  function cleanLoc(val){
    if(!val)return val;
    val=val.trim().replace(/\s+/g,' ').split(/[;|]/)[0].trim();
    // Nukerpa galinį didžiųjų raidžių fragmentą (pvz. "PRO.", "PROJ", "PAV")
    val=val.replace(/\s+[A-ZĄČĘĖĮŠŲŪŽ]{2,}\.?\s*$/,'').trim();
    return val;
  }

  // Pirmas prioritetas — "Objekto adresas:" laukas
  var m=text.match(/[Oo]bjekto\s+adresas\s*:\s*([^\n]{5,120})/);
  if(m&&m[1]){var val=cleanLoc(m[1]);if(val&&val.length>5)return val;}

  // Antras prioritetas — "Statybos vieta:", "Darbų vieta:"
  var m2=text.match(/(?:[Ss]tatybos\s+(?:vieta|adresas)|[Dd]arbų\s+vieta)\s*:\s*([^\n]{5,120})/);
  if(m2&&m2[1]){var val2=cleanLoc(m2[1]);if(val2&&val2.length>5)return val2;}

  return null;
}

// Ištraukia projekto pavadinimą / objektą iš titulinio lapo:
//   1) "Projekto pavadinimas" → ta reikšmė
//   2) Jei nėra → "Objektas" + "Objekto vieta" → sudedamos
function parseProjectDescription(text){
  if(!text)return null;
  var t=text;

  // Valo pradžią (angliška etiketė pvz "/ Design name") ir pabaigą (angliškas vertimas)
  function stripEnglish(val){
    if(!val)return val;
    // 1) Pradžia: ieškome pirmo žodžio su lietuvišku diakritiku
    //    "Design name Skirstomųjų..." → pradedame nuo "Skirstomųjų"
    var ltRe=/[A-ZĄČĘĖĮŠŲŪŽa-ząčęėįšųūž]*[ąčęėįšųūžĄČĘĖĮŠŲŪŽ][A-ZĄČĘĖĮŠŲŪŽa-ząčęėįšųūž]*/;
    var ltM=val.match(ltRe);
    if(ltM&&ltM.index>0){
      var before=val.slice(0,ltM.index);
      var sp=before.lastIndexOf(' ');
      val=val.slice(sp>=0?sp+1:ltM.index);
    }
    // 2) Pabaiga: kai prasideda angliškas vertimas po lietuviško teksto
    var engStarts=['Reconstruction','Construction','Installation','Design project','Project of',
      'Modernization','Renovation','Replacement','Upgrade','The project','Electricity network'];
    for(var i=0;i<engStarts.length;i++){
      var idx=val.indexOf(engStarts[i]);
      if(idx>10){val=val.slice(0,idx).trim().replace(/[,.\s\/]+$/,'');break;}
    }
    return val.trim();
  }

  // Pagalbinė: ištraukia reikšmę po antraštės (ta pati arba kita eilutė)
  function extractAfter(re){
    var m=t.match(re);
    if(!m)return null;
    var val=(m[1]||'').trim().replace(/\s{2,}/g,' ');
    if(val.length<4){
      var idx=t.search(re);
      var rest=t.slice(idx).replace(re,'');
      var nextLine=(rest.match(/^\s*([^\n\r]{4,300})/)||[])[1]||'';
      val=nextLine.trim().replace(/\s{2,}/g,' ');
    }
    return val.length>3?stripEnglish(val):null;
  }

  // 1) Projekto pavadinimas — tik lietuviški antraštės variantai
  var pn=extractAfter(/PROJEKTO\s+PAVADINIMAS\s*[:\s]*([^\n\r]{0,300})/i)
    ||extractAfter(/Projekto\s+pavadinimas\s*[:\s]*([^\n\r]{0,300})/i);
  if(pn&&pn.length>4)return pn;

  // 2) Objektas + Objekto vieta
  var obj=extractAfter(/\bOBJEKTAS\b\s*[:\s]*([^\n\r]{0,300})/i)
    ||extractAfter(/\bObjektas\b\s*[:\s]*([^\n\r]{0,300})/i);
  var viet=extractAfter(/OBJEKTO\s+VIETA\s*[:\s]*([^\n\r]{0,200})/i)
    ||extractAfter(/Objekto\s+vieta\s*[:\s]*([^\n\r]{0,200})/i);
  if(obj&&viet)return obj+', '+viet;
  if(obj&&obj.length>4)return obj;
  return null;
}

// Telia/KE trasos auto-aptikimas iš projekto PDF.
// Per A pasirinkimą: jei nepavyksta tiksliai išskirti pradžios ir pabaigos —
// abu laukai užpildomi tuo pačiu objekto adresu, adminas patikslins per review.
// Grąžinamos sutrumpintos formos:
//   from = gatvė, namo nr. (be miesto ir savivaldybės)
//   to   = gatvė, namo nr., miestas (be savivaldybės)
function parseTeliaRoute(text){
  var patterns=[
    /STATINIO\s+ADRESAS\s*:\s*([^\n]{5,200})/,
    /OBJEKTO\s+VIETA\s*:\s*([^\n]{5,200})/,
    /[Oo]bjekto\s+adresas\s*:\s*([^\n]{5,200})/,
    /[Oo]bjekto\s+vieta\s*:\s*([^\n]{5,200})/,
    /[Ss]tatinio\s+adresas\s*:\s*([^\n]{5,200})/,
    /(?:[Ss]tatybos\s+(?:vieta|adresas)|[Dd]arbų\s+vieta)\s*:\s*([^\n]{5,200})/,
  ];
  // Greta esančių laukų pavadinimai — užtikrina, kad tarpiniai/po jų esantys tekstai būtų atkirsti
  var boundaryRe=/\s+(?:DALIS|STADIJA|TOMAS|METAI|ETAPAS|Investicinio|Investicinis|INVESTICINIS|TECHNINI[UŲ]\s+S[AĄ]LYG[UŲ]|UŽSAKOVAS|U[Žz]SAKOVAS|Klientas|PAREIGOS|STATYBOS\s+R[ŪU][ŠS]IS|STATINIO\s+KATEGORIJA|TECHNINIS\s+PROJEKTAS|DARBO\s+PROJEKTAS|PROJEKTO\s+(?:NUMERIS|RU[SŠ]IS))\s*[:.\-—]/i;
  for(var i=0;i<patterns.length;i++){
    var m=text.match(patterns[i]);
    if(m&&m[1]){
      var val=m[1].trim().replace(/\s+/g,' ').split(/[;|]/)[0].trim();
      val=val.split(boundaryRe)[0].trim();
      if(val.length>5){
        // Pašaliname savivaldybę bet kurioje vietoje (ne tik gale): ", Xxx r./m. sav."
        var noSav=val.replace(/,?\s*[A-ZĄČĘĖĮŠŲŪŽa-ząčęėįšųūž\.]+\s+(?:r|m)\.?\s*sav\.?(?=$|[\s,])/gi,"").replace(/\s+,/g,",").replace(/,\s*$/,"").trim();
        // Atskiriame į dalis pagal kablelius
        var parts=noSav.split(",").map(function(s){return s.trim()}).filter(function(s){return s.length>0});
        // pradžia = gatvė + namo nr. (pirma dalis)
        // pabaiga = gatvė + namo nr. + miestas (visos dalys be savivaldybės)
        var from=parts[0]||noSav;
        var to=noSav;
        return {from:from,to:to};
      }
    }
  }
  return null;
}

function parseMunicipalityFromPdf(text){
  var patterns=[
    /STATINIO\s+ADRESAS\s*:\s*([^\n]{5,200})/,
    /OBJEKTO\s+(?:VIETA|ADRESAS)\s*:\s*([^\n]{5,200})/,
    /[Oo]bjekto\s+(?:adresas|vieta)\s*:\s*([^\n]{5,200})/,
    /[Ss]tatinio\s+adresas\s*:\s*([^\n]{5,200})/,
  ];
  for(var i=0;i<patterns.length;i++){
    var m=text.match(patterns[i]);
    if(m&&m[1]){
      var sav=m[1].match(/([A-ZĄČĘĖĮŠŲŪŽa-ząčęėįšųūž][A-ZĄČĘĖĮŠŲŪŽa-ząčęėįšųūž\s\.]+\s+(?:r|m)\.?\s*sav\.?)/i);
      if(sav)return sav[1].trim();
    }
  }
  return null;
}

function parseInvestNo(text){
  // Ieškome TIK investicinio numerio (E1N..., pvz. E1N2612455)
  var patterns=[
    /investicinis\s+(?:nr\.?|numeris)\s*[:.\s]+([A-Za-z0-9\-\/\.]{3,30})/i,
    /inv\.?\s*nr\.?\s*[:.\s]+([A-Za-z0-9\-\/\.]{3,30})/i,
    /investicinio\s+projekto\s+nr\.?\s*[:.\s]+([A-Za-z0-9\-\/\.]{3,30})/i,
  ];
  for(var i=0;i<patterns.length;i++){
    var m=text.match(patterns[i]);
    if(m&&m[1]){
      var val=m[1].trim();
      if(/\d/.test(val))return val;
    }
  }
  return null;
}

// Aptinka projekto numerį iš PDF — formatas pvz. "26-20-TDP-E" arba "26-20-TP-E"
function parseProjectNo(text){
  if(!text)return null;
  // 1) Brėžinio žymuo iš titulinio lapo lentelės
  // "BRĖŽINIO ŽYMUO / DRAWING MARK:" — ima pirmą kodą po antraštės (trumpesnį)
  var mDM=text.match(/BR[EĖ][ŽZ]INIO\s+[ŽZ]YMUO[^:\n]{0,30}[\n\r:]+\s*([A-Z0-9][A-Z0-9_\-]{5,60})/i);
  if(!mDM)mDM=text.match(/DRAWING\s+MARK[^:\n]{0,20}[\n\r:]+\s*([A-Z0-9][A-Z0-9_\-]{5,60})/i);
  if(mDM&&mDM[1]){var dm=mDM[1].trim();if(dm.length>5)return dm;}
  // 2) RBDTD-LT/DS1/DPS1 formatas (LitGrid projektai) — tikslus, sustoja po DPS[n]-NN_NN
  var mRB=text.match(/\b(RBDTD[-\s]*LT[-\/\s]*DS\d+[-\/\s]*DPS\d+(?:[-_]\d{2}(?:[-_]\d{2})?)?)/i);
  if(mRB&&mRB[1])return mRB[1].replace(/\s+/g,"").trim();
  // 2) Po "Projekto nr." / "Statinio projekto Nr." antraštės
  // Ima tik kodą — sustoja kai prasideda žodis (5+ mažosios raidės iš eilės)
  var mLabel=text.match(/[Ss]tatinio\s+projekto\s+[Nn]r[.\s:/]{0,4}([A-Z0-9][^\n\r]{2,40})/);
  if(!mLabel)mLabel=text.match(/[Pp]rojekto\s+n[rR][.\s:]{0,3}([^\n\r,]{4,60})/);
  if(mLabel&&mLabel[1]){
    var v=mLabel[1].trim().replace(/\s{2,}/g," ");
    // Pjauname ties pirmu žodžiu kuris atrodo kaip aprašymas (5+ mažosios)
    var cut=v.search(/[a-ząčęėįšųūž]{5}/);
    if(cut>3)v=v.substring(0,cut).trim().replace(/[-_\/\s]+$/,"");
    if(v.length>3&&!/[a-ząčęėįšųūž]{5}/.test(v))return v;
  }
  // 3) Po "PROJEKTO NUMERIS" antraštės (titulinis lapas) — tarp lentelės celių
  var m1=text.match(/PROJEKTO\s+NUMERIS[\s\S]{0,50}?(\d{2}-\d{2,4}-[A-Z]{2,6}-[A-Z]{1,3})/);
  if(m1&&m1[1])return m1[1].trim();
  // 4) Dokumento žymuo formatas NN-NN-XXX-X
  var m2=text.match(/\b(\d{2}-\d{2,4}-(?:TDP|TP|PP|DP|AP)-[A-Z]{1,3})\b/);
  if(m2&&m2[1])return m2[1].trim();
  // 5) Platesnė paieška — bet ne priedų žymenų (su .B, .BSR ir pan.)
  var m3=text.match(/\b(\d{2}-\d{2,4}-[A-Z]{2,6}-[A-Z]{1,3})\b/);
  if(m3&&m3[1]&&!m3[1].includes('.'))return m3[1].trim();
  return null;
}

// ── Koordinačių pagrindu trasos aptikimas ─────────────────────
// Ištraukia LKS-94 koordinatės poras iš PDF teksto (A ir B taškai),
// konvertuoja į WGS-84 ir gauna adresus per Nominatim reverse geocoding.
// Grąžina {from, to} arba null jei nepavyko.
async function parseTrasaFromCoordinates(text){
  if(typeof proj4==="undefined")return null;
  // Ieškome X=... Y=... koordinačių porų — LKS-94 formatai:
  // "X=6082920.37\nY=495839.31" arba "X=6082920 Y=495839" arba "X=6082920,37"
  var coordRe=/X\s*=\s*([\d\s,\.]{6,12})\s*[\n\r\s,;]*Y\s*=\s*([\d\s,\.]{5,10})/gi;
  var pairs=[];
  var m;
  while((m=coordRe.exec(text))!==null){
    var x=parseFloat(m[1].replace(/\s/g,"").replace(",","."));
    var y=parseFloat(m[2].replace(/\s/g,"").replace(",","."));
    // LKS-94: X (northing) ~5900000–6400000, Y (easting) ~300000–700000
    if(x>5800000&&x<6500000&&y>200000&&y<800000){
      pairs.push({x:x,y:y});
    }
  }
  if(pairs.length<2)return null;
  // A taškas — pirmoji koordinatė, B taškas — paskutinė
  var ptA=pairs[0];
  var ptB=pairs[pairs.length-1];
  // Jei A ir B per arti (< 10m) — ta pati vieta, naudinga tik viena
  var dist=Math.sqrt(Math.pow(ptA.x-ptB.x,2)+Math.pow(ptA.y-ptB.y,2));
  if(dist<10)ptB=pairs[Math.floor(pairs.length/2)]||ptA;
  // Konvertuojame LKS-94 → WGS-84
  function lks94ToWgs84(x,y){
    try{
      // proj4: [easting, northing] = [Y, X] LKS-94
      var wgs=proj4("EPSG:3346","WGS84",[y,x]);
      return {lng:wgs[0],lat:wgs[1]};
    }catch(e){return null;}
  }
  var wgsA=lks94ToWgs84(ptA.x,ptA.y);
  var wgsB=lks94ToWgs84(ptB.x,ptB.y);
  if(!wgsA||!wgsB)return null;
  // Reverse geocoding per Nominatim
  async function reverseGeocode(lat,lng){
    try{
      var url="https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&zoom=18&addressdetails=1&accept-language=lt";
      var r=await fetch(url,{headers:{"User-Agent":"Digpoint/1.0 EnergoLT"}});
      if(!r.ok)return null;
      var d=await r.json();
      var a=d.address||{};
      // Suformuojame: gatvė + namo nr.
      var street=(a.road||a.pedestrian||a.path||"").trim();
      var house=(a.house_number||"").trim();
      var city=(a.city||a.town||a.village||a.municipality||"").trim();
      if(!street)return null;
      return {short:street+(house?" "+house:""), full:street+(house?" "+house:"")+(city?", "+city:"")};
    }catch(e){return null;}
  }
  var [addrA,addrB]=await Promise.all([
    reverseGeocode(wgsA.lat,wgsA.lng),
    reverseGeocode(wgsB.lat,wgsB.lng)
  ]);
  if(!addrA&&!addrB)return null;
  return {
    from:addrA?addrA.short:(addrB?addrB.short:""),
    to:addrB?addrB.full:(addrA?addrA.full:""),
    method:"koordinatės"
  };
}

function FileDropZone(p){
  var _drag=useState(false);var drag=_drag[0],sDrag=_drag[1];
  var _uploading=useState(false);var uploading=_uploading[0],sUploading=_uploading[1];
  var ref=useRef(null);
  function readFiles(fileList){
    Array.from(fileList).forEach(function(file){
      // Įkeliame failą į serverį per /api/upload, DB saugome tik metaduomenis + data URL PDF aptikimui
      var reader=new FileReader();
      reader.onload=function(e){
        var dataUrl=e.target.result;
        // Siunčiame į serverį
        sUploading(true);
        var fd=new FormData();fd.append("file",file);
        fetch("/api/upload",{method:"POST",body:fd})
          .then(function(r){return r.json();})
          .then(function(d){
            sUploading(false);
            if(d.url){
              // Saugome ir serverio URL, ir data (tik PDF'ams reikalinga PDF.js analizei)
              // data išvalomos iš DB objekto prieš saugant — žr. addPermit stripping
              p.onAdd({name:file.name,size:file.size,type:file.type,url:d.url,filename:d.filename,data:dataUrl});
            }else{
              // Fallback jei upload nepavyko — saugome tik lokaliai
              p.onAdd({name:file.name,size:file.size,type:file.type,data:dataUrl});
            }
          })
          .catch(function(){
            sUploading(false);
            p.onAdd({name:file.name,size:file.size,type:file.type,data:dataUrl});
          });
      };
      reader.readAsDataURL(file);
    });
  }
  return <div>
    <div onDragOver={function(e){e.preventDefault();sDrag(true)}} onDragLeave={function(){sDrag(false)}}
      onDrop={function(e){e.preventDefault();sDrag(false);readFiles(e.dataTransfer.files)}}
      onClick={function(){ref.current&&ref.current.click()}}
      style={{border:"2px dashed "+(drag?C.ac:C.b1),borderRadius:8,padding:"14px 12px",textAlign:"center",cursor:"pointer",background:drag?C.acD:C.bg,transition:"all .15s",marginBottom:8}}>
      <div style={{fontSize:20,marginBottom:4}}>📎</div>
      <div style={{fontSize:11,color:C.t2,fontFamily:F}}>Vilkite failus arba <span style={{color:C.ac,fontWeight:700}}>spauskite cia</span></div>
      <div style={{fontSize:9,color:C.t3,fontFamily:F,marginTop:2}}>PDF, DWG, DXF, JPG, PNG</div>
      <input ref={ref} type="file" multiple accept=".pdf,.dwg,.dxf,.jpg,.jpeg,.png" style={{display:"none"}} onChange={function(e){readFiles(e.target.files);e.target.value=""}}/>
    </div>
    {p.files&&p.files.length>0&&<div>
      {p.files.map(function(f,i){return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",background:C.s2,borderRadius:6,border:"1px solid "+C.b1,marginBottom:3}}>
        <span style={{fontSize:14}}>{f.name.match(/\.pdf$/i)?"📄":f.name.match(/\.(jpg|jpeg|png)$/i)?"🖼️":"📐"}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:C.tx,fontFamily:F,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
          <div style={{fontSize:9,color:C.t3,fontFamily:FM}}>{fmtSize(f.size)}</div>
        </div>
        <button onClick={function(){p.onRemove(i)}} style={{background:"none",border:"none",color:C.rd,cursor:"pointer",fontSize:14,padding:"0 2px",lineHeight:1}}>×</button>
      </div>})}
    </div>}
  </div>
}

    </div>}
    {/* Darbų laikotarpis — tik Savivaldybei (ESO, Telia, KE turi atskirus laukus) */}
    {hasSav&&<div style={{background:C.s2,borderRadius:12,border:"1px solid "+C.b1,padding:16,marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:C.t2,marginBottom:10,fontFamily:F,textTransform:"uppercase",letterSpacing:1}}>Darbų laikotarpis</div>
      <div style={{display:"flex",gap:12}}>
        <div style={{flex:1}}><Inp label="Pradžia" type="date" value={start} onChange={sStart} req/></div>
        <div style={{flex:1}}><Inp label="Pabaiga" type="date" value={end} onChange={sEnd} req/></div>
      </div>
      {start&&end&&end<start&&<div style={{color:C.rd,fontSize:11,marginTop:-8,fontFamily:F}}>Pabaiga negali būti ankstesnė.</div>}
    </div>}
    <div style={{background:C.s2,borderRadius:12,border:"1px solid "+(orgs.length>0&&files.filter(function(f){return f.name&&f.name.match(/\.pdf$/i)}).length===0?C.rd:C.b1),padding:16,marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>

        {orgs.length>0&&<div style={{fontSize:11,fontWeight:700,color:C.rd,fontFamily:F}}>Prideti pilna projekta PDF</div>}
      </div>
      <FileDropZone files={files} onAdd={addFile} onRemove={removeFile}/>
    </div>
    {(isESO||hasSav)&&<div style={{background:C.s2,borderRadius:12,border:"1px solid "+C.b1,padding:16,marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,color:C.t2,marginBottom:10,fontFamily:F,textTransform:"uppercase",letterSpacing:1}}>Objekto vieta / adresas</div>
      <Inp label="Adresas" value={esoLoc} onChange={sEsoLoc} ph="Pvz.: Gedimino g. 5, Kaunas"/>
      {!esoLoc&&<div style={{fontSize:10,color:C.yl,fontFamily:F,marginTop:-6,marginBottom:4}}>⚠️ Adresas tuščias — paprastai užpildomas automatiškai iš PDF. Jei ne — įveskite rankiniu būdu.</div>}

    <Inp label="Papildomas aprasas (neprivaloma)" value={desc} onChange={sDesc} ml rows={3} ph="Papildoma informacija apie darbus..."/>

      {p.onCancel&&<Btn v="secondary" onClick={p.onCancel} disabled={submitting}>Atsaukti</Btn>}
      {p.onMore&&<Btn v="secondary" onClick={submitAndMore} disabled={!ok||submitting} title="Pateikti ir sukurti papildomą paraišką tam pačiam užsakovui">
        📋 Papildoma
      </Btn>}
      {batchPdfs.length>=2&&<Btn v="secondary" onClick={submitBatch} disabled={!ok||submitting} title={"Kiekvienam PDF sukurti atskirą paraišką ("+batchPdfs.length+" vnt.)"}>
        🗂️ Po paraišką ({batchPdfs.length})
      </Btn>}
      <Btn onClick={submit} disabled={!ok||submitting}>{submitting?"Siunčiama...":"Pateikti paraiskas"}</Btn>
    </div>
  </div>
}

// ESO AUTOMATIZAVIMO MYGTUKAS
// Saugo užduotį į localStorage ir rodo instrukciją Cowork naudotojui
// ═════════════════════════════════════════════════════════════
var ESO_EMAIL = "uzklausos@energolt.eu";
var ESO_COMPANY = "EnergoLT";
var ESO_URL = "https://www.eso.lt/aktualios-formos/kasimo-darbai/30";
var SAV_URL = "https://kasimai.kaunas.lt/mano-prasymai/";

function EsoSubmitBtn(p){
  var o=p.permit;
  var _st=useState("idle");var st=_st[0],sSt=_st[1]; // idle | saving | ready

  var pdfFiles=(o.files||[]).filter(function(f){return f.name&&f.name.match(/\.pdf$/i)});
  var hasPdf=pdfFiles.length>0;
  var projectLabel=(o.location||"")+(o.investNo?" (inv. nr. "+o.investNo+")":"");

  function _sendNotificationEmail(){
    if(o.email){
      var subject="\uD83D\uDEA7 Kasimo leidimas"+(o.investNo?" "+o.investNo:"")+(o.location?" — "+o.location:"")+" | AB ESO";
      var body='<p style="color:#374151;font-size:14px;margin-bottom:16px">Gerb. <strong>'+o.manager+'</strong>,<br><br>informuojame, kad Jūsų kasimo leidimo paraiška buvo pateikta AB ESO ir šiuo metu laukia patvirtinimo. Sutikimas bus išsiųstas adresu <strong>'+ESO_EMAIL+'</strong>.</p>'
        +'<table style="border-collapse:collapse;width:100%">'
        +emailRow("Objekto adresas:",o.location||"-")
        +(o.investNo?emailRow("Investicinis nr.:",o.investNo):"")
        +emailRow("Institucija:","AB ESO")
        +emailRow("Darbų vadovas:",o.manager||"-")
        +emailRow("Tel. nr.:",o.managerPhone||"-")
        +emailRow("Darbų laikotarpis:",(o.startDate||"-")+" \u2013 "+(o.endDate||"-"))
        +emailRow("Pateikta:",new Date().toLocaleDateString("lt-LT",{year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"}))
        +'</table>'
        +'<p style="color:#6B7280;font-size:12px;margin-top:16px">Gavus ESO sutikimą, būsite informuoti papildomu el. laišku.</p>';
      var html=emailWrap("Paraiška pateikta AB ESO","#F97316",body);
      sendEmail(o.email,subject,html);
    }
  }

  async function prepareTask(){
    sSt("saving");
    // _sendNotificationEmail() čia NEBEIŠSIUNČIAMA — pranešimas eis kai IMAP gaus ESO leidimą (sendPateiktaNotification)
    var orgs=o.organizations&&o.organizations.length>0?o.organizations:(o.organization?[o.organization]:[]);
    var hasTelia=orgs.indexOf("Telia, Kaunas")!==-1;
    var hasKE=orgs.indexOf("Kauno energija")!==-1;

    // 1) Siunčiame Telia laišką automatiškai — TIK jei dar neišsiųstas ir puslapiai parinkti be įspėjimų
    if(hasTelia&&o.pendingEmail&&!o.pendingEmail.cancelled){
      var teliaWarnings=(o.pendingEmail.warnings||[]);
      var teliaIncomplete=teliaWarnings.some(function(w){return /derinimo\s+puslapis.*nerastas|puslapis.*nerastas/i.test(w);});
      if(teliaIncomplete){
        alert("⚠️ Telia laiškas nepasiruošęs — Telia derinimo puslapis nerastas automatiškai.\n\nEikite į Telia skyrių, rankiniu būdu pasirinkite puslapius ir išsiųskite, tada spauskite Pateikti ESO.");
        sSt("idle");return;
      }
      try{
        // Naudojame rankiniu būdu pasirinktus puslapius jei jie nustatyti
        var existingSrcs=o.pendingEmail.attachmentSources||[];
        var permitWithTelia=existingSrcs.length>0?o:(await preparePendingTeliaEmail(o,null));
        await approveAndSendTelia(permitWithTelia);
      }catch(e){console.warn("[Auto] Telia laiško siuntimas nepavyko:",e.message);}
    } else if(hasTelia&&!o.pendingEmail){
      console.log("[ESO] Telia jau išsiųstas rankiniu būdu — praleidžiama.");
    }

    // 2) Siunčiame KE laišką automatiškai — TIK jei dar neišsiųstas (pendingKauoenergijaEmail != null)
    if(hasKE&&o.pendingKauoenergijaEmail){
      try{
        var existingKESrcs=(o.pendingKauoenergijaEmail.attachmentSources||[]);
        var kePermit;
        if(existingKESrcs.length>0){
          // Vartotojas jau parinko puslapius rankiniu būdu
          kePermit=o;
          console.log("[ESO] KE: naudojami rankiniu būdu parinkti puslapiai ("+existingKESrcs.length+" šaltiniai)");
        }else{
          var pageTextsKE=null;
          var pdfFileKE=(o.files||[]).find(function(f){return f.name&&f.name.match(/\.pdf$/i)});
          if(pdfFileKE){try{var _pdKE=await getPdfDataUrl(pdfFileKE);if(_pdKE)pageTextsKE=await extractPdfTextByPage(_pdKE);}catch(_){}}
          var keEmailObj=await preparePendingKauoenergijaEmail(o,pageTextsKE);
          kePermit=Object.assign({},o,{pendingKauoenergijaEmail:keEmailObj});
          console.log("[ESO] KE: naudojama auto-detekcija");
        }
        await approveAndSendKauoenergija(kePermit);
      }catch(e){console.warn("[Auto] KE laiško siuntimas nepavyko:",e.message);}
    } else if(hasKE&&!o.pendingKauoenergijaEmail){
      console.log("[ESO] KE jau išsiųstas rankiniu būdu — praleidžiama.");
    }

    // 3) Išsaugome ESO užduotį
    var today=new Date();
    var plus3=new Date(today);plus3.setMonth(plus3.getMonth()+3);
    var esoStart=o.startDate||fmtDate(today);
    var esoEnd=o.endDate||fmtDate(plus3);
    var task={
      permitId:o.id,
      manager:o.manager,
      managerPhone:o.managerPhone,
      location:o.location,
      startDate:esoStart,
      endDate:esoEnd,
      company:ESO_COMPANY,
      email:ESO_EMAIL,
      url:ESO_URL,
      description:o.description||"",
      investNo:o.investNo||"",
      municipality:(function(loc){
        if(!loc)return'';
        var m=loc.match(/[^\s,\.]+(?:\s+[^\s,\.]+)?\s+[rm]\.\s*sav\./i);
        if(m)return m[0].trim().replace(/\s+/g,' ');
        var m2=loc.match(/[^\s,\.]+\s+sav\./i);
        if(m2)return m2[0].trim();
        return'';
      })(o.location),
      files:pdfFiles.map(function(f){return {name:f.name,size:f.size,url:f.url||null,filename:f.filename||null}}),
      createdAt:new Date().toISOString(),
      status:"pending"
    };
    var existing=await sGet('kl-eso-tasks')||[];
    var filtered=existing.filter(function(t){return t.permitId!==o.id});
    var tasks=filtered.concat([task]);
    await sSet('kl-eso-tasks',tasks);

    // 4) Atidarome ESO svetainę su duomenimis URL hash (#dp=...) — veikia ir be Tampermonkey
    var _esoTaskData={manager:o.manager,managerPhone:o.managerPhone,email:ESO_EMAIL,
      location:o.location,startDate:esoStart,endDate:esoEnd,investNo:o.investNo||""};
    var _esoHash="dp="+btoa(unescape(encodeURIComponent(JSON.stringify(_esoTaskData))));
    window.open('https://www.eso.lt/aktualios-formos/kasimo-darbai/30#'+_esoHash,'_blank');

    sSt("ready");

  }

  // Bookmarklet kodas (nuskaito duomenis iš URL hash ir užpildo Angular formą)
  var _bm="javascript:(function(){var m=location.hash.match(/dp=([A-Za-z0-9+\\/=]+)/);if(!m){alert('Nera duomenu! Atidarykite is Digpoint.');return;}var t=JSON.parse(decodeURIComponent(escape(atob(m[1]))));var el=document.querySelector('input[name=\"obj_address\"]');if(!el){alert('Spauskite ESO rangovas Toliau ir pakartokite!');return;}var s=angular.element(el).scope();while(s&&!s.postData)s=s.$parent;if(!s){alert('Forma nerasta');return;}var ph=(t.managerPhone||'').replace(/^\\+370/,'').replace(/\\s/g,'');s.$apply(function(){s.postData.legal_company_name='EnergoLT';s.postData.legal_manager_name=t.manager||'';s.postData.legal_manager_phone=ph;s.postData.acceptance_email=t.email||'';s.postData.obj_address=t.location||'';s.postData.excavation_purpose='Elektros tinklų įrengimas';s.postData.excavation_start=t.startDate||'';s.postData.excavation_end=t.endDate||'';s.postData.excavation_link='';s.postData.technical_eso_investment_nr=t.investNo||'';s.postData.agree_to_terms=true;});var sel=document.querySelector('select#obj_municipality');if(sel){var o=Array.from(sel.options).find(function(o){return o.text.indexOf('Kauno m')!==-1;});if(o)s.$apply(function(){s.postData.obj_municipality=o.value;});}var cb=document.querySelector('input#terms');if(cb&&!cb.checked)cb.click();})();";

  return <div style={{marginBottom:12}}>
    <div style={{background:"#FF6B2B18",border:"1px solid #FF6B2B44",borderRadius:8,padding:"10px 12px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <span style={{fontSize:16}}>🌐</span>
        <div style={{fontSize:12,fontWeight:700,color:"#FF6B2B",fontFamily:F}}>AB ESO Automatinis pateikimas</div>
      </div>
      {st==="idle"&&<div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        <Btn onClick={prepareTask} sm style={{background:"#FF6B2B",color:"#fff",border:"none"}}>
          🚀 Pateikti ESO
        </Btn>
        {hasPdf&&<span style={{fontSize:9,color:C.t3,fontFamily:FM}}>{pdfFiles.length} PDF</span>}
        {!hasPdf&&<span style={{fontSize:9,color:C.yl,fontFamily:FM}}>⚠️ Nėra PDF</span>}
      </div>}
      {st==="saving"&&<div style={{fontSize:10,color:C.t2,fontFamily:F}}>⏳ Ruošiama užduotis...</div>}
      {st==="ready"&&<div>
        <div style={{fontSize:10,color:C.gn,fontFamily:FM,marginBottom:4}}>✅ ESO forma atidaryta naujame skirtuke</div>
        <div style={{fontSize:9,color:C.t2,fontFamily:F}}>Tampermonkey skriptas užpildo formą automatiškai.</div>
      </div>}
    </div>
  </div>
}

// Nustato LitGrid regiona pagal adresa
function getLitgridRegion(locationStr){
  var s=(locationStr||'').toLowerCase()
    .replace(/š/g,'s').replace(/ž/g,'z').replace(/č/g,'c')
    .replace(/ė/g,'e').replace(/ę/g,'e').replace(/ū/g,'u')
    .replace(/ų/g,'u').replace(/į/g,'i').replace(/ą/g,'a');
  if(/kaunas|kauno|jonava|jonavos|kaisiadory|kaisiadoriu|kedainiai|kedainiu|prienai|prienu|raseiniai|raseiniu|sakiai|sakiu/.test(s))return'Pietų';
  if(/alytus|alytaus|druskininkai|druskininkų|lazdijai|lazdiju|varena|varenos/.test(s))return'Pietų';
  if(/marijampole|marijampoles|kalvarija|kalvarijos|kazlu ruda|vilkaviskis|vilkaviskio/.test(s))return'Pietų';
  if(/vilnius|vilniaus|elektrena|elektrenu|salcininkai|salcininku|svencionys|svencionu|trakai|traku|ukmerge|ukmerges/.test(s))return'Rytų';
  if(/utena|utenos|anyksciai|anyksciu|ignalina|ignalinos|moletai|moletu|visaginas|visagino|zarasai|zarasu/.test(s))return'Rytų';
  if(/siauliai|siauli[uo]|akmene|akmen[eė]s|joniskis|joniskio|kelme|kelmes|pakruojis|pakruojo|radviliskis|radviliskio/.test(s))return'Šiaurės';
  if(/panevezys|paneveziu|birzai|birzu|kupiskis|kupiski[uo]|pasvalys|pasvalio|rokiskis|rokiski[uo]/.test(s))return'Šiaurės';
  if(/klaipeda|klaipedos|neringa|neringos|palanga|palangos|skuodas|skuodo/.test(s))return'Vakarų';
  if(/taurage|taurages|jurbarkas|jurbarko|silale|silales|pagegia[iu]/.test(s))return'Vakarų';
  if(/telsiai|telsiu|mazeikiai|mazeikiu|plunge|plunges|rietavas|rietavo/.test(s))return'Vakarų';
  return'Pietų';
}

// Datas YYYY-MM-DD pakeičia į YYYY.MM.DD formatą (kabamasis intervalas su brūkšniu)
function fmtDateDots(d){
  if(!d)return '';
  return String(d).replace(/-/g,'.');
}
// Lietuviska data: "2026 m. gegužes 28 d."
var LT_MONTHS_GEN=['sausio','vasario','kovo','balandžio','gegužės','birželio','liepos','rugpjūčio','rugsėjo','spalio','lapkričio','gruodžio'];
function fmtDateLT(d){
  if(!d)return '';
  var parts=String(d).split('-');
  if(parts.length<3)return d;
  var y=parts[0],m=parseInt(parts[1],10)-1,day=parseInt(parts[2],10);
  return y+' m. '+LT_MONTHS_GEN[m]+' '+day+' d.';
}
// Ištraukia vietą (adresą) iš projekto brėžinio titulinio lapo
// Ieško "VIETA/ LOCATION" arba "VIETA LOCATION" lentelės celės reikšmės
function parseLocationFromDrawing(text){
  if(!text)return null;
  // "VIETA/ LOCATION" arba "VIETA LOCATION" po kurio eina vietos tekstas
  var m=text.match(/VIETA[\/\s]+LOCATION\s+([A-ZĄČĘĖĮŠŲŪŽ][^\n\r]{3,80})/i);
  if(m&&m[1]){
    var v=m[1].trim().replace(/\s{2,}/g,' ');
    // Pjauname ties sekančia didžiąja antraštės dalimi (pvz. "PROJEKTO DALIES")
    var cut=v.search(/\b[A-ZĄČĘĖĮŠŲŪŽ]{4,}\s+[A-ZĄČĘĖĮŠŲŪŽ]{4,}/);
    if(cut>3)v=v.substring(0,cut).trim();
    if(v.length>3)return v;
  }
  return null;
}

function fmtDateRangeDots(start,end){
  var sd=start?fmtDateDots(start):'';
  var ed=end?fmtDateDots(end):'';
  if(sd&&ed)return sd+'-'+ed;
  return sd||ed||'';
}

// Telia paraiškos paruošimas review'ui — aptinka PDF puslapius ir įspėja apie trūkumus.
// Grąžina permit objektą su pendingEmail (laiško peržiūra + priedų metaduomenys + įspėjimai).
// Faktiniai PDF priedų baitai NEsaugomi DB — generuojami iš naujo siuntimo metu (saugant DB dydį).
async function preparePendingTeliaEmail(permit){
  var attachmentSources=[];
  var warnings=[];
  var detectionInfo=null;
  var pdfFile=(permit.files||[]).find(function(f){return f.name&&f.name.match(/\.pdf$/i)});
  var pdfData=pdfFile?await getPdfDataUrl(pdfFile):null;
  if(pdfFile&&pdfData){
    try{
      var pageTexts=await extractPdfTextByPage(pdfData);
      // 🆕 2-as sluoksnis: jei trasa nebuvo aptikta formoje (pirmi 5 psl.),
      // bandome dar kartą iš pilno PDF teksto. Jokio papildomo I/O — pageTexts jau atmintyje.
      if(!permit.teliaRouteFrom||!permit.teliaRouteTo){
        var fullText=pageTexts.join("\n");
        var foundRoute=parseTeliaRoute(fullText);
        if(foundRoute){
          permit=Object.assign({},permit,{teliaRouteFrom:foundRoute.from,teliaRouteTo:foundRoute.to});
        }else{
          // Fallback — koordinačių pagrindu
          try{
            var coordRoute=await parseTrasaFromCoordinates(fullText);
            if(coordRoute){
              permit=Object.assign({},permit,{teliaRouteFrom:coordRoute.from,teliaRouteTo:coordRoute.to});
              detectionInfo=Object.assign({},detectionInfo||{},{trasaMetodas:"koordinatės"});
            }
          }catch(e){}
        }
      }
      // Bandome ištraukti Telia derintojo vardą iš pritarimų lentelės — informacijai
      var tablePage=findProjectApprovalsTablePage(pageTexts);
      var teliaName=tablePage?extractTeliaApproverName(pageTexts[tablePage-1]):null;
      detectionInfo={
        approvalsTablePage:tablePage,
        teliaApproverName:teliaName,
        usedMethod:teliaName?"vardo-pagrįstas":"raktažodžių"
      };
      var teliaPage=findTeliaApprovalPage(pageTexts);
      var drawingPage=findProjectDrawingPage(pageTexts);
      if(drawingPage){
        attachmentSources.push({filename:"projekto_brezinys.pdf",sourceFileName:pdfFile.name,pageNumbers:[drawingPage]});
      }else{
        warnings.push("Projekto brėžinio puslapis PDF'e nerastas — adminas turi nurodyti rankiniu būdu");
      }
      if(teliaPage){
        attachmentSources.push({filename:"telia_derinimas.pdf",sourceFileName:pdfFile.name,pageNumbers:[teliaPage]});
      }else{
        if(teliaName){
          warnings.push("Telia derinimo puslapis PDF'e nerastas — pritarimų lentelėje rastas derintojas: "+teliaName);
        }else{
          warnings.push("Telia derinimo puslapis PDF'e nerastas (pritarimų lentelė taip pat neaptikta)");
        }
      }
    }catch(e){
      warnings.push("PDF skaitymo klaida: "+e.message);
    }
  }else{
    warnings.push("Paraiškoje nepridetas projekto PDF failas");
  }
  if(!permit.teliaRouteFrom||!permit.teliaRouteTo){
    warnings.push("Trasa nenurodyta");
  }else if(permit.teliaRouteFrom===permit.teliaRouteTo){
    warnings.push("Trasos pradzia ir pabaiga sutampa — adminas turi patikslinti");
  }
  return Object.assign({},permit,{pendingEmail:{
    to:TELIA_EMAIL,
    subject:"Dėl kasimo leidimo (Telia) "+(permit.teliaRouteFrom||permit.location||""),
    html:buildTeliaEmailHtml(permit),
    attachmentSources:attachmentSources,
    warnings:warnings,
    detectionInfo:detectionInfo,
    preparedAt:new Date().toISOString()
  }});
}

// Iš Telia laiško HTML (`buildExternalEmailWrapper` rezultato) ištraukia tik vidinį turinį
// — tai, kas yra tarp wrapper'io pradžios ir pėdos.
function extractTeliaEmailBodyContent(htmlDoc){
  if(!htmlDoc)return "";
  // Naujasis wrapper'is: <div style="max-width:620px...">[BODY]<div style="margin-top:28px...border-top...">
  var m=htmlDoc.match(/<div style="max-width:620px[^"]*">\s*([\s\S]*?)\s*<div style="margin-top:28px/);
  if(m)return m[1];
  // Atsarginis variantas — senesni wrapper'iai (jei dar liko paraiškų su senu HTML)
  var m2=htmlDoc.match(/<div style="padding:24px 28px">([\s\S]*?)<\/div>\s*<div style="padding:12px 28px;background:#F9FAFB/);
  return m2?m2[1]:"";
}

// ─── LitGrid markers + page detection ─────────────────────────
function hasLitgridMarkers(text){
  var markers=[
    /LitGrid/i,
    /Litgrid/,
    /litgrid\.lt/i,
    /AB\s+LITGRID/i,
    /Ignalinos\s+al/i, // LitGrid HQ address
  ];
  return markers.some(function(re){return re.test(text)});
}

function findLitgridApprovalPage(pageTexts){
  var tablePage=findProjectApprovalsTablePage(pageTexts);
  // 1) Brėžinys + LitGrid raktažodžiai
  for(var i=0;i<pageTexts.length;i++){
    if(i+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[i])&&hasLitgridMarkers(pageTexts[i]))return i+1;
  }
  // 2) Bet koks puslapis + SUDERINTA/PRITARTA + LitGrid
  for(var i=0;i<pageTexts.length;i++){
    if(i+1===tablePage)continue;
    if(hasLitgridMarkers(pageTexts[i])&&/SUDERINT|PRITART|suderint|pritart/i.test(pageTexts[i]))return i+1;
  }
  // 3) Bet koks puslapis + LitGrid
  for(var j=0;j<pageTexts.length;j++){
    if(j+1===tablePage)continue;
    if(hasLitgridMarkers(pageTexts[j]))return j+1;
  }
  return null;
}

// LitGrid paraiškos paruošimas review'ui.
// Priedai: 1) LitGrid prašymas iš šablonų bibliotekos, 2) projekto brėžinys iš PDF, 3) LitGrid derinimas iš PDF
async function preparePendingLitgridEmail(permit, pageTexts){
  var attachmentSources=[];
  var warnings=[];
  var pdfFile=(permit.files||[]).find(function(f){return f.name&&f.name.match(/\.pdf$/i)});
  if(!pageTexts&&pdfFile){
    try{var _pd=await getPdfDataUrl(pdfFile);if(_pd)pageTexts=await extractPdfTextByPage(_pd);}catch(e){}
  }
  // 1) LitGrid prašymas iš šablonų bibliotekos
  try{
    var docLib=await sGet('kl-doc-library')||[];
    var lgDoc=null;
    for(var gi=0;gi<docLib.length;gi++){
      var grp=docLib[gi];
      for(var di=0;di<(grp.documents||[]).length;di++){
        var doc=grp.documents[di];
        if((doc.name||'').toLowerCase().indexOf('litgrid')!==-1||(doc.originalName||'').toLowerCase().indexOf('litgrid')!==-1){
          lgDoc=doc;break;
        }
      }
      if(lgDoc)break;
    }
    if(lgDoc&&lgDoc.url){
      attachmentSources.push({type:'library',filename:'litgrid_prasymas.pdf',url:lgDoc.url,docName:lgDoc.name,originalName:lgDoc.originalName||''});
    }else{
      warnings.push('LitGrid prasymo sablonas sablonu bibliotekoje nerastas — pridekite dokumenta su litgrid pavadinimu');
    }
  }catch(e){warnings.push('Klaida iesant sabloną: '+e.message);}
  // 2) Projekto brezinys is PDF
  if(pageTexts&&pageTexts.length>0){
    var _joinedText=pageTexts.join('\n');
    if(!permit.investNo){var fi=parseInvestNo(_joinedText);if(fi)permit=Object.assign({},permit,{investNo:fi});}
    if(!permit.projectNo){var fp=parseProjectNo(_joinedText);if(fp)permit=Object.assign({},permit,{projectNo:fp});}
    if(!permit.description){var fd=parseProjectDescription(_joinedText);if(fd)permit=Object.assign({},permit,{description:fd});}
    if(!permit.location&&!permit.teliaRouteTo){
      var fl=parseLocationFromDrawing(_joinedText);
      if(fl)permit=Object.assign({},permit,{location:fl,teliaRouteTo:fl});
    }
    var drawingPage=findProjectDrawingPage(pageTexts);
    if(drawingPage){
      attachmentSources.push({filename:'projekto_brezinys.pdf',sourceFileName:pdfFile?pdfFile.name:'',pageNumbers:[drawingPage]});
    }else{
      warnings.push('Projekto brezinio puslapis PDFe nerastas — adminas turi nurodyti rankiniu budu');
    }
    var lgPage=findLitgridApprovalPage(pageTexts);
    if(lgPage){
      attachmentSources.push({filename:'litgrid_derinimas.pdf',sourceFileName:pdfFile?pdfFile.name:'',pageNumbers:[lgPage]});
    }else{
      warnings.push('LitGrid derinimo puslapis PDFe nerastas — adminas turi nurodyti rankiniu budu');
    }
  }else{
    warnings.push('Paraiskonje nepridetas projekto PDF failas');
  }
  var addr=(permit.location||'').replace(/\s+[A-ZĄČĘĖĮŠŲŪŽ]{2,}\.?\s*$/,'').trim();
  return {
    to:getLitgridRegionEmail(permit),
    subject:addr?'Dėl kasimo leidimo '+addr:'Dėl kasimo leidimo',
    html:buildLitgridEmailHtml(permit),
    attachmentSources:attachmentSources,
    warnings:warnings,
    preparedAt:new Date().toISOString()
  };
}

// Aktyvaus pasirašančiojo asmens parašas (kl-signatory = aktyvaus įrašo id iš kl-signatures)
async function getActiveSignatory(){
  try{
    var sigs=await sGet('kl-signatures')||[];
    if(!sigs.length)return{name:null,filename:null};
    var activeId=await sGet('kl-signatory');
    var match=activeId?sigs.find(function(s){return s.id===activeId;}):null;
    if(!match)match=sigs[0]; // fallback — pirmas sąraše
    return{name:match.name||null,filename:match.filename||null};
  }catch(e){return{name:null,filename:null};}
}

// PDF PUSLAPIŲ PARINKIMO MODALAS
// Rodo puslapių miniatiūras, leidžia pažymėti kelis puslapius.
// p.pdfData     — base64 PDF duomenys
// p.selected    — jau pažymėtų puslapių masyvas [1,2,3,...]
// p.onConfirm   — callback su pasirinktų puslapių masyvu
// p.onClose     — uždarymo callback
// ═════════════════════════════════════════════════════════════
function PdfPagePickerModal(p){
  var _pages=useState([]);var pages=_pages[0],sPages=_pages[1];
  var _sel=useState(p.selected||[]);var sel=_sel[0],sSel=_sel[1];
  var _loading=useState(true);var loading=_loading[0],sLoading=_loading[1];
  var _err=useState("");var err=_err[0],sErr=_err[1];

  useEffect(function(){
    var cancelled=false;
    (async function(){
      // Gauname PDF data — iš prop arba fetch'iname iš serverio
      var dataUrl=p.pdfData||(p.pdfFile?await getPdfDataUrl(p.pdfFile):null);
      if(!dataUrl){sErr("PDF failas nepasiekiamas.");sLoading(false);return;}
      if(cancelled)return;
      try{
        var base64=dataUrl.split(',')[1];
        var binary=atob(base64);
        var bytes=new Uint8Array(binary.length);
        for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
        var pdf=await pdfjsLib.getDocument({data:bytes}).promise;
        var thumbs=[];
        for(var pg=1;pg<=pdf.numPages;pg++){
          if(cancelled)return;
          var page=await pdf.getPage(pg);
          var vp=page.getViewport({scale:0.85});
          var canvas=document.createElement('canvas');
          canvas.width=vp.width;canvas.height=vp.height;
          await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
          thumbs.push({num:pg,url:canvas.toDataURL()});
        }
        if(!cancelled){sPages(thumbs);sLoading(false);}
      }catch(e){if(!cancelled){sErr("PDF klaida: "+e.message);sLoading(false);}}
    })();
    return function(){cancelled=true;};

function workDaysUntil(dateStr){
  if(!dateStr)return null;
  var today=new Date();today.setHours(0,0,0,0);
  var target=new Date(dateStr);target.setHours(0,0,0,0);
  if(target<today)return -1;
  var LTH={"01-01":1,"02-16":1,"03-11":1,"05-01":1,"06-24":1,"07-06":1,"08-15":1,"11-01":1,"11-02":1,"12-24":1,"12-25":1,"12-26":1};
  var count=0;var cur=new Date(today);
  while(cur<=target){
    var dow=cur.getDay();
    var mm=String(cur.getMonth()+1).padStart(2,"0");
    var dd=String(cur.getDate()).padStart(2,"0");
    if(dow!==0&&dow!==6&&!LTH[mm+"-"+dd])count++;
    cur=new Date(cur.getTime()+24*60*60*1000);
  }
  return count;
}

function ScheduleView(p){

  var _vm=useState(now.getMonth());var viewMonth=_vm[0],sViewMonth=_vm[1];
  var _vy=useState(now.getFullYear());var viewYear=_vy[0],sViewYear=_vy[1];
  var _orgF=useState("");var orgF=_orgF[0],sOrgF=_orgF[1];

  function goPrev(){if(viewMonth===0){sViewMonth(11);sViewYear(viewYear-1);}else sViewMonth(viewMonth-1);}
  function goNext(){if(viewMonth===11){sViewMonth(0);sViewYear(viewYear+1);}else sViewMonth(viewMonth+1);}

  var rangeStart=new Date(viewYear,viewMonth,1);

  var LTH={"01-01":1,"02-16":1,"03-11":1,"05-01":1,"06-24":1,"07-06":1,"08-15":1,"11-01":1,"11-02":1,"12-24":1,"12-25":1,"12-26":1};

  }

  // Dienos žymės
  var DAY_LT=["S","P","A","T","K","Pn","\u0160"];
  var dayLabels=[];
  for(var di=1;di<=totalDays;di++){
    var dt=new Date(viewYear,viewMonth,di);
    var dow=dt.getDay();
    var isWeekend=dow===0||dow===6;
    var isHoliday=isLtHoliday(dt);
    var isNonWork=isWeekend||isHoliday;
    var isToday=dt.toDateString()===now.toDateString();
    dayLabels.push({
      date:di,letter:DAY_LT[dow],
      offsetPct:(di-1)/totalDays*100,
      widthPct:1/totalDays*100,
      isMonday:dow===1,isWeekend:isWeekend,isHoliday:isHoliday,
      isNonWork:isNonWork,isToday:isToday
    });
  }

  var todayPct=(now.getFullYear()===viewYear&&now.getMonth()===viewMonth)
    ?(now.getDate()-1)/totalDays*100:-1;

  // Filtravimas
  var allLocs=[...new Set(p.permits.map(function(x){return x.location||""}).filter(Boolean))].sort();
  var orgs=[...new Set(p.permits.map(function(x){return x.organization}).filter(Boolean))];
  var filtered=p.permits.filter(function(permit){
    if(orgF&&permit.organization!==orgF)return false;
    if(stF&&permit.status!==stF)return false;
    if(locF&&(permit.location||"")!==locF)return false;
    return true;
  });

  // Grupuojame pagal lokaciją
  function getPermitLoc(permit){
    if(permit.location&&permit.location.trim())return permit.location.trim();
    var tr=permit.teliaRouteTo&&permit.teliaRouteTo.replace(/\s*INVESTICINIS\s+NR\.?:?\s*\S+/i,"").replace(/^\.\s*/,"").trim();
    if(tr)return tr;
    if(permit.investNo)return "Inv. nr. "+permit.investNo;
    return "(vieta nenurodyta)";
  }
  var locMap={};
  filtered.forEach(function(permit){
    var loc=getPermitLoc(permit);
    if(!locMap[loc])locMap[loc]=[];
    locMap[loc].push(permit);
  });
  var locKeys=Object.keys(locMap).sort(function(a,b){
    var aMin=locMap[a].reduce(function(m,x){return (!m||x.startDate<m)?x.startDate:m},null)||"";
    var bMin=locMap[b].reduce(function(m,x){return (!m||x.startDate<m)?x.startDate:m},null)||"";
    return aMin>bMin?1:-1;
  });

  function barStyle(permit){
    var sd=permit.startDate||permit.permitValidFrom;
    var ed=permit.endDate||permit.permitValidUntil||sd;
    if(!sd)return null;
    var s=new Date(sd);var e=new Date(ed);
    if(s>rangeEnd||e<rangeStart)return null;
    var effS=s<rangeStart?rangeStart:s;
    var effE=e>rangeEnd?rangeEnd:e;
    var left=(effS.getDate()-1)/totalDays*100;
    var width=Math.max(1,(effE.getDate()-effS.getDate()+1)/totalDays*100);
    var sm=STATUS_MAP[permit.status]||STATUS_MAP["Laukiama tvirtinimo"]||{dot:C.ac};
    return {left:left+"%",width:width+"%",background:sm.dot,opacity:0.85};
  }

  function permitBarStyle(permit){
    if(!permit.permitValidFrom)return null;
    var s=new Date(permit.permitValidFrom);
    var hasUntil=!!(permit.permitValidUntil&&permit.permitValidUntil.trim());
    var e=hasUntil?new Date(permit.permitValidUntil):new Date(s.getTime()+86400000);
    if(s>rangeEnd||e<rangeStart)return null;
    var effS=s<rangeStart?rangeStart:s;
    var effE=e>rangeEnd?rangeEnd:e;
    var left=(effS.getDate()-1)/totalDays*100;
    var width=Math.max(hasUntil?0.5:1.5,(effE.getDate()-effS.getDate()+(hasUntil?1:0))/totalDays*100);
    var expired=hasUntil&&new Date(permit.permitValidUntil)<now;
    var expiring=hasUntil&&!expired&&(new Date(permit.permitValidUntil)-now)/(1000*60*60*24)<=14;
    var col=expired?C.rd:expiring?C.yl:C.gn;
    return {left:left+"%",width:width+"%",color:col,noUntil:!hasUntil};
  }

  var BAR_H=18;var PERMIT_H=7;var ROW_H=44;var LEFT_W=240;

  return <div>
    {/* Antraštė su navigacija */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
      <h2 style={{fontSize:18,fontWeight:800,color:C.tx,fontFamily:F}}>Leidimu grafikas</h2>
      <div style={{display:"flex",alignItems:"center",gap:6,background:C.s2,borderRadius:9,border:"1px solid "+C.b1,padding:"3px 6px"}}>
        <button onClick={goPrev} style={{background:"none",border:"none",color:C.t2,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>&#8249;</button>
        <span style={{fontSize:13,fontWeight:700,color:C.tx,fontFamily:F,minWidth:120,textAlign:"center"}}>
          {new Date(viewYear,viewMonth,1).toLocaleDateString("lt-LT",{month:"long",year:"numeric"})}
        </span>
        <button onClick={goNext} style={{background:"none",border:"none",color:C.t2,cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>&#8250;</button>
        <button onClick={function(){sViewMonth(now.getMonth());sViewYear(now.getFullYear())}} style={{background:C.acD,border:"none",color:C.ac,cursor:"pointer",fontSize:10,padding:"3px 8px",borderRadius:5,fontFamily:F,fontWeight:600,marginLeft:2}}>Siandien</button>
      </div>
    </div>

    {/* Filtrai */}
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
      <select value={locF} onChange={function(e){sLocF(e.target.value)}} style={{padding:"5px 8px",borderRadius:7,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none",maxWidth:200}}>
        <option value="">Visi objektai</option>
        {allLocs.map(function(l){return <option key={l} value={l}>{l}</option>})}
      </select>
      <select value={orgF} onChange={function(e){sOrgF(e.target.value)}} style={{padding:"5px 8px",borderRadius:7,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none"}}>
        <option value="">Visos institucijos</option>
        {orgs.map(function(o){return <option key={o} value={o}>{o}</option>})}
      </select>
      <select value={stF} onChange={function(e){sStF(e.target.value)}} style={{padding:"5px 8px",borderRadius:7,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none"}}>
        <option value="">Visos busenos</option>
        {Object.keys(STATUS_MAP).map(function(s){return <option key={s} value={s}>{SL[s]||s}</option>})}
      </select>
    </div>

    {/* Legenda */}
    <div style={{display:"flex",gap:12,marginBottom:10,flexWrap:"wrap"}}>
      {[{c:C.ac,l:"Darbu laikotarpis"},{c:C.gn,l:"Leidimas galioja"},{c:C.yl,l:"Baigiasi (<14d.)"},{c:C.rd,l:"Nebegalioja"}].map(function(item){return <div key={item.l} style={{display:"flex",alignItems:"center",gap:5}}>
        <div style={{width:18,height:7,borderRadius:2,background:item.c,opacity:.9}}/>
        <span style={{fontSize:10,color:C.t2,fontFamily:F}}>{item.l}</span>
      </div>})}
    </div>

    {locKeys.length===0
      ?<Empty icon="&#128197;" title="Paraiskas pagal filtrus nerasta."/>
      :<div style={{background:C.s1,borderRadius:12,border:"1px solid "+C.b1,overflow:"hidden"}}>

        {/* Antraštė: Objektas + dienos */}
        <div style={{display:"flex",borderBottom:"2px solid "+C.b1,background:C.s2}}>
          <div style={{width:LEFT_W,flexShrink:0,padding:"6px 12px",fontSize:10,fontWeight:700,color:C.t3,fontFamily:F,textTransform:"uppercase",letterSpacing:1,borderRight:"1px solid "+C.b1,display:"flex",alignItems:"flex-end"}}>Objektas</div>
          <div style={{flex:1,position:"relative",overflow:"hidden"}}>
            {/* Dienų antraštė */}
            <div style={{position:"relative",height:34}}>
              {dayLabels.map(function(d,i){return <div key={i} style={{
                position:"absolute",left:d.offsetPct+"%",width:d.widthPct+"%",
                top:0,bottom:0,
                borderLeft:d.isMonday?"2px solid "+C.b2:"1px solid "+C.b1,
                background:d.isToday?C.acD:d.isNonWork?"rgba(239,68,68,.07)":"transparent",
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",overflow:"hidden",gap:1
              }}>
                <span style={{fontSize:7,fontWeight:d.isToday?800:400,color:d.isToday?C.ac:d.isNonWork?C.rd:C.t3,fontFamily:FM,lineHeight:1}}>{d.date}</span>
                <span style={{fontSize:6,color:d.isToday?C.ac:d.isNonWork?C.rd+"99":C.t3+"88",fontFamily:FM,lineHeight:1}}>{d.letter}</span>
              </div>})}
              {todayPct>=0&&<div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,width:2,background:C.ac,opacity:.9,zIndex:2}}/>}
            </div>
          </div>
        </div>

        {/* Objektų grupės */}
        {locKeys.map(function(loc,gIdx){
          var permits=locMap[loc];
          var isLastGroup=gIdx===locKeys.length-1;
          return <div key={loc} style={{borderBottom:isLastGroup?"none":"2px solid "+C.b1}}>

            {/* Objekto antraštė */}
            <div style={{display:"flex",background:"linear-gradient(90deg,"+C.acD+" 0%,"+C.s2+" 100%)",borderTop:"2px solid "+C.ac,borderBottom:"1px solid "+C.b1}}>
              <div style={{width:LEFT_W,flexShrink:0,padding:"6px 12px",borderRight:"1px solid "+C.b1,display:"flex",alignItems:"center",gap:7}}>
                <span style={{fontSize:12,color:C.ac}}>&#128205;</span>
                <span style={{fontSize:12,fontWeight:800,color:C.tx,fontFamily:F,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{loc}</span>
              </div>
              <div style={{flex:1,position:"relative",height:28}}>
                {dayLabels.map(function(d,i){return <div key={i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:d.widthPct+"%",background:d.isNonWork?"rgba(239,68,68,.04)":"transparent",pointerEvents:"none"}}/>})}
                {dayLabels.map(function(d,i){return <div key={"l"+i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:1,background:d.isMonday?C.b2:C.b1,opacity:d.isMonday?.4:.15,pointerEvents:"none"}}/>})}
                {todayPct>=0&&<div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,width:1,background:C.ac,opacity:.3}}/>}
              </div>
            </div>

            {/* Leidimų eilutės — kiekviena institucija atskirai */}
            {(function(){
              // Išplečiame paraiškas su keliomis institucijomis į atskiras eilutes
              var rows=[];
              permits.forEach(function(permit){
                var orgsInst=(permit.organizations||[]).filter(function(o){return o==="Telia, Kaunas"||o==="Telia, investiciniai"||o==="Kauno energija"||o==="AB ESO"||o==="Kauno miesto savivaldybe";});
                if(orgsInst.length<=1){
                  // Vieno-org paraiška — naudoti org-specifines datas jei yra
                  var org0=orgsInst[0]||permit.organization;
                  var sd0=(org0==="Telia, Kaunas"||org0==="Telia, investiciniai")?(permit.teliaStartDate||permit.startDate):org0==="Kauno energija"?(permit.keStartDate||permit.startDate):permit.startDate;
                  var ed0=(org0==="Telia, Kaunas"||org0==="Telia, investiciniai")?(permit.teliaEndDate||permit.endDate):org0==="Kauno energija"?(permit.keEndDate||permit.endDate):permit.endDate;
                  rows.push({permit:permit,org:org0,startDate:sd0,endDate:ed0});
                }else{
                  orgsInst.forEach(function(org){
                    var sd=(org==="Telia, Kaunas"||org==="Telia, investiciniai")?(permit.teliaStartDate||permit.startDate):org==="Kauno energija"?(permit.keStartDate||permit.startDate):permit.startDate;
                    var ed=(org==="Telia, Kaunas"||org==="Telia, investiciniai")?(permit.teliaEndDate||permit.endDate):org==="Kauno energija"?(permit.keEndDate||permit.endDate):permit.endDate;
                    rows.push({permit:permit,org:org,startDate:sd,endDate:ed});
                  });
                }
              });
              return rows.map(function(row,pIdx){
                var permit=row.permit;
                var rowPermit=Object.assign({},permit,{startDate:row.startDate,endDate:row.endDate});
                var bs=barStyle(rowPermit);
                var ps=permitBarStyle(permit);
                var sm=STATUS_MAP[permit.status]||STATUS_MAP["Laukiama tvirtinimo"]||{bg:C.acD,c:C.ac,dot:C.ac};
                var isLastRow=pIdx===rows.length-1;
                return <div key={permit.id+"-"+row.org} onClick={function(){p.onSelect(permit)}}
                  style={{display:"flex",borderBottom:isLastRow?"none":"1px solid "+C.b1,cursor:"pointer",transition:"background .1s"}}
                  onMouseEnter={function(e){e.currentTarget.style.background=C.s3}}
                  onMouseLeave={function(e){e.currentTarget.style.background="transparent"}}>

                  <div style={{width:LEFT_W,flexShrink:0,padding:"5px 12px 5px 24px",borderRight:"1px solid "+C.b1,display:"flex",flexDirection:"column",justifyContent:"center",gap:2}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{width:6,height:6,borderRadius:"50%",background:sm.dot,flexShrink:0}}/>
                      <span style={{fontSize:10,fontWeight:700,color:C.tx,fontFamily:F}}>{row.org}</span>
                      <span style={{fontSize:8,color:C.t3,fontFamily:FM,background:C.bg,padding:"1px 3px",borderRadius:2}}>#{permit.id.slice(-5).toUpperCase()}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:5,paddingLeft:11}}>
                      <span style={{fontSize:9,color:C.t3,fontFamily:F}}>{SL[permit.status]||permit.status}</span>
                      {permit.permitValidFrom&&<span style={{fontSize:8,color:ps?ps.color:C.t3,fontFamily:FM,fontWeight:600}}>{permit.permitValidFrom}{permit.permitValidUntil?" – "+permit.permitValidUntil:""}</span>}
                    </div>
                  </div>

                  <div style={{flex:1,position:"relative",height:ROW_H}}>
                    {dayLabels.map(function(d,i){return <div key={i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:d.widthPct+"%",background:d.isNonWork?"rgba(239,68,68,.04)":"transparent",pointerEvents:"none"}}/>})}
                    {dayLabels.map(function(d,i){return <div key={"l"+i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:1,background:d.isMonday?C.b2:C.b1,opacity:d.isMonday?.4:.15,pointerEvents:"none"}}/>})}
                    {todayPct>=0&&<div style={{position:"absolute",left:todayPct+"%",top:0,bottom:0,width:2,background:C.ac,opacity:.4,zIndex:1}}/>}
                    {bs&&<div style={Object.assign({position:"absolute",top:8,height:BAR_H,borderRadius:3,opacity:.85,zIndex:2,minWidth:3},bs)}>
                      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:3,overflow:"hidden"}}>
                        <span style={{fontSize:7,color:"#fff",fontFamily:FM,whiteSpace:"nowrap",textShadow:"0 1px 2px rgba(0,0,0,.5)"}}>
                          {(row.startDate||permit.permitValidFrom||"")} — {(row.endDate||permit.permitValidUntil||"")}
                        </span>
                      </div>
                    </div>}
                    {ps&&<div style={{position:"absolute",left:ps.left,width:ps.width,top:30,height:PERMIT_H,borderRadius:ps.noUntil?3:2,background:ps.color,opacity:.9,zIndex:2,minWidth:ps.noUntil?6:3,boxShadow:ps.noUntil?"0 0 4px "+ps.color:"none"}}/>}
                  </div>
                </div>;
              });
            })()}
          </div>;
        })}
      </div>}

    {/* Statistika */}
    {p.permits.length>0&&<div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
      {(function(){
        var wp=p.permits.filter(function(x){return x.permitValidUntil});
        var exp=wp.filter(function(x){return new Date(x.permitValidUntil)<now}).length;
        var soon=wp.filter(function(x){var d=(new Date(x.permitValidUntil)-now)/(1000*60*60*24);return d>=0&&d<=14}).length;
        var ok=wp.filter(function(x){return new Date(x.permitValidUntil)>=now&&(new Date(x.permitValidUntil)-now)/(1000*60*60*24)>14}).length;
        return [{n:p.permits.length,l:"Is viso",c:C.tx},{n:wp.length,l:"Turi leidima",c:C.ac},{n:ok,l:"Galioja",c:C.gn},{n:soon,l:"Baigiasi",c:C.yl},{n:exp,l:"Pasibaige",c:C.rd}]
          .map(function(item){return <div key={item.l} style={{padding:"8px 12px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1,flex:"1 1 80px",minWidth:80}}>
            <div style={{fontSize:18,fontWeight:800,color:item.c,fontFamily:F}}>{item.n}</div>
            <div style={{fontSize:9,color:C.t2,fontFamily:F}}>{item.l}</div>
          </div>});
      })()}
    </div>}
  </div>
}
