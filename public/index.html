// USER MANAGEMENT
// ═════════════════════════════════════════════════════════════
function UserMgmt(p){
  var _ar=useState(null);var assignId=_ar[0],sAR=_ar[1];
  var _arole=useState("");var aRole=_arole[0],sARole=_arole[1];
  var _add=useState(false);var showAdd=_add[0],sAdd=_add[1];
  var _nn=useState("");var nn=_nn[0],sNN=_nn[1];
  var _nu=useState("");var nu=_nu[0],sNU=_nu[1];
  var _ne=useState("");var ne=_ne[0],sNE=_ne[1];
  var _nph=useState("");var nph=_nph[0],sNPH=_nph[1];
  var _np=useState("");var np=_np[0],sNP=_np[1];
  var _nr=useState("");var nr=_nr[0],sNR=_nr[1];
  var _del=useState(null);var delId=_del[0],sDel=_del[1];
  var _editId=useState(null);var editId=_editId[0],sEditId=_editId[1];
  var _eName=useState("");var eName=_eName[0],sEName=_eName[1];
  var _ePhone=useState("");var ePhone=_ePhone[0],sEPhone=_ePhone[1];
  var _eEmail=useState("");var eEmail=_eEmail[0],sEEmail=_eEmail[1];

  function openUser(u){sAR(u.id);sARole(u.role==="pending"?"":u.role)}
  function closeUser(){sAR(null);sARole("")}
  function doAssign(){
    if(!assignId||!aRole)return;
    p.onAssignRole(assignId,aRole);
    closeUser();
  }
  function doAdd(){
    if(!nn||!nu||!np||np.length<4||!nr)return;
    p.onAddUser({id:uid(),name:nn,username:nu,email:ne,phone:nph,password:np,role:nr,mustChangePassword:false,adAuth:false,createdAt:new Date().toISOString()});
    sAdd(false);sNN("");sNU("");sNE("");sNPH("");sNP("");sNR("");
  }
  function openEdit(u){sEditId(u.id);sEName(u.name||"");sEPhone(u.phone||"");sEEmail(u.email||"");}
  function closeEdit(){sEditId(null);sEName("");sEPhone("");sEEmail("");}
  function doEdit(){
    if(!eName||!editId)return;
    p.onUpdateContact(editId,{name:eName,phone:ePhone,email:eEmail});
    closeEdit();
  }

  var pending=p.users.filter(function(u){return u.role==="pending"});
  var active=p.users.filter(function(u){return u.role!=="pending"});

  return <div>
    {pending.length>0&&<div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <h2 style={{fontSize:14,fontWeight:800,color:C.tx,fontFamily:F}}>Laukia roles priskyrimo</h2>
        <span style={{background:C.rdD,color:C.rd,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10}}>{pending.length}</span>
      </div>
      {pending.map(function(u){return <div key={u.id} style={{padding:"10px 14px",background:C.s2,borderRadius:8,border:"1.5px solid "+C.yl+"44",display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
        <Av name={u.name} size={34}/>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600,color:C.tx,fontFamily:F}}>{u.name}</div>
          <div style={{fontSize:10,color:C.t3,fontFamily:F}}>{u.email||u.username}</div>
        </div>
        <Btn sm onClick={function(){openUser(u)}}>Priskirti role</Btn>
        <Btn v="danger" sm onClick={function(){sDel(u.id)}}>Istrinti</Btn>
      </div>})}
    </div>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <h2 style={{fontSize:14,fontWeight:800,color:C.tx,fontFamily:F}}>Aktyvus vartotojai</h2>
      <Btn sm onClick={function(){sAdd(true)}}>+ Sukurti vartotoja</Btn>
    </div>
    {active.map(function(u){return <div key={u.id} style={{padding:"10px 14px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1,display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
      <Av name={u.name} size={34}/>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:600,color:C.tx,fontFamily:F}}>{u.name}</div>
        <div style={{fontSize:10,color:C.t3,fontFamily:F}}>{u.phone?u.phone+" · ":""}{u.email||u.username} · {ROLES[u.role]||u.role}</div>
      </div>
      <Btn sm onClick={function(){openEdit(u)}}>Redaguoti</Btn>
      <Btn sm onClick={function(){openUser(u)}}>Role</Btn>
      {u.role!=="admin"&&<Btn v="danger" sm onClick={function(){sDel(u.id)}}>Istrinti</Btn>}
    </div>})}


    <Modal open={assignId!==null} onClose={closeUser} title="Pakeisti role" w={420}>
      {(function(){var u=p.users.find(function(x){return x.id===assignId});if(!u)return null;
        return <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,padding:"10px 12px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1}}>
            <Av name={u.name} size={40}/>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.tx,fontFamily:F}}>{u.name}</div>
              <div style={{fontSize:10,color:C.t3,fontFamily:F}}>Dabar: {ROLES[u.role]||u.role}</div>
            </div>
          </div>

// DOCUMENT LIBRARY — Šablonų biblioteka
// ═════════════════════════════════════════════════════════════
function DocLibrary(){
  var _groups=useState(null);var groups=_groups[0],sGroups=_groups[1];
  var _busy=useState(false);var busy=_busy[0],sBusy=_busy[1];
  var _addGrp=useState(false);var addGrp=_addGrp[0],sAddGrp=_addGrp[1];
  var _newGrpName=useState("");var newGrpName=_newGrpName[0],sNewGrpName=_newGrpName[1];
  var _editGrpId=useState(null);var editGrpId=_editGrpId[0],sEditGrpId=_editGrpId[1];
  var _editGrpName=useState("");var editGrpName=_editGrpName[0],sEditGrpName=_editGrpName[1];
  var _addDocGrpId=useState(null);var addDocGrpId=_addDocGrpId[0],sAddDocGrpId=_addDocGrpId[1];
  var _newDocName=useState("");var newDocName=_newDocName[0],sNewDocName=_newDocName[1];
  var _uploadBusy=useState(false);var uploadBusy=_uploadBusy[0],sUploadBusy=_uploadBusy[1];
  var _editDocId=useState(null);var editDocId=_editDocId[0],sEditDocId=_editDocId[1];
  var _editDocName=useState("");var editDocName=_editDocName[0],sEditDocName=_editDocName[1];
  var _selectedFile=useState(null);var selectedFile=_selectedFile[0],sSelectedFile=_selectedFile[1];
  var _dropOver=useState(false);var dropOver=_dropOver[0],sDropOver=_dropOver[1];
  var fileRef=useRef(null);

  useEffect(function(){
    sGet('kl-doc-library').then(function(d){sGroups(d||[]);});
  },[]);

  async function save(newGroups){
    await sSet('kl-doc-library',newGroups);
    sGroups(newGroups);
  }

  async function addGroup(){
    if(!newGrpName.trim())return;
    var g={id:uid(),name:newGrpName.trim(),documents:[],createdAt:new Date().toISOString()};
    await save((groups||[]).concat([g]));
    sNewGrpName("");sAddGrp(false);
  }

  async function saveGroupName(grpId){
    if(!editGrpName.trim())return;
    await save((groups||[]).map(function(g){return g.id===grpId?Object.assign({},g,{name:editGrpName.trim()}):g;}));
    sEditGrpId(null);
  }

  async function deleteGroup(grpId){
    if(!confirm("Ištrinti grupę ir visus jos dokumentus?"))return;
    await save((groups||[]).filter(function(g){return g.id!==grpId;}));
  }

  function pickFile(file){
    if(!file)return;
    sSelectedFile(file);
    // Auto-fill pavadinimas iš failo vardo (be plėtinio)
    if(!newDocName.trim()){
      var baseName=file.name.replace(/\.[^.]+$/,"").replace(/[_-]+/g," ").trim();
      sNewDocName(baseName);
    }
  }

  async function uploadDoc(grpId){
    var file=selectedFile||(fileRef.current&&fileRef.current.files[0]);
    if(!file){alert("Pasirinkite failą.");return;}
    if(!newDocName.trim()){alert("Įveskite dokumento pavadinimą.");return;}
    sUploadBusy(true);
    try{
      var fd=new FormData();fd.append("file",file);
      var r=await fetch("/api/upload",{method:"POST",body:fd});
      var d=await r.json();
      var doc={id:uid(),name:newDocName.trim(),url:d.url||null,filename:d.filename||null,
        originalName:file.name,size:file.size,uploadedAt:new Date().toISOString()};
      var newGroups=(groups||[]).map(function(g){
        return g.id===grpId?Object.assign({},g,{documents:(g.documents||[]).concat([doc])}):g;
      });
      await save(newGroups);
      sNewDocName("");sAddDocGrpId(null);sSelectedFile(null);
      if(fileRef.current)fileRef.current.value="";
    }catch(e){alert("Klaida įkeliant failą: "+e.message);}
    sUploadBusy(false);
  }

  function cancelUpload(){
    sAddDocGrpId(null);sNewDocName("");sSelectedFile(null);sDropOver(false);
    if(fileRef.current)fileRef.current.value="";
  }

  async function deleteDoc(grpId,docId){
    if(!confirm("Ištrinti šį dokumentą?"))return;
    var newGroups=(groups||[]).map(function(g){
      return g.id===grpId?Object.assign({},g,{documents:(g.documents||[]).filter(function(d){return d.id!==docId;})}):g;
    });
    await save(newGroups);
  }

  async function saveDocName(grpId,docId){
    if(!editDocName.trim())return;
    var newGroups=(groups||[]).map(function(g){
      if(g.id!==grpId)return g;
      return Object.assign({},g,{documents:(g.documents||[]).map(function(d){
        return d.id===docId?Object.assign({},d,{name:editDocName.trim()}):d;
      })});
    });
    await save(newGroups);
    sEditDocId(null);
  }

  function fmtSize(bytes){
    if(!bytes)return"";
    if(bytes<1024)return bytes+"B";
    if(bytes<1024*1024)return(bytes/1024).toFixed(0)+"KB";
    return(bytes/1024/1024).toFixed(1)+"MB";
  }

  function docIcon(name){
    if(!name)return"📄";
    var n=name.toLowerCase();
    if(n.endsWith(".docx")||n.endsWith(".doc"))return"📝";
    if(n.endsWith(".pdf"))return"📋";
    return"📄";
  }

  if(groups===null)return<div style={{padding:32,color:C.t2,fontFamily:F}}>Kraunama...</div>;

  return<div style={{padding:24,maxWidth:800}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20}}>
      <div>
        <h2 style={{fontSize:18,fontWeight:800,color:C.tx,fontFamily:F,margin:0}}>📁 Šablonų biblioteka</h2>
        <div style={{fontSize:11,color:C.t2,fontFamily:F,marginTop:2}}>Dokumentų šablonai paraiškų prašymams generuoti</div>
      </div>
      {!addGrp&&<Btn v="primary" sm onClick={function(){sAddGrp(true);sNewGrpName("");}}>+ Nauja grupė</Btn>}
    </div>

    {/* Naujos grupės forma */}
    {addGrp&&<div style={{background:C.s2,border:"1px solid "+C.ac,borderRadius:10,padding:14,marginBottom:16,display:"flex",gap:8,alignItems:"center"}}>
      <input autoFocus value={newGrpName} onChange={function(e){sNewGrpName(e.target.value)}}
        onKeyDown={function(e){if(e.key==="Enter")addGroup();if(e.key==="Escape")sAddGrp(false);}}
        placeholder="Grupės pavadinimas (pvz. LitGrid, Jonavos r. sav.)"
        style={{flex:1,padding:"8px 10px",borderRadius:7,border:"1.5px solid "+C.ac,background:C.bg,color:C.tx,fontFamily:F,fontSize:13,outline:"none"}}/>
      <Btn v="primary" sm onClick={addGroup}>Sukurti</Btn>
      <Btn v="secondary" sm onClick={function(){sAddGrp(false);}}>Atšaukti</Btn>
    </div>}

    {groups.length===0&&!addGrp&&<div style={{textAlign:"center",padding:"48px 24px",color:C.t3,fontFamily:F}}>
      <div style={{fontSize:32,marginBottom:12}}>📂</div>
      <div style={{fontSize:14,fontWeight:600,color:C.t2,marginBottom:6}}>Nėra grupių</div>
      <div style={{fontSize:12}}>Sukurkite grupę (pvz. "LitGrid") ir pridėkite šablonų dokumentų</div>
    </div>}

    {groups.map(function(grp){
      var isEditGrp=editGrpId===grp.id;
      var isAddDoc=addDocGrpId===grp.id;
      return<div key={grp.id} style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:12,marginBottom:12,overflow:"hidden"}}>
        {/* Grupės antraštė */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:C.s2,borderBottom:"1px solid "+C.b1}}>
          {isEditGrp
            ?<div style={{display:"flex",gap:6,flex:1,marginRight:8}}>
              <input autoFocus value={editGrpName} onChange={function(e){sEditGrpName(e.target.value)}}
                onKeyDown={function(e){if(e.key==="Enter")saveGroupName(grp.id);if(e.key==="Escape")sEditGrpId(null);}}
                style={{flex:1,padding:"5px 8px",borderRadius:6,border:"1.5px solid "+C.ac,background:C.bg,color:C.tx,fontFamily:F,fontSize:13,outline:"none"}}/>
              <Btn v="primary" sm onClick={function(){saveGroupName(grp.id);}}>✓</Btn>
              <Btn v="secondary" sm onClick={function(){sEditGrpId(null);}}>✕</Btn>
            </div>
            :<div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:16}}>📁</span>
              <span style={{fontSize:14,fontWeight:700,color:C.tx,fontFamily:F}}>{grp.name}</span>
              <span style={{fontSize:11,color:C.t3,fontFamily:F}}>({(grp.documents||[]).length} dok.)</span>
            </div>}
          <div style={{display:"flex",gap:5}}>
            {!isEditGrp&&<Btn v="secondary" sm onClick={function(){sEditGrpId(grp.id);sEditGrpName(grp.name);}}>✏️</Btn>}
            {!isEditGrp&&<Btn v="danger" sm onClick={function(){deleteGroup(grp.id);}}>🗑</Btn>}
          </div>
        </div>

        {/* Dokumentų sąrašas */}
        <div style={{padding:"10px 14px"}}>
          {(grp.documents||[]).length===0&&!isAddDoc&&
            <div style={{fontSize:12,color:C.t3,fontFamily:F,padding:"8px 0",textAlign:"center"}}>
              Nėra dokumentų — pridėkite šabloną
            </div>}

          {(grp.documents||[]).map(function(doc){
            var isEditDoc=editDocId===doc.id;
            return<div key={doc.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",borderRadius:8,background:C.s2,border:"1px solid "+C.b1,marginBottom:6}}>
              <span style={{fontSize:18,flexShrink:0}}>{docIcon(doc.originalName)}</span>
              <div style={{flex:1,minWidth:0}}>
                {isEditDoc
                  ?<div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input autoFocus value={editDocName} onChange={function(e){sEditDocName(e.target.value)}}
                      onKeyDown={function(e){if(e.key==="Enter")saveDocName(grp.id,doc.id);if(e.key==="Escape")sEditDocId(null);}}
                      style={{flex:1,padding:"4px 8px",borderRadius:6,border:"1.5px solid "+C.ac,background:C.bg,color:C.tx,fontFamily:F,fontSize:12,outline:"none"}}/>
                    <Btn v="primary" sm onClick={function(){saveDocName(grp.id,doc.id);}}>✓</Btn>
                    <Btn v="secondary" sm onClick={function(){sEditDocId(null);}}>✕</Btn>
                  </div>
                  :<div style={{fontWeight:600,fontSize:13,color:C.tx,fontFamily:F,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{doc.name}</div>}
                {!isEditDoc&&<div style={{fontSize:10,color:C.t3,fontFamily:F,marginTop:1}}>
                  {doc.originalName}{doc.size?" · "+fmtSize(doc.size):""}
                </div>}
              </div>
              {!isEditDoc&&<div style={{display:"flex",gap:4,flexShrink:0}}>
                {doc.url&&<a href={"http://10.2.1.115:3001"+doc.url} target="_blank"
                  style={{padding:"4px 8px",borderRadius:6,background:C.acD,color:C.ac,fontSize:11,fontFamily:F,fontWeight:600,textDecoration:"none",cursor:"pointer"}}>⬇ Atsisiųsti</a>}
                <Btn v="secondary" sm onClick={function(){sEditDocId(doc.id);sEditDocName(doc.name);}}>✏️</Btn>
                <Btn v="danger" sm onClick={function(){deleteDoc(grp.id,doc.id);}}>🗑</Btn>
              </div>}
            </div>;
          })}

          {/* Naujo dokumento forma */}
          {isAddDoc&&<div style={{background:C.s2,border:"1.5px solid "+C.ac,borderRadius:10,padding:14,marginTop:8}}>
            <div style={{fontSize:11,fontWeight:700,color:C.ac,fontFamily:F,marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>📎 Pridėti dokumentą</div>
            {/* Drag-and-drop zona */}
            <div
              onDragOver={function(e){e.preventDefault();sDropOver(true);}}
              onDragLeave={function(){sDropOver(false);}}
              onDrop={function(e){e.preventDefault();sDropOver(false);var f=e.dataTransfer.files[0];if(f)pickFile(f);}}
              onClick={function(){fileRef.current&&fileRef.current.click();}}
              style={{border:"2px dashed "+(dropOver?C.ac:selectedFile?C.gn:C.b2),borderRadius:8,padding:"16px 12px",textAlign:"center",cursor:"pointer",background:dropOver?C.acD:selectedFile?C.gnD:C.bg,transition:"all .15s",marginBottom:10}}>
              {selectedFile
                ?<div>
                  <div style={{fontSize:20,marginBottom:4}}>{docIcon(selectedFile.name)}</div>
                  <div style={{fontSize:12,fontWeight:700,color:C.gn,fontFamily:F}}>{selectedFile.name}</div>
                  <div style={{fontSize:10,color:C.t3,fontFamily:F,marginTop:2}}>{fmtSize(selectedFile.size)} · Paspauskite norėdami pakeisti</div>
                </div>
                :<div>
                  <div style={{fontSize:24,marginBottom:6}}>📂</div>
                  <div style={{fontSize:12,fontWeight:600,color:dropOver?C.ac:C.t2,fontFamily:F}}>Nuvilkite failą čia arba paspauskite</div>
                  <div style={{fontSize:10,color:C.t3,fontFamily:F,marginTop:3}}>.docx · .doc · .pdf</div>
                </div>}
              <input ref={fileRef} type="file" accept=".docx,.doc,.pdf"
                style={{display:"none"}}
                onChange={function(e){var f=e.target.files[0];if(f)pickFile(f);}}/>
            </div>
            {/* Pavadinimas */}
            <input value={newDocName} onChange={function(e){sNewDocName(e.target.value)}}
              placeholder="Dokumento pavadinimas..."
              autoFocus
              style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1.5px solid "+C.b2,background:C.bg,color:C.tx,fontFamily:F,fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:10}}/>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="secondary" sm onClick={cancelUpload}>Atšaukti</Btn>
              <Btn v="primary" sm onClick={function(){uploadDoc(grp.id);}} disabled={uploadBusy||!selectedFile}>
                {uploadBusy?"Įkeliama...":"⬆ Įkelti"}
              </Btn>
            </div>
          </div>}

          {!isAddDoc&&<button onClick={function(){sAddDocGrpId(grp.id);sNewDocName("");sSelectedFile(null);}}
            style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px dashed "+C.b2,background:"transparent",color:C.t2,fontFamily:F,fontSize:12,cursor:"pointer",marginTop:4,transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}
            onMouseOver={function(e){e.currentTarget.style.borderColor=C.ac;e.currentTarget.style.color=C.ac;}}
            onMouseOut={function(e){e.currentTarget.style.borderColor=C.b2;e.currentTarget.style.color=C.t2;}}>
            <span>+</span><span>Pridėti dokumentą</span>
          </button>}
        </div>
      </div>;
    })}

    <div style={{marginTop:16,padding:"12px 14px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1}}>
      <div style={{fontSize:11,fontWeight:700,color:C.t2,fontFamily:F,marginBottom:4}}>ℹ️ Kaip naudoti šablonus</div>
      <div style={{fontSize:11,color:C.t3,fontFamily:FM,lineHeight:1.6}}>
        Grupės pavadinimas turi atitikti organizaciją (pvz. <b style={{color:C.t2}}>LitGrid</b>).<br/>
        Word šablone naudokite <b style={{color:C.ac}}>{"{{vieta}}"}</b>, <b style={{color:C.ac}}>{"{{vadovas}}"}</b>, <b style={{color:C.ac}}>{"{{data_nuo}}"}</b>, <b style={{color:C.ac}}>{"{{data_iki}}"}</b>, <b style={{color:C.ac}}>{"{{tel}}"}</b>, <b style={{color:C.ac}}>{"{{investNo}}"}</b> ir kt.<br/>
        Sistema automatiškai sugeneruos prašymą ir pridės siunčiant laišką.
      </div>
    </div>
  </div>;
}

// ═════════════════════════════════════════════════════════════
// SIGNATURE LIBRARY — Parašų biblioteka
// ═════════════════════════════════════════════════════════════
function SigLibrary(){
  var _sigs=useState(null);var sigs=_sigs[0],sSigs=_sigs[1];
  var _activeId=useState(null);var activeId=_activeId[0],sActiveId=_activeId[1];
  var _busy=useState(false);var busy=_busy[0],sBusy=_busy[1];
  var _adding=useState(false);var adding=_adding[0],sAdding=_adding[1];
  var _newName=useState("");var newName=_newName[0],sNewName=_newName[1];
  var _selFile=useState(null);var selFile=_selFile[0],sSelFile=_selFile[1];
  var fileRef=useRef(null);

  useEffect(function(){
    Promise.all([sGet('kl-signatures'),sGet('kl-signatory')]).then(function(res){
      sSigs(res[0]||[]);sActiveId(res[1]||null);
    });
  },[]);

  async function saveSigs(arr){await sSet('kl-signatures',arr);sSigs(arr);}

  async function setActive(id){
    await sSet('kl-signatory',id);
    sActiveId(id);
  }

  async function addSig(){
    var file=selFile||(fileRef.current&&fileRef.current.files[0]);
    if(!file){alert("Pasirinkite parašo paveikslėlį.");return;}
    if(!newName.trim()){alert("Įveskite pasirašančiojo vardą, pavardę.");return;}
    sBusy(true);
    try{
      var fd=new FormData();fd.append("file",file);
      var r=await fetch("/api/upload",{method:"POST",body:fd});
      if(!r.ok)throw new Error("HTTP "+r.status);
      var d=await r.json();
      if(d.error)throw new Error(d.error);
      var sig={id:uid(),name:newName.trim(),filename:d.filename,url:d.url,originalName:file.name,uploadedAt:new Date().toISOString()};
      var newArr=(sigs||[]).concat([sig]);
      await saveSigs(newArr);
      // Jei pirmas parašas — automatiškai nustatome kaip aktyvų
      if(newArr.length===1){await setActive(sig.id);}
      sNewName("");sSelFile(null);sAdding(false);
      if(fileRef.current)fileRef.current.value="";
    }catch(e){alert("Klaida įkeliant: "+e.message);}
    sBusy(false);
  }

  async function deleteSig(id){
    if(!confirm("Ištrinti parašą?"))return;
    var newArr=(sigs||[]).filter(function(s){return s.id!==id;});
    await saveSigs(newArr);
    // Jei ištrinome aktyvų — perkeliame į pirmą likusį
    if(activeId===id){
      var newActive=newArr.length?newArr[0].id:null;
      await sSet('kl-signatory',newActive);sActiveId(newActive);
    }
  }

  if(sigs===null)return null;

  var effectiveActive=activeId||(sigs.length?sigs[0].id:null);

  return<div style={{padding:"0 24px 24px",maxWidth:800}}>
    <div style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:C.s2,borderBottom:"1px solid "+C.b1}}>
        <div>
          <span style={{fontSize:14,fontWeight:700,color:C.tx,fontFamily:F}}>✍️ Pasirašantys asmenys</span>
          <span style={{fontSize:11,color:C.t2,fontFamily:F,marginLeft:8}}>Parašas įterpiamas į LitGrid prašymą (nepriklausomai nuo darbų vadovo)</span>
        </div>
        {!adding&&<Btn v="primary" sm onClick={function(){sAdding(true);sNewName("");}}>+ Pridėti parašą</Btn>}
      </div>
      <div style={{padding:16}}>
        {adding&&<div style={{background:C.s2,border:"1px solid "+C.ac,borderRadius:8,padding:12,marginBottom:12}}>
          <input autoFocus value={newName} onChange={function(e){sNewName(e.target.value);}}
            placeholder="Pasirašančiojo vardas, pavardė (pvz. Eimutis Šimkus)"
            style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1.5px solid "+C.ac,background:C.bg,color:C.tx,fontFamily:F,fontSize:13,outline:"none",boxSizing:"border-box",marginBottom:8}}/>
          <div style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
            <input ref={fileRef} type="file" accept="image/png,image/jpeg,image/jpg"
              onChange={function(e){sSelFile(e.target.files[0]||null);}}
              style={{fontSize:12,color:C.tx,fontFamily:F}}/>
            {selFile&&<span style={{fontSize:11,color:C.t2}}>{selFile.name}</span>}
          </div>
          <div style={{fontSize:10,color:C.t3,fontFamily:F,marginBottom:8}}>Rekomenduojama: PNG su skaidriu fonu, ~400×150px</div>
          <div style={{display:"flex",gap:8}}>
            <Btn v="primary" sm onClick={addSig} disabled={busy}>{busy?"Saugoma...":"Išsaugoti"}</Btn>
            <Btn v="secondary" sm onClick={function(){sAdding(false);sNewName("");sSelFile(null);}}>Atšaukti</Btn>
          </div>
        </div>}
        {(sigs||[]).length===0&&!adding&&<div style={{textAlign:"center",padding:"20px",color:C.t3,fontFamily:F,fontSize:12}}>
          Nėra išsaugotų parašų. Pridėkite pasirašančiojo asmens parašą.
        </div>}
        {(sigs||[]).map(function(sig){
          var isActive=sig.id===effectiveActive;
          return<div key={sig.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",background:isActive?"rgba(34,197,94,0.07)":C.bg,borderRadius:8,marginBottom:8,border:"1.5px solid "+(isActive?"#22c55e":C.b1)}}>
            {sig.url&&<img src={sig.url} alt="parašas" style={{height:40,maxWidth:130,objectFit:"contain",background:"white",borderRadius:4,padding:3,border:"1px solid "+C.b1}}/>}
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:13,fontWeight:600,color:C.tx,fontFamily:F}}>{sig.name}</span>
                {isActive&&<span style={{fontSize:10,fontWeight:700,color:"#22c55e",background:"rgba(34,197,94,0.12)",borderRadius:4,padding:"1px 6px"}}>✓ aktyvus</span>}
              </div>
              <div style={{fontSize:10,color:C.t3,fontFamily:F}}>{sig.originalName}</div>
            </div>
            {!isActive&&<Btn v="secondary" sm onClick={function(){setActive(sig.id);}}>Nustatyti kaip pasirašantį</Btn>}
            <Btn v="danger" sm onClick={function(){deleteSig(sig.id);}}>Ištrinti</Btn>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

// SYSTEM TOOLS

function SystemTools(){
  var _mailBusy=useState(false);var mailBusy=_mailBusy[0],sMailBusy=_mailBusy[1];

      .catch(function(e){sImapRes({ok:false,error:e.message});sImapBusy(false)});

      .then(function(d){sClearRes(d);sClearBusy(false)})
      .catch(function(e){sClearRes({error:e.message});sClearBusy(false)});
  }
  function reprocessUnattached(){
    sReprocBusy(true);sReprocRes(null);
    fetch("/api/admin/reprocess-unattached",{method:"POST"})
      .then(function(r){return r.json()})
      .then(function(d){sReprocRes(d);sReprocBusy(false)})

// SAV CLOSE PANEL — laukiantys atsakymai Savivaldybei
// ═════════════════════════════════════════════════════════════
function SavClosePanel(){
  var _reqs=useState([]);var reqs=_reqs[0],sReqs=_reqs[1];
  var _photos=useState({});var photos=_photos[0],sPhotos=_photos[1]; // {reqId: [files]}
  var _busy=useState({});var busy=_busy[0],sBusy=_busy[1];
  var _msg=useState({});var msg=_msg[0],sMsg=_msg[1];

  useEffect(function(){
    fetch('/api/admin/sav-close-requests').then(function(r){return r.json()}).then(function(d){
      if(d.ok)sReqs(d.requests||[]);
    }).catch(function(){});
  },[]);

  if(!reqs.length)return null;

  function fmtDt(iso){try{return new Date(iso).toLocaleDateString('lt-LT',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(_){return iso||'';}}

  return <div style={{marginBottom:20}}>
    <div style={{fontSize:11,fontWeight:700,color:C.t2,marginBottom:10,fontFamily:F,textTransform:"uppercase",letterSpacing:1}}>

    </div>

      var reqPhotos=photos[req.id]||[];

      var reqMsg=msg[req.id]||"";
      return <div key={req.id} style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:12,padding:16,marginBottom:12}}>
        {/* Laiško info */}
        <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:700,color:C.tx,fontFamily:F,marginBottom:2}}>{req.subject||"(be temos)"}</div>
            <div style={{fontSize:11,color:C.t3,fontFamily:F}}>{req.from} · {fmtDt(req.date)}</div>
            {req.address&&<div style={{fontSize:11,color:C.t2,fontFamily:F,marginTop:2}}>📍 {req.address}</div>}
          </div>
        </div>
        {/* Atsakymo peržiūra */}
        <div style={{background:C.s2,borderRadius:8,padding:"8px 12px",marginBottom:10,border:"1px solid "+C.b1,fontSize:11,color:C.t2,fontFamily:FM,whiteSpace:"pre-wrap",lineHeight:1.5}}>
          {"Laba diena,\n\nDarbai baigti, pridedu gerbūvio nuotraukas."}
        </div>
        {/* Nuotraukų įkėlimas */}
        <div style={{background:C.s2,borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1px solid "+(reqPhotos.length===0?C.yl:C.b1)}}>
          <div style={{fontSize:11,fontWeight:700,color:C.t2,fontFamily:F,marginBottom:6}}>
            Gerbūvio nuotraukos <span style={{color:C.rd}}>*</span>
            {reqPhotos.length>0&&<span style={{color:C.gn,fontWeight:600,marginLeft:6}}>{reqPhotos.length} failai</span>}
          </div>
          <FileDropZone files={reqPhotos}
            onAdd={function(f){sPhotos(function(prev){var n=Object.assign({},prev);n[req.id]=(n[req.id]||[]).concat([f]);return n;})}
            onRemove={function(i){sPhotos(function(prev){var n=Object.assign({},prev);n[req.id]=(n[req.id]||[]).filter(function(_,idx){return idx!==i});return n;})}}/>
        </div>
        {reqMsg&&<div style={{fontSize:11,color:reqMsg.startsWith("✅")?C.gn:C.rd,fontFamily:F,marginBottom:8,fontWeight:600}}>{reqMsg}</div>}
        <Btn onClick={function(){(async function(){
          if(!reqPhotos.length){sMsg(function(prev){var n=Object.assign({},prev);n[req.id]="❌ Pridėkite bent vieną nuotrauką.";return n;});return;}
          sBusy(function(prev){var n=Object.assign({},prev);n[req.id]=true;return n;});
          sMsg(function(prev){var n=Object.assign({},prev);n[req.id]="";return n;});
          try{
            var r=await fetch('/api/admin/reply-sav-closure',{method:'POST',headers:{'Content-Type':'application/json'},
              body:JSON.stringify({requestId:req.id,photoFilenames:reqPhotos.map(function(f){return f.filename}).filter(Boolean)})});
            var d=await r.json();
            if(!r.ok){sMsg(function(prev){var n=Object.assign({},prev);n[req.id]="❌ "+(d.error||"Klaida");return n;});sBusy(function(prev){var n=Object.assign({},prev);n[req.id]=false;return n;});return;}
            sMsg(function(prev){var n=Object.assign({},prev);n[req.id]="✅ Atsakymas išsiųstas!";return n;});
            sReqs(function(prev){return prev.filter(function(x){return x.id!==req.id;})});
          }catch(e){sMsg(function(prev){var n=Object.assign({},prev);n[req.id]="❌ Serverio klaida";return n;});}
          sBusy(function(prev){var n=Object.assign({},prev);n[req.id]=false;return n;});
        })()}} sm disabled={isBusy} style={{background:"#059669",color:"#fff",border:"none",opacity:isBusy?0.6:1}}>
          {isBusy?"Siunčiama...":"📤 Atsakyti Savivaldybei"}
        </Btn>
      </div>;
    })}
  </div>;
}

function checkExpired(arr){
  var today=fmtDate(new Date());
  var changed=false;
  var result=arr.map(function(permit){
    if((permit.status==="Gautas leidimas"||permit.status==="Gautas"||permit.status==="Gautas dalinai")&&permit.permitValidUntil&&permit.permitValidUntil<today){
      changed=true;
      return Object.assign({},permit,{status:"Nebegalioja",history:(permit.history||[]).concat([{status:"Nebegalioja",date:today,note:"Leidimo terminas pasibaige"}])});
    }
    return permit;
  });
  result.forEach(function(permit){
    if(permit.status!=="Gautas"||!permit.permitValidUntil)return;
    var wd=workDaysUntil(permit.permitValidUntil);
    if(wd!==5)return;
    var nKey="kl-notif-"+permit.id+"-5dd";
    if(lsGet(nKey))return;
    lsSet(nKey,true);
    var subj="Kasimo leidimas baigiasi per 5 d.d. - "+permit.organization;
    var rows=emailRow("Organizacija:",permit.organization)+emailRow("Paraiskas:",permit.id.slice(-5).toUpperCase())+emailRow("Galioja iki:",permit.permitValidUntil);
    var body=emailWrap("Leidimo terminas baigiasi","#EAB308","<p style=\"color:#374151;font-size:14px;margin:0 0 12px\">Leidimas baigia galioti "+permit.permitValidUntil+" &mdash; liko 5 darbo dienos.</p><table style=\"border-collapse:collapse;width:100%\">"+rows+"</table>");
    if(permit.email)sendEmail(permit.email,subj,body);
    sendEmail("uzklausos@energolt.eu",subj,body);
  });
  return changed?result:arr;
}

  useEffect(function(){

    if(!loaded)return;

  useEffect(function(){
    // Rašome į DB tik kai loaded įvyko (_initPermitCount nustatytas)
    // Neleidžiame perrašyti DB su tuščiu masyvu dėl race condition,
    // išskyrus kai vartotojas tyčia išvalė (clearIntent)
    if(_initPermitCount.current<0)return;
    if(permits.length===0&&_initPermitCount.current>0&&!_clearIntent.current)return;

  // Hash-based routing — atveria paraiškos detalę, kai nuoroda iš review email'o
  // ar kitas linko su #permit=XYZ paspaudžiamas. Vyksta po prisijungimo + duomenų užkrovimo.
  useEffect(function(){
    if(!loaded||!user||permits.length===0)return;
    try{
      var hash=window.location.hash||"";
      var m=hash.match(/^#permit=(.+)$/);
      if(m){
        var permitId=decodeURIComponent(m[1]);
        var found=permits.find(function(x){return x.id===permitId});
        if(found){
          setDetail(found);
          // Pašaliname hash, kad atnaujinus puslapį detalė neatsirastų vėl
          if(window.history&&window.history.replaceState){
            window.history.replaceState(null,"",window.location.pathname+window.location.search);
          }
        }
      }
    }catch(e){}
  },[loaded,user&&user.id,permits.length]);

  // stripPermitsForDb — pašalina didelius base64 data laukus iš failų prieš saugant į DB.
  // Failai jau įkelti į serverį per /api/upload — DB reikia tik metaduomenų ir serverio URL.
  function stripPermitsForDb(arr){
    return arr.map(function(permit){
      var result=permit;
      // Pašaliname data iš files
      if(permit.files&&permit.files.length>0){
        var strippedFiles=permit.files.map(function(f){
          if(!f.data)return f;
          var copy=Object.assign({},f);delete copy.data;return copy;
        });
        result=Object.assign({},result,{files:strippedFiles});
      }
      // Pašaliname data iš permitPdfs
      if(permit.permitPdfs){
        var strippedPdfs={};
        Object.keys(permit.permitPdfs).forEach(function(k){
          var pf=permit.permitPdfs[k];
          if(!pf)return;
          var copy=Object.assign({},pf);delete copy.data;
          strippedPdfs[k]=copy;
        });
        result=Object.assign({},result,{permitPdfs:strippedPdfs});
      }
      return result;
    });
  }
  // Perskaičiuoja paraiškos leidimo statusą pagal gautus PDF
  var PERMIT_PDF_ORG_KEYS={"Telia, Kaunas":"telia","Kauno energija":"ke","Kauno vandenys":"vandenys","AB ESO":"eso","LitGrid":"litgrid"};
  function calcPermitStatus(permit){
    var orgs=(permit.organizations||[]).filter(function(o){return !!PERMIT_PDF_ORG_KEYS[o];});
    if(orgs.length===0)return permit.status;
    var pdfs=permit.permitPdfs||{};
    var allHave=orgs.every(function(org){
      var key=PERMIT_PDF_ORG_KEYS[org];
      return pdfs[key]&&pdfs[key].name;
    });
    var someHave=orgs.some(function(org){
      var key=PERMIT_PDF_ORG_KEYS[org];
      return pdfs[key]&&pdfs[key].name;
    });
    if(allHave)return "Gautas leidimas";
    if(someHave)return "Gautas dalinai";
    return permit.status;
  }

  async function addPermit(permit){
    var orgs=permit.organizations||[];
    var hasTelia=orgs.indexOf("Telia, Kaunas")!==-1;
    var hasTeliaInv=orgs.indexOf("Telia, investiciniai")!==-1;
    var hasKE=orgs.indexOf("Kauno energija")!==-1;
    var hasESO=orgs.indexOf("AB ESO")!==-1;
    var hasLitgrid=orgs.indexOf("LitGrid")!==-1;
    var orgLabel=permit.organization||orgs.join(", ");
    // Automatinis priskyrimas — pirmam dokumentacijos darbuotojui
    var docWorkers=users.filter(function(u){return u.role==="dokumentacija";});
    var autoAssign=docWorkers.length>0?docWorkers[0]:null;
    var finalPermit=autoAssign
      ?Object.assign({},permit,{
          assignedTo:autoAssign.id,
          history:(permit.history||[]).concat([{status:permit.status,date:fmtDate(new Date()),note:"Automatiškai priskirta: "+autoAssign.name}])
        })
      :permit;
    // Vieną kartą iškoduojame visus PDF puslapius — perduodam tiek Telia, tiek KE, tiek LitGrid paruošimui
    var pageTexts=null;
    if(hasTelia||hasTeliaInv||hasKE||hasLitgrid){
      var pdfFile=(finalPermit.files||[]).find(function(f){return f.name&&f.name.match(/\.pdf$/i)});
      if(pdfFile&&pdfFile.data){
        try{ pageTexts=await extractPdfTextByPage(pdfFile.data); }catch(e){}
      }
    }
    if(hasTelia){
      finalPermit=await preparePendingTeliaEmail(finalPermit);
    }
    if(hasTeliaInv){
      finalPermit=await preparePendingTeliaInvEmail(finalPermit);
    }
    if(hasKE){
      var kePending=await preparePendingKauoenergijaEmail(finalPermit, pageTexts);
      finalPermit=Object.assign({},finalPermit,{pendingKauoenergijaEmail:kePending});
    }
    if(hasLitgrid){
      try{
        var lgPending=await preparePendingLitgridEmail(finalPermit, pageTexts);
        finalPermit=Object.assign({},finalPermit,{pendingLitgridEmail:lgPending});
      }catch(e){console.warn("[addPermit] LitGrid paruošimas nepavyko:",e.message);}
    }
    // Pranešimas apie naują paraišką — visoms paraiškoms
    await sendCombinedReviewNotification(finalPermit);
    savePermits(function(prev){return prev.concat([finalPermit]);});
    // Po pateikimo: orderer → mano paraiškos, kiti → inbox
    setView(user.role==="orderer"?"mine":"inbox");
  }

  function updatePermit(updated){
    if(updated.closingSubmitted){
      var prev=permits.find(function(x){return x.id===updated.id});
      if(!prev||!prev.closingSubmitted){
        var asgn=users.find(function(u){return u.id===updated.assignedTo});
        var clSubj="Pateikta leidimo uzdarymo informacija - "+updated.organization;
        var clRows=emailRow("Paraiskas:",updated.id.slice(-5).toUpperCase())+emailRow("Organizacija:",updated.organization);
        var clBody=emailWrap("Leidimo uzdarymas","#10B981","<p style=\"color:#374151;font-size:14px;margin:0 0 12px\">Uzsakovas pateike dokumentus leidimo uzdarymui.</p><table style=\"border-collapse:collapse;width:100%\">"+clRows+"</table>");
        if(asgn&&asgn.email)sendEmail(asgn.email,clSubj,clBody);
        sendEmail("uzklausos@energolt.eu",clSubj,clBody);
      }
    }
    // Automatinis statuso perskaičiavimas pagal permitPdfs
    if(updated.permitPdfs&&(updated.status==="Pateikta"||updated.status==="Gautas dalinai"||updated.status==="Laukia patvirtinimo leidimo")){
      var calcSt=calcPermitStatus(updated);
      if(calcSt!==updated.status){
        updated=Object.assign({},updated,{status:calcSt,
          history:(updated.history||[]).concat([{status:calcSt,date:fmtDate(new Date()),note:"Statusas atnaujintas automatiškai"}])});
      }
    }
    // Pranešimas užsakovui kai paraiška pateikta institucijai
    // Nebeįšaukti jei statusas į "Pateikta" pakito siuntimo metu (Telia/KE) — laiškas jau išsiųstas
    if(updated.status==="Pateikta"&&updated.email){
      var prevPat=permits.find(function(x){return x.id===updated.id});
      var wasTeliaJustSent=prevPat&&prevPat.pendingEmail&&!updated.pendingEmail;
      var wasKEJustSent=prevPat&&prevPat.pendingKauoenergijaEmail&&!updated.pendingKauoenergijaEmail;
      var wasTeliaInvJustSent=prevPat&&prevPat.pendingTeliaInvEmail&&!updated.pendingTeliaInvEmail;
      if((!prevPat||prevPat.status!=="Pateikta")&&!wasTeliaJustSent&&!wasKEJustSent&&!wasTeliaInvJustSent){
        sendPateiktaNotification(updated);
      }
    }
    // Pranešimas užsakovui kai gautas leidimas
    if((updated.status==="Gautas leidimas"||updated.status==="Gautas")&&updated.email){
      var prev=permits.find(function(x){return x.id===updated.id});
      var wasGautas=prev&&(prev.status==="Gautas leidimas"||prev.status==="Gautas");
      if(!wasGautas){
        var permitNo=updated.id?updated.id.slice(-5).toUpperCase():"?????";
        var gSubj="Kasimo leidimas gautas — "+updated.organization+" #"+permitNo;
        var permitUrl=(typeof window!=="undefined"&&window.location)
          ?(window.location.origin+window.location.pathname+"#permit="+encodeURIComponent(updated.id)):"";
        var gLinkBtn=permitUrl
          ?'<p style="margin:16px 0"><a href="'+permitUrl+'" style="color:#1155CC">Atidaryti paraišką sistemoje</a></p>':"";
        var gRows=emailRow("Paraiška Nr.:",permitNo)
          +emailRow("Organizacija:",updated.organization)
          +emailRow("Vieta:",updated.location||"-")
          +(updated.permitValidFrom?emailRow("Galioja nuo:",updated.permitValidFrom):"")
          +(updated.permitValidUntil?emailRow("Galioja iki:",updated.permitValidUntil):"");
        var gBody='<!DOCTYPE html><html><body style="margin:0;padding:0;background:#fff;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#1F2937;line-height:1.6">'
          +'<div style="max-width:600px;margin:20px auto;padding:0 16px">'
          +"<p style=\"margin:0 0 12px\">Gerb. "+(updated.manager||"")+"</p>"
          +"<p style=\"margin:0 0 12px\">informuojame, kad Jūsų kasimo leidimo paraiška <strong>#"+permitNo+"</strong> ("+updated.organization+") yra patvirtinta ir leidimas gautas.</p>"
          +"<table style=\"border-collapse:collapse;width:100%;margin:12px 0\">"+gRows+"</table>"
          +gLinkBtn
          +'</div></body></html>';
        sendEmail(updated.email,gSubj,gBody);
      }
    }
    // Kauno m. sav. notifikacija kai gauti ESO ir Telia leidimai
    var updOrgs=updated.organizations||[];
    if(updOrgs.indexOf("Kauno miesto savivaldybe")!==-1&&updated.status==="Gautas"){
      var prevForKauno=permits.find(function(x){return x.id===updated.id});
      var wasGautas=prevForKauno&&prevForKauno.status==="Gautas";
      if(!wasGautas){
        var notifKey="kl-notif-"+updated.id+"-kauno";
        if(!lsGet(notifKey)){
          lsSet(notifKey,true);
          var kRows2=emailRow("Paraiskas:",updated.id.slice(-5).toUpperCase())+emailRow("Darbu vadovas:",updated.manager)+emailRow("Laikotarpis:",updated.startDate+" – "+updated.endDate);
          var kBody2=emailWrap("Galima pateikti Kauno m. sav.","#10B981","<p style=\"color:#374151;font-size:14px;margin:0 0 12px\">Gauti visi reikalingi leidimai. Galima pateikti Kauno m. sav. leidimo paraiskas.</p><table style=\"border-collapse:collapse;width:100%\">"+kRows2+"</table>");
          sendEmail("uzklausos@energolt.eu","Galima pateikti Kauno m. sav. - "+updated.organization,kBody2);
        }
      }
    }
    savePermits(permits.map(function(x){return x.id===updated.id?updated:x}));
  }

  function doMerge(aId,bId){
    if(!aId||!bId||aId===bId)return;
    var a=permits.find(function(x){return x.id===aId});
    var b=permits.find(function(x){return x.id===bId});
    if(!a||!b)return;
    var groupId=b.manualGroupId||a.manualGroupId||b.id;
    savePermits(permits.map(function(pm){
      if(pm.id===aId||pm.id===bId||
         (b.manualGroupId&&pm.manualGroupId===b.manualGroupId)||
         (a.manualGroupId&&pm.manualGroupId===a.manualGroupId))
        return Object.assign({},pm,{manualGroupId:groupId});
      return pm;
    }));
  }
  function doUnmerge(permitId){
    savePermits(permits.map(function(pm){
      if(pm.id!==permitId)return pm;
      var u=Object.assign({},pm);delete u.manualGroupId;return u;
    }));
  }

    main=<ProfilePage user={user} onUpdated={function(u){var upd=Object.assign({},user,u);setUser(upd);try{localStorage.setItem('kl-session',JSON.stringify(upd))}catch(e){}}} onCancel={function(){setView(defView)}}/>;
  }else if(view==="users"){
    main=<UserMgmt users={users} permits={permits} onAddUser={addUser} onAssignRole={assignRole} onDeleteUser={deleteUser} onUpdateContact={updateContact} onOpenPermit={function(id){var pm=permits.find(function(x){return x.id===id});if(pm){setDetail(pm);setView("all")}}}/>;
  }else if(view==="library"){
    main=<div><DocLibrary/><SigLibrary/></div>;
  }else if(view==="system"){
    main=<SystemTools/>;
  }else{
    var titles={inbox:"Naujos paraiškos",mine:"Mano paraiškos",submitted:"Pateiktos paraiškos",permits:"Leidimai",closed:"Uždaryti objektai",all:"Visos paraiškos"};
    main=<div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:18,fontWeight:800,color:C.tx,fontFamily:F}}>{titles[view]||""}</h2>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {view==="all"&&<select value={filter} onChange={function(e){setFilter(e.target.value)}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none",cursor:"pointer"}}>
            <option value="">Visos būsenos</option>
            {Object.keys(STATUS_MAP).map(function(s){return <option key={s} value={s}>{SL[s]||s}</option>})}
          </select>}
          {view==="all"&&user.role==="admin"&&<Btn v="danger" sm onClick={function(){
            if(window.confirm("Ar tikrai istrinti VISAS "+permits.length+" paraiškas? Šio veiksmo atšaukti negalima."))
            {_clearIntent.current=true;clearPermits();}
          }}>Išvalyti visas</Btn>}
        </div>
      </div>
      {view==="all"&&<div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
        {Object.keys(STATUS_MAP).map(function(s){var n=permits.filter(function(p){return p.status===s}).length;if(!n)return null;
          return <div key={s} style={{padding:"8px 10px",borderRadius:8,background:C.s2,border:"1px solid "+C.b1,flex:"1 1 80px",minWidth:80}}>
            <div style={{fontSize:16,fontWeight:800,color:C.tx,fontFamily:F}}>{n}</div>
            <div style={{fontSize:9,color:C.t2,fontFamily:F,display:"flex",alignItems:"center",gap:3}}><span style={{width:4,height:4,borderRadius:"50%",background:STATUS_MAP[s].dot}}/>{SL[s]||s}</div>
          </div>})}
      </div>}
      {/* Merge patvirtinimo modalas */}
      {mergeConfirm&&(function(){
        var a=permits.find(function(x){return x.id===mergeConfirm.aId});
        var b=permits.find(function(x){return x.id===mergeConfirm.bId});
        if(!a||!b)return null;
        var aLoc=a.location||a.teliaRouteTo||a.investNo||a.id.slice(-5).toUpperCase();
        var bLoc=b.location||b.teliaRouteTo||b.investNo||b.id.slice(-5).toUpperCase();
        return <div onClick={function(){sMergeConfirm(null)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div onClick={function(e){e.stopPropagation()}} style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:14,padding:24,maxWidth:380,width:"90%",boxShadow:"0 8px 40px rgba(0,0,0,.3)"}}>
            <div style={{fontSize:16,fontWeight:800,color:C.tx,fontFamily:F,marginBottom:6}}>🔗 Sujungti objektus?</div>
            <div style={{fontSize:11,color:C.t2,fontFamily:F,marginBottom:14}}>Šios dvi paraiškos bus rodomos kaip vienas objektas.</div>
            <div style={{background:C.s2,borderRadius:8,padding:"8px 12px",marginBottom:6,border:"1px solid "+C.b1}}>
              <div style={{fontSize:11,color:C.tx,fontFamily:F,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{aLoc}</div>
              <div style={{fontSize:9,color:C.t3,fontFamily:F}}>{a.organization} · {a.status}</div>
            </div>
            <div style={{textAlign:"center",fontSize:10,color:C.t3,margin:"2px 0"}}>⬇</div>
            <div style={{background:C.s2,borderRadius:8,padding:"8px 12px",marginBottom:16,border:"1px solid "+C.b1}}>
              <div style={{fontSize:11,color:C.tx,fontFamily:F,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{bLoc}</div>
              <div style={{fontSize:9,color:C.t3,fontFamily:F}}>{b.organization} · {b.status}</div>
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="secondary" sm onClick={function(){sMergeConfirm(null)}}>Atšaukti</Btn>
              <Btn sm onClick={function(){doMerge(mergeConfirm.aId,mergeConfirm.bId);sMergeConfirm(null);}}>🔗 Sujungti</Btn>
            </div>
          </div>
        </div>;
      })()}
      {view==="closed"&&<SavClosePanel/>}
      {visible.length===0?<Empty icon="&#128077;" title="Paraiškų nėra."/>:(function(){
        // Grupuojame pagal manualGroupId, tada pagal investNo
        var grouped=[];
        var keyMap={};
        visible.forEach(function(pm){
          var iCode=pm.internalCode&&pm.internalCode.trim();
          var mgid=pm.manualGroupId&&pm.manualGroupId.trim();
          var inv=pm.investNo&&pm.investNo.trim();
          var key=iCode?('ic:'+iCode):mgid?('mg:'+mgid):(inv?('inv:'+inv):null);
          if(key){
            if(!keyMap[key]){
              keyMap[key]=[];
              var dispInv=iCode||inv||(mgid&&mgid.slice(-5).toUpperCase());
              grouped.push({type:"group",key:key,inv:dispInv,items:keyMap[key],manual:!!mgid&&!iCode,internalCode:iCode||null});
            }
            keyMap[key].push(pm);
          } else {
            grouped.push({type:"single",permit:pm});
          }
        });
        // Ar drag-and-drop aktyvus šiame view
        var canMerge=view==="all"||view==="inbox"||view==="permits"||view==="submitted"||view==="mine";
        return grouped.map(function(entry){
          if(entry.type==="single"){
            var pm=entry.permit;
            return <PermitRow key={pm.id} permit={pm} users={users} viewMode={view}
              draggable={canMerge}
              onDragStart={canMerge?function(e){e.dataTransfer.setData("permitId",pm.id);sDragId(pm.id);}:undefined}
              onDragOver={canMerge&&dragId&&dragId!==pm.id?function(e){e.preventDefault();sDropId(pm.id);}:undefined}
              onDragLeave={canMerge?function(){if(dropId===pm.id)sDropId(null);}:undefined}
              onDrop={canMerge?function(e){e.preventDefault();var src=e.dataTransfer.getData("permitId");if(src&&src!==pm.id){sMergeConfirm({aId:src,bId:pm.id});}sDragId(null);sDropId(null);}:undefined}
              isDragOver={dropId===pm.id&&dragId!==pm.id}
              onClick={function(){setDetail(pm)}}/>;
          }
          if(entry.items.length===1){
            var pm=entry.items[0];
            return <PermitRow key={pm.id} permit={pm} users={users} viewMode={view}
              draggable={canMerge}
              onDragStart={canMerge?function(e){e.dataTransfer.setData("permitId",pm.id);sDragId(pm.id);}:undefined}
              onDragOver={canMerge&&dragId&&dragId!==pm.id?function(e){e.preventDefault();sDropId(pm.id);}:undefined}
              onDragLeave={canMerge?function(){if(dropId===pm.id)sDropId(null);}:undefined}
              onDrop={canMerge?function(e){e.preventDefault();var src=e.dataTransfer.getData("permitId");if(src&&src!==pm.id){sMergeConfirm({aId:src,bId:pm.id});}sDragId(null);sDropId(null);}:undefined}
              isDragOver={dropId===pm.id&&dragId!==pm.id}
              onClick={function(){setDetail(pm)}}/>;
          }
          return <PermitGroup key={entry.key} group={entry.items} users={users} viewMode={view} onSelect={setDetail}
            manual={entry.manual} internalCode={entry.internalCode||null} onUnmerge={entry.manual?doUnmerge:undefined}
            onDragStart={canMerge?function(e,pmId){e.dataTransfer.setData("permitId",pmId);sDragId(pmId);}:undefined}
            onDragOver={canMerge&&dragId?function(e){e.preventDefault();}:undefined}
            onDrop={canMerge?function(e){e.preventDefault();var src=e.dataTransfer.getData("permitId");var tgt=entry.items[0].id;if(src&&src!==tgt){sMergeConfirm({aId:src,bId:tgt});}sDragId(null);sDropId(null);}:undefined}
            dragId={dragId}/>;
        });
      })()}
    </div>;
  }

  return <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
    <Sidebar user={user} view={view} onNav={function(v){if(v!=="new")setPrefill(null);setView(v);}} onLogout={handleLogout} onTheme={toggleTheme} theme={theme} newCount={newCount} pendingCount={pendingCount} closingCount={closingCount}/>
    <main style={{flex:1,overflowY:"auto",padding:"24px 28px"}}>{main}</main>
    {detail&&<PermitDetail permit={detail} user={user} users={users} surveyors={docsWorkers}
      onUpdate={function(u){updatePermit(u);setDetail(u)}}
      onSend={function(u){updatePermit(u);setDetail(null)}}
      onDelete={function(id){deletePermit(id);setDetail(null)}}
      onClose={function(){setDetail(null)}}/>}
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);</script>
</body>
</html>
