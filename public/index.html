function checkExpired(arr){
  var today=fmtDate(new Date());
  var changed=false;
  var result=arr.map(function(permit){
    if((permit.status==="Gautas leidimas"||permit.status==="Gautas"||permit.status==="Gautas dalinai")&&permit.permitValidUntil&&permit.permitValidUntil<today){
      changed=true;
      return Object.assign({},permit,{status:"Nebegalioja",history:(permit.history||[]).concat([{status:"Nebegalioja",date:today,note:"Leidimo terminas pasibaige"}])});
    }
    return permit;
  });
  result.forEach(function(permit){
    if(permit.status!=="Gautas"||!permit.permitValidUntil)return;
    var wd=workDaysUntil(permit.permitValidUntil);
    if(wd!==5)return;
    var nKey="kl-notif-"+permit.id+"-5dd";
    if(lsGet(nKey))return;
    lsSet(nKey,true);
    var subj="Kasimo leidimas baigiasi per 5 d.d. - "+permit.organization;
    var rows=emailRow("Organizacija:",permit.organization)+emailRow("Paraiskas:",permit.id.slice(-5).toUpperCase())+emailRow("Galioja iki:",permit.permitValidUntil);
    var body=emailWrap("Leidimo terminas baigiasi","#EAB308","<p style=\"color:#374151;font-size:14px;margin:0 0 12px\">Leidimas baigia galioti "+permit.permitValidUntil+" &mdash; liko 5 darbo dienos.</p><table style=\"border-collapse:collapse;width:100%\">"+rows+"</table>");
    if(permit.email)sendEmail(permit.email,subj,body);
    sendEmail("uzklausos@energolt.eu",subj,body);
  });
  return changed?result:arr;
}

function App(){
  var _user=useState(null);var user=_user[0],setUser=_user[1];
  var _view=useState("inbox");var view=_view[0],setView=_view[1];
  var _permits=useState([]);var permits=_permits[0],setPermits=_permits[1];
  var _users=useState([]);var users=_users[0],setUsers=_users[1];
  var _detail=useState(null);var detail=_detail[0],setDetail=_detail[1];
  var _theme=useState(_t0);var theme=_theme[0],setTheme=_theme[1];
  var _filter=useState("");var filter=_filter[0],setFilter=_filter[1];
  var _loaded=useState(false);var loaded=_loaded[0],sL=_loaded[1];

  useEffect(function(){(async function(){
    try{
      var u=await sGet("kl-users");
      var raw=await sGet("kl-permits");
      if(u&&u.length>0)setUsers(u.map(function(x){var s=Object.assign({},x);delete s.password;return s}));
      if(raw&&raw.length>0){
        var today=fmtDate(new Date());
        var checked=raw.map(function(permit){
          // Migracija: "Pildoma" → "Laukiama tvirtinimo"
          if(permit.status==="Pildoma"){
            return Object.assign({},permit,{status:"Laukiama tvirtinimo"});
          }
          // Pasibaigusių leidimų statusas
          if((permit.status==="Gautas leidimas"||permit.status==="Gautas")&&permit.permitValidUntil&&permit.permitValidUntil<today){
            return Object.assign({},permit,{status:"Nebegalioja",history:(permit.history||[]).concat([{status:"Nebegalioja",date:today,note:"Leidimo terminas pasibaige"}])});
          }
          return permit;
        });
        setPermits(checked);
      }
      try{var s=localStorage.getItem('kl-session');if(s){var sess=JSON.parse(s);var fu=(u||[]).find(function(x){return x.id===sess.id});if(fu){setUser(fu)}else{setUser(sess)}}}catch(e){}
    }catch(e){}
    sL(true);
  })()},[]);

  useEffect(function(){
    if(!user)return;
    if(user.role==="orderer")setView("mine");
    else if(user.role==="dokumentacija")setView("inbox");
    else setView("inbox");
  },[user&&user.id]);

  var _initPermitCount=useRef(-1);
  var _clearIntent=useRef(false);
  useEffect(function(){
    // Įsimename kiek paraiškų gavome iš serverio (gali būti 0 jei tuščia DB)
    // Šis useEffect paleisčiamas TIK vieną kartą (po loaded)
    if(!loaded)return;
    _initPermitCount.current=permits.length;
  },[loaded]);
  useEffect(function(){
    // Rašome į DB tik kai loaded įvyko (_initPermitCount nustatytas)
    // Neleidžiame perrašyti DB su tuščiu masyvu dėl race condition,
    // išskyrus kai vartotojas tyčia išvalė (clearIntent)
    if(_initPermitCount.current<0)return;
    if(permits.length===0&&_initPermitCount.current>0&&!_clearIntent.current)return;
    _clearIntent.current=false;
    // Pašaliname didelius data laukus prieš saugant
    sSet("kl-permits",stripPermitsForDb(permits));
  },[permits]);

  // Hash-based routing — atveria paraiškos detalę, kai nuoroda iš review email'o
  // ar kitas linko su #permit=XYZ paspaudžiamas. Vyksta po prisijungimo + duomenų užkrovimo.
  useEffect(function(){
    if(!loaded||!user||permits.length===0)return;
    try{
      var hash=window.location.hash||"";
      var m=hash.match(/^#permit=(.+)$/);
      if(m){
        var permitId=decodeURIComponent(m[1]);
        var found=permits.find(function(x){return x.id===permitId});
        if(found){
          setDetail(found);
          // Pašaliname hash, kad atnaujinus puslapį detalė neatsirastų vėl
          if(window.history&&window.history.replaceState){
            window.history.replaceState(null,"",window.location.pathname+window.location.search);
          }
        }
      }
    }catch(e){}
  },[loaded,user&&user.id,permits.length]);

  // stripPermitsForDb — pašalina didelius base64 data laukus iš failų prieš saugant į DB.
  // Failai jau įkelti į serverį per /api/upload — DB reikia tik metaduomenų ir serverio URL.
  function stripPermitsForDb(arr){
    return arr.map(function(permit){
      var result=permit;
      // Pašaliname data iš files
      if(permit.files&&permit.files.length>0){
        var strippedFiles=permit.files.map(function(f){
          if(!f.data)return f;
          var copy=Object.assign({},f);delete copy.data;return copy;
        });
        result=Object.assign({},result,{files:strippedFiles});
      }
      // Pašaliname data iš permitPdfs
      if(permit.permitPdfs){
        var strippedPdfs={};
        Object.keys(permit.permitPdfs).forEach(function(k){
          var pf=permit.permitPdfs[k];
          if(!pf)return;
          var copy=Object.assign({},pf);delete copy.data;
          strippedPdfs[k]=copy;
        });
        result=Object.assign({},result,{permitPdfs:strippedPdfs});
      }
      return result;
    });
  }
  // Perskaičiuoja paraiškos leidimo statusą pagal gautus PDF
  function calcPermitStatus(permit){
    var orgs=(permit.organizations||[]).filter(function(o){return o==="Telia, Kaunas"||o==="Kauno energija";});
    if(orgs.length===0)return permit.status;
    var pdfs=permit.permitPdfs||{};
    var allHave=orgs.every(function(org){
      var key=org==="Telia, Kaunas"?"telia":"ke";
      return pdfs[key]&&pdfs[key].name;
    });
    var someHave=orgs.some(function(org){
      var key=org==="Telia, Kaunas"?"telia":"ke";
      return pdfs[key]&&pdfs[key].name;
    });
    if(allHave)return "Gautas leidimas";
    if(someHave)return "Gautas dalinai";
    return permit.status;
  }
  function savePermits(arr){var checked=checkExpired(arr);setPermits(checked);}
  function clearPermits(){_clearIntent.current=true;setPermits([]);}

  function handleLogin(u){
    setUser(u);
    try{localStorage.setItem('kl-session',JSON.stringify(u))}catch(e){}
    if(u.role==="pending")return;
    if(u.role==="orderer")setView("mine");
    else setView("inbox");
  }
  function handleLogout(){setUser(null);try{localStorage.removeItem('kl-session')}catch(e){}}
  function toggleTheme(){
    var t=theme==="dark"?"light":"dark";
    setTheme(t);
    Object.assign(C,t==="dark"?DARK_C:LIGHT_C);
    STATUS_MAP=buildStatusMap();
    document.body.setAttribute('data-theme',t);
    try{localStorage.setItem('kl-theme',t)}catch(e){}
  }

  async function addPermit(permit){
    var orgs=permit.organizations||[];
    var hasTelia=orgs.indexOf("Telia, Kaunas")!==-1;
    var hasKE=orgs.indexOf("Kauno energija")!==-1;
    var hasESO=orgs.indexOf("AB ESO")!==-1;
    var orgLabel=permit.organization||orgs.join(", ");
    // Automatinis priskyrimas — pirmam dokumentacijos darbuotojui
    var docWorkers=users.filter(function(u){return u.role==="dokumentacija";});
    var autoAssign=docWorkers.length>0?docWorkers[0]:null;
    var finalPermit=autoAssign
      ?Object.assign({},permit,{
          assignedTo:autoAssign.id,
          history:(permit.history||[]).concat([{status:permit.status,date:fmtDate(new Date()),note:"Automatiškai priskirta: "+autoAssign.name}])
        })
      :permit;
    // Vieną kartą iškoduojame visus PDF puslapius — perduodam tiek Telia, tiek KE paruošimui
    var pageTexts=null;
    if(hasTelia||hasKE){
      var pdfFile=(finalPermit.files||[]).find(function(f){return f.name&&f.name.match(/\.pdf$/i)});
      if(pdfFile&&pdfFile.data){
        try{ pageTexts=await extractPdfTextByPage(pdfFile.data); }catch(e){}
      }
    }
    if(hasTelia){
      finalPermit=await preparePendingTeliaEmail(finalPermit);
    }
    if(hasKE){
      var kePending=await preparePendingKauoenergijaEmail(finalPermit, pageTexts);
      finalPermit=Object.assign({},finalPermit,{pendingKauoenergijaEmail:kePending});
    }
    // Pranešimas apie naują paraišką — visoms paraiškoms
    await sendCombinedReviewNotification(finalPermit);
    savePermits(permits.concat([finalPermit]));
    // Po pateikimo: orderer → mano paraiškos, kiti → inbox
    setView(user.role==="orderer"?"mine":"inbox");
  }

  function updatePermit(updated){
    if(updated.closingSubmitted){
      var prev=permits.find(function(x){return x.id===updated.id});
      if(!prev||!prev.closingSubmitted){
        var asgn=users.find(function(u){return u.id===updated.assignedTo});
        var clSubj="Pateikta leidimo uzdarymo informacija - "+updated.organization;
        var clRows=emailRow("Paraiskas:",updated.id.slice(-5).toUpperCase())+emailRow("Organizacija:",updated.organization);
        var clBody=emailWrap("Leidimo uzdarymas","#10B981","<p style=\"color:#374151;font-size:14px;margin:0 0 12px\">Uzsakovas pateike dokumentus leidimo uzdarymui.</p><table style=\"border-collapse:collapse;width:100%\">"+clRows+"</table>");
        if(asgn&&asgn.email)sendEmail(asgn.email,clSubj,clBody);
        sendEmail("uzklausos@energolt.eu",clSubj,clBody);
      }
    }
    // Automatinis statuso perskaičiavimas pagal permitPdfs
    if(updated.permitPdfs&&(updated.status==="Pateikta"||updated.status==="Gautas dalinai"||updated.status==="Laukia patvirtinimo leidimo")){
      var calcSt=calcPermitStatus(updated);
      if(calcSt!==updated.status){
        updated=Object.assign({},updated,{status:calcSt,
          history:(updated.history||[]).concat([{status:calcSt,date:fmtDate(new Date()),note:"Statusas atnaujintas automatiškai"}])});
      }
    }
    // Pranešimas užsakovui kai paraiška pateikta institucijai
    if(updated.status==="Pateikta"&&updated.email){
      var prevPat=permits.find(function(x){return x.id===updated.id});
      if(!prevPat||prevPat.status!=="Pateikta"){
        sendPateiktaNotification(updated);
      }
    }
    // Pranešimas užsakovui kai gautas leidimas
    if((updated.status==="Gautas leidimas"||updated.status==="Gautas")&&updated.email){
      var prev=permits.find(function(x){return x.id===updated.id});
      var wasGautas=prev&&(prev.status==="Gautas leidimas"||prev.status==="Gautas");
      if(!wasGautas){
        var permitNo=updated.id?updated.id.slice(-5).toUpperCase():"?????";
        var gSubj="Kasimo leidimas gautas — "+updated.organization+" #"+permitNo;
        var permitUrl=(typeof window!=="undefined"&&window.location)
          ?(window.location.origin+window.location.pathname+"#permit="+encodeURIComponent(updated.id)):"";
        var gLinkBtn=permitUrl
          ?'<p style="margin:16px 0"><a href="'+permitUrl+'" style="color:#1155CC">Atidaryti paraišką sistemoje</a></p>':"";
        var gRows=emailRow("Paraiška Nr.:",permitNo)
          +emailRow("Organizacija:",updated.organization)
          +emailRow("Vieta:",updated.location||"-")
          +(updated.permitValidFrom?emailRow("Galioja nuo:",updated.permitValidFrom):"")
          +(updated.permitValidUntil?emailRow("Galioja iki:",updated.permitValidUntil):"");
        var gBody='<!DOCTYPE html><html><body style="margin:0;padding:0;background:#fff;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#1F2937;line-height:1.6">'
          +'<div style="max-width:600px;margin:20px auto;padding:0 16px">'
          +"<p style=\"margin:0 0 12px\">Gerb. "+(updated.manager||"")+"</p>"
          +"<p style=\"margin:0 0 12px\">informuojame, kad Jūsų kasimo leidimo paraiška <strong>#"+permitNo+"</strong> ("+updated.organization+") yra patvirtinta ir leidimas gautas.</p>"
          +"<table style=\"border-collapse:collapse;width:100%;margin:12px 0\">"+gRows+"</table>"
          +gLinkBtn
          +'</div></body></html>';
        sendEmail(updated.email,gSubj,gBody);
      }
    }
    // Kauno m. sav. notifikacija kai gauti ESO ir Telia leidimai
    var updOrgs=updated.organizations||[];
    if(updOrgs.indexOf("Kauno miesto savivaldybe")!==-1&&updated.status==="Gautas"){
      var prevForKauno=permits.find(function(x){return x.id===updated.id});
      var wasGautas=prevForKauno&&prevForKauno.status==="Gautas";
      if(!wasGautas){
        var notifKey="kl-notif-"+updated.id+"-kauno";
        if(!lsGet(notifKey)){
          lsSet(notifKey,true);
          var kRows2=emailRow("Paraiskas:",updated.id.slice(-5).toUpperCase())+emailRow("Darbu vadovas:",updated.manager)+emailRow("Laikotarpis:",updated.startDate+" – "+updated.endDate);
          var kBody2=emailWrap("Galima pateikti Kauno m. sav.","#10B981","<p style=\"color:#374151;font-size:14px;margin:0 0 12px\">Gauti visi reikalingi leidimai. Galima pateikti Kauno m. sav. leidimo paraiskas.</p><table style=\"border-collapse:collapse;width:100%\">"+kRows2+"</table>");
          sendEmail("uzklausos@energolt.eu","Galima pateikti Kauno m. sav. - "+updated.organization,kBody2);
        }
      }
    }
    savePermits(permits.map(function(x){return x.id===updated.id?updated:x}));
  }

  function deletePermit(id){savePermits(permits.filter(function(x){return x.id!==id}))}

  async function addUser(u){
    try{
      var r=await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(u)});
      var d=await r.json();
      if(!r.ok){alert(d.error||'Nepavyko sukurti vartotojo.');return;}
      setUsers(function(p){return p.concat([d.user])});
    }catch(e){alert('Serverio klaida kuriant vartotoją.');}
  }
  async function assignRole(userId,role){
    try{
      var r=await fetch('/api/users/'+userId+'/role',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:role})});
      if(!r.ok){var err=await r.json().catch(function(){return{}});alert(err.error||'Nepavyko pakeisti rolės.');return;}
      var d=await r.json();
      setUsers(function(p){return p.map(function(u){return u.id===userId?Object.assign({},u,{role:d.user.role}):u})});
    }catch(e){alert('Serverio klaida keičiant rolę.');}
  }
  async function deleteUser(id){
    try{
      var r=await fetch('/api/users/'+id,{method:'DELETE'});
      var d=await r.json();
      if(!r.ok){alert(d.error||'Nepavyko ištrinti vartotojo.');return;}
      setUsers(function(p){return p.filter(function(u){return u.id!==id})});
    }catch(e){alert('Serverio klaida trinant vartotoją.');}
  }
  function onPasswordChanged(u){
    setUser(u);try{localStorage.setItem('kl-session',JSON.stringify(u))}catch(e){}
    if(u.role==="orderer")setView("mine");
    else setView("inbox");
  }
  async function updateContact(userId,data){
    try{
      var r=await fetch('/api/users/'+userId+'/contact',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      var d=await r.json();
      if(!r.ok){alert(d.error||'Nepavyko išsaugoti.');return;}
      setUsers(function(p){return p.map(function(u){return u.id===userId?Object.assign({},u,d.user):u})});
      if(user.id===userId){var upd=Object.assign({},user,d.user);setUser(upd);try{localStorage.setItem('kl-session',JSON.stringify(upd))}catch(e){}}
    }catch(e){alert('Serverio klaida.');}
  }

  if(!user)return <AuthScreen onLogin={handleLogin} onTheme={toggleTheme} theme={theme}/>;
  if(user.mustChangePassword)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,padding:16}}><PasswordChangePage user={user} onChanged={onPasswordChanged}/></div>;
  if(user.role==="pending")return <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,padding:16}}>
    <div style={{width:"100%",maxWidth:400,textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:16}}>&#x23F3;</div>
      <h2 style={{fontSize:20,fontWeight:800,color:C.tx,marginBottom:8}}>Laukiama patvirtinimo</h2>
      <p style={{color:C.t2,fontSize:13,marginBottom:24,lineHeight:1.6}}>Jusu paskyra sekmingai sukurta.<br/>Administratorius turi priskirti jums role.</p>
      <div style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:12,padding:16,marginBottom:20}}>
        <div style={{fontSize:11,color:C.t3,fontFamily:FM,marginBottom:4}}>Prisijunges kaip</div>
        <div style={{fontSize:13,fontWeight:700,color:C.tx}}>{user.name}</div>
        <div style={{fontSize:11,color:C.t2}}>{user.email||user.username}</div>
      </div>
      <button onClick={handleLogout} style={{background:"none",border:"1px solid "+C.b1,borderRadius:8,color:C.t2,padding:"8px 20px",cursor:"pointer",fontFamily:F,fontSize:12}}>Atsijungti</button>
    </div>
  </div>;

  var docsWorkers=users.filter(function(u){return u.role==="dokumentacija"});
  // Inbox = paraiškos laukiančios patvirtinimo (visos rolės mato visas)
  var inboxStatuses=["Laukiama tvirtinimo","Naujas"];
  var newCount=permits.filter(function(p){return inboxStatuses.indexOf(p.status)!==-1}).length;
  var pendingCount=users.filter(function(u){return u.role==="pending"}).length;
  var closingCount=permits.filter(function(p){return p.closingSubmitted&&!p.closingDone}).length;
  // Leidimų statusai
  var permitStatuses=["Gautas leidimas","Gautas dalinai","Laukia patvirtinimo leidimo","Gautas","Nebegalioja"];
  // Pateiktų paraiškų statusai
  var submittedStatuses=["Pateikta"];

  var visible=[];
  if(view==="mine") visible=permits.filter(function(p){return p.createdBy===user.id});
  else if(view==="inbox") visible=permits.filter(function(p){return inboxStatuses.indexOf(p.status)!==-1});
  else if(view==="submitted") visible=permits.filter(function(p){return submittedStatuses.indexOf(p.status)!==-1});
  else if(view==="permits"){
    // Leidimai: admin/dok mato visas, užsakovas — tik savo
    if(user.role==="orderer") visible=permits.filter(function(p){return permitStatuses.indexOf(p.status)!==-1&&p.createdBy===user.id});
    else visible=permits.filter(function(p){return permitStatuses.indexOf(p.status)!==-1});
  }
  else if(view==="all") visible=permits.slice();
  if(filter)visible=visible.filter(function(p){return p.status===filter});
  visible=visible.slice().sort(function(a,b){return (b.createdAt||"")>(a.createdAt||"")?1:-1});

  var main=null;
  if(view==="new"&&(user.role==="orderer"||user.role==="admin"||user.role==="dokumentacija")){
    var cancelView=user.role==="orderer"?"mine":user.role==="dokumentacija"?"inbox":"inbox";
    main=<PermitForm user={user} users={users} onSubmit={addPermit} onCancel={function(){setView(cancelView)}}/>;
  }else if(view==="schedule"){
    // Leidimų grafike tik paraiškos su leidimu
    var schedPermits=user.role==="orderer"
      ?permits.filter(function(p){return permitStatuses.indexOf(p.status)!==-1&&p.createdBy===user.id})
      :permits.filter(function(p){return permitStatuses.indexOf(p.status)!==-1});
    main=<ScheduleView permits={schedPermits} users={users} onSelect={function(permit){setDetail(permit)}}/>;
  }else if(view==="profile"){
    var defView=user.role==="orderer"?"mine":"inbox";
    main=<ProfilePage user={user} onUpdated={function(u){var upd=Object.assign({},user,u);setUser(upd);try{localStorage.setItem('kl-session',JSON.stringify(upd))}catch(e){}}} onCancel={function(){setView(defView)}}/>;
  }else if(view==="users"){
    main=<UserMgmt users={users} permits={permits} onAddUser={addUser} onAssignRole={assignRole} onDeleteUser={deleteUser} onUpdateContact={updateContact} onOpenPermit={function(id){var pm=permits.find(function(x){return x.id===id});if(pm){setDetail(pm);setView("all")}}}/>;
  }else{
    var titles={inbox:"Naujos paraiškos",mine:"Mano paraiškos",submitted:"Pateiktos paraiškos",permits:"Leidimai",all:"Visos paraiškos"};
    main=<div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
        <h2 style={{fontSize:18,fontWeight:800,color:C.tx,fontFamily:F}}>{titles[view]||""}</h2>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {view==="all"&&<select value={filter} onChange={function(e){setFilter(e.target.value)}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid "+C.b1,background:C.s2,color:C.t2,fontFamily:F,fontSize:11,outline:"none",cursor:"pointer"}}>
            <option value="">Visos būsenos</option>
            {Object.keys(STATUS_MAP).map(function(s){return <option key={s} value={s}>{SL[s]||s}</option>})}
          </select>}
          {view==="all"&&user.role==="admin"&&<Btn v="danger" sm onClick={function(){
            if(window.confirm("Ar tikrai istrinti VISAS "+permits.length+" paraiškas? Šio veiksmo atšaukti negalima."))
            {_clearIntent.current=true;clearPermits();}
          }}>Išvalyti visas</Btn>}
        </div>
      </div>
      {view==="all"&&<div style={{display:"flex",gap:5,marginBottom:12,flexWrap:"wrap"}}>
        {Object.keys(STATUS_MAP).map(function(s){var n=permits.filter(function(p){return p.status===s}).length;if(!n)return null;
          return <div key={s} style={{padding:"8px 10px",borderRadius:8,background:C.s2,border:"1px solid "+C.b1,flex:"1 1 80px",minWidth:80}}>
            <div style={{fontSize:16,fontWeight:800,color:C.tx,fontFamily:F}}>{n}</div>
            <div style={{fontSize:9,color:C.t2,fontFamily:F,display:"flex",alignItems:"center",gap:3}}><span style={{width:4,height:4,borderRadius:"50%",background:STATUS_MAP[s].dot}}/>{SL[s]||s}</div>
          </div>})}
      </div>}
      {visible.length===0?<Empty icon="&#128077;" title="Paraiškų nėra."/>:visible.map(function(permit){return <PermitRow key={permit.id} permit={permit} users={users} viewMode={view} onClick={function(){setDetail(permit)}}/>})}
    </div>;
  }

  return <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
    <Sidebar user={user} view={view} onNav={setView} onLogout={handleLogout} onTheme={toggleTheme} theme={theme} newCount={newCount} pendingCount={pendingCount} closingCount={closingCount}/>
    <main style={{flex:1,overflowY:"auto",padding:"24px 28px"}}>{main}</main>
    {detail&&<PermitDetail permit={detail} user={user} users={users} surveyors={docsWorkers}
      onUpdate={function(u){updatePermit(u);setDetail(u)}}
      onDelete={function(id){deletePermit(id);setDetail(null)}}
      onClose={function(){setDetail(null)}}/>}
  </div>
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);</script>
</body>
</html>
