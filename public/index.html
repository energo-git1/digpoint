// ── PDF teksto nuskaitymas (investicinis nr.) ─────────────────
async function extractPdfText(dataUrl){
  try{
    var base64=dataUrl.split(',')[1];
    var binary=atob(base64);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    var pdf=await pdfjsLib.getDocument({data:bytes}).promise;
    var text='';
    for(var p=1;p<=Math.min(pdf.numPages,5);p++){
      var page=await pdf.getPage(p);
      var tc=await page.getTextContent();
      text+=tc.items.map(function(i){return i.str}).join(' ')+'\n';
    }
    return text;
  }catch(e){return ''}
}

// Skaito KIEKVIENO puslapio tekstą atskirai į masyvą
// (skirtingai nei extractPdfText, kuris nuskaito tik 5 pirmus puslapius ir sumuoja)
async function extractPdfTextByPage(dataUrl){
  try{
    var base64=dataUrl.split(',')[1];
    var binary=atob(base64);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    var pdf=await pdfjsLib.getDocument({data:bytes}).promise;
    var pages=[];
    for(var p=1;p<=pdf.numPages;p++){
      var page=await pdf.getPage(p);
      var tc=await page.getTextContent();
      pages.push(tc.items.map(function(i){return i.str}).join(' '));
    }
    return pages; // 1-mas puslapis = pages[0], etc.
  }catch(e){return []}
}

// Telia derinimo aptikimas — naujas algoritmas pagal pritarimų lentelės derintojo vardą:
//   1) Rasti PROJEKTO PRITARIMŲ LENTELĖ puslapį
//   2) Iš jo ištraukti Telia derintojo vardą (pvz., "Vytautas Stravinskas")
//   3) Sukurti lankstų regex (pagauna ir "V. Stravinskas" formą)
//   4) Telia derinimas = brėžinio puslapis + tas vardas
//
// Fallback (jei pritarimų lentelės nėra arba vardo neištraukėm):
//   Brėžinys + bendrieji Telia raktažodžiai (kaip ir ankstesnė versija).
function findTeliaApprovalPage(pageTexts){
  var tablePage=findProjectApprovalsTablePage(pageTexts);
  if(tablePage){
    var name=extractTeliaApproverName(pageTexts[tablePage-1]);
    if(name){
      var nameRe=buildApproverNameRegex(name);
      if(nameRe){
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue; // praleidžiame pačią lentelę
          if(isDrawingPageText(pageTexts[i])&&nameRe.test(pageTexts[i]))return i+1;
        }
      }
    }
  }
  // Fallback — brėžinys + bendrieji Telia raktažodžiai
  for(var j=0;j<pageTexts.length;j++){
    if(j+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[j])&&hasTeliaMarkers(pageTexts[j]))return j+1;
  }
  return null;
}

// PROJEKTO PRITARIMŲ LENTELĖS puslapio aptikimas — labiau lanksti paieška.
// Ieškome "PRITARIM" + "LENTEL" žodžių dalių tame pačiame puslapyje (PDF teksto
// ekstrakcija gali iškraipyti tarpus ar specialius simbolius, todėl negalima reikalauti
// griežto fraziavimo). Tikrinama tik per pirmuosius 20 puslapių (lentelė visada projekto pradžioje).
function findProjectApprovalsTablePage(pageTexts){
  var max=Math.min(pageTexts.length,20);
  for(var i=0;i<max;i++){
    var t=pageTexts[i];
    if(t&&/PRITARIM/i.test(t)&&/LENTEL/i.test(t))return i+1;
  }
  return null;
}

// Iš pritarimų lentelės teksto ištraukia VISŲ institucijų derintojų vardus.
// Naudojama projekto brėžinio aptikime — atrenkant puslapius BE jokio derintojo vardo.
function extractAllApproverNames(tableText){
  if(!tableText)return [];
  var names=[];
  var nameRegex=/\b([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]{2,})\s+([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]{3,})\b/g;
  // Žodžiai, dažnai pasitaikantys institucijų pavadinimuose ir lentelės antraštėse —
  // jeigu pirmasis ar antrasis žodis sutampa su šiuo sąrašu, tai NĖRA asmens vardas.
  var instWord=/^(Telia|Kauno|Lietuvos|UAB|AB|Energijos|Eil|Statybos|Tinklo|Vyresnioji|Vyresnysis|Vyresnis|Inžinierius|Inžinierė|Kultūros|Miesto|Infrastruktūros|Techninio|Techninės|Projektų|Dujų|paveldo|Ministerijos|Skirstymo|Operatoriaus|Vandenys|Šilumos|Energija|Pavadinimas|Asmuo|Pastabos|Specialistas|Komanda|Resursų|Lietuva|Departamento|Teritorinio|Skyriaus|Poskyrio|Administravimo|Eksplotavimo|Valdymo|Grupės|Padalinio|Savivaldybės|Savivaldybes|Administracijos)$/i;
  var match;
  while((match=nameRegex.exec(tableText))!==null){
    if(instWord.test(match[1])||instWord.test(match[2]))continue;
    names.push(match[0]);
  }
  // Pašaliname dublikatus
  var seen={};
  return names.filter(function(n){if(seen[n])return false;seen[n]=true;return true;});
}

// Iš pritarimų lentelės teksto ištraukia Telia derintojo vardą.
// Tikisi, kad PDF tekste eilutė atrodo: "...Telia Lietuva  Vytautas Stravinskas  2025-11-03..."
// Palaiko tiek pilną vardą, tiek inicialinį formatą.
function extractTeliaApproverName(tableText){
  if(!tableText)return null;
  // Lokali paieška ~250 simbolių aplink "Telia"
  var ctx=tableText.match(/(?:AB\s+)?Telia\s+Lietuva[\s\S]{0,250}/i);
  if(!ctx)return null;
  var seg=ctx[0];
  // "Vytautas Stravinskas" arba "V. Stravinskas" arba "V Stravinskas"
  var m=seg.match(/([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+\s+[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/);
  if(m&&m[1]){
    var candidate=m[1].trim();
    // Atmetame, jei vardas pateko į institucijos pavadinimą („Telia Lietuva")
    if(/^Telia\s+Lietuva$/i.test(candidate)){
      // Pereiname į pratęsimą po šio matčo
      var rest=seg.slice(seg.indexOf(candidate)+candidate.length);
      var m2=rest.match(/([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+\s+[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/);
      if(m2&&m2[1])return m2[1].trim();
      return null;
    }
    return candidate;
  }
  // Inicialinis formatas: V. Stravinskas
  var mi=seg.match(/([A-ZĄČĘĖĮŠŲŪŽ]\.\s*[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/);
  return mi&&mi[1]?mi[1].trim():null;
}

// Sudaro lankstų regex iš vardo, kuris pagauna variacijas:
//   "Vytautas Stravinskas" → pagaus ir "V. Stravinskas" / "V Stravinskas" / "VYTAUTAS STRAVINSKAS"
function buildApproverNameRegex(name){
  if(!name)return null;
  var parts=name.split(/\s+/).filter(function(p){return p.length>0});
  if(parts.length<2)return null;
  var firstRaw=parts[0].replace(/\.+$/,"");
  var lastName=parts[parts.length-1];
  var firstInitial=firstRaw.charAt(0);
  // Escape special regex chars in names (just in case)
  function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}
  var pat="("+esc(firstRaw)+"\\s+"+esc(lastName)+"|"+esc(firstInitial)+"\\.?\\s+"+esc(lastName)+")";
  return new RegExp(pat,"i");
}

// Projekto brėžinio raktažodžiai — bendras šablonas, naudojamas tiek projekto brėžinio,
// tiek Telia derinimo (kuris yra brėžinys + Telia parašas) aptikime.
//
// SVARBU: tikras brėžinio puslapis turi turėti ne tik antraštės pavadinimą,
// bet ir bent vieną iš brėžinio specifinių požymių (mastelis, koordinatės, žymėjimai).
// Tai būtina, kad nesukluptume ant informacinių sąrašų (pvz., "8. BRĖŽINIAI" turinio puslapio,
// kuriame brėžiniai tik išvardyti tekstu, bet pati grafinė schema nėra).
function isDrawingPageText(text){
  if(!text)return false;
  // Kampinis štampas — patikimiausias požymis kad tai tikras brėžinys.
  // EnergoLT projektuose štampe visada yra: PDV + Proj. + STATYTOJAS arba DOKUMENTO PAVADINIMAS
  var hasStampas=(
    /\bPDV\b/.test(text)&&/\bProj\./.test(text)&&
    (/STATYTOJAS/i.test(text)||/DOKUMENTO\s+PAVADINIMAS/i.test(text)||/UAB\s+.{0,10}EnergoLT/i.test(text))
  );
  if(hasStampas){
    // Papildoma apsauga — jei tai titulinis lapas ar sudėties žiniaraštis, atmetame
    // (jie taip pat turi štampą, bet nėra brėžiniai)
    var isNotDrawing=/PROJEKTO\s+DOKUMENTŲ\s+SUDĖTIES|PROJEKTO\s+BENDRIEJI\s+RODIKLIAI|PROJEKTO\s+PRITARIMŲ\s+LENTELĖ|AIŠKINAMOJI\s+DALIS|ŽINIARAŠTIS|KABELIŲ\s+MONTAVIMO|TEISĖS\s+AKTAI|ĮTAKOS\s+SKIRSTOMAJAM|PRINCIPIN[ĖE]\s+SCHEMA|Principin[ėe]\s+schema|PRINCIPIN[ĖE]S?\s+SCHEМ|VIZUALIZACIJ|Vizualizacij|SCHEMA\s+\d|Principin/i.test(text);
    if(!isNotDrawing)return true;
  }
  // Papildomas patikrinimas — antraštė + brėžinio specifiniai požymiai
  var titlePatterns=[
    /ELEKTROS\s+TINK[LŲU]+\s+(PLANAS|BR[ĖE][ŽZ]INYS)/i,
    /IN[ŽZ]INERINI[UŲ]\s+TINK[LŲU]+\s+(PLANAS|BR[ĖE][ŽZ]INYS)/i,
    /\b\d+[,.]?\d*\s*kV\s+(KL|kabel)\s.{0,40}plan/i,
    /kabel[iuų]\s+linij[oų]\s+plan/i,
    /(0[,.]?\d+|10|20)\s*kV\s+KL\s+plan/i,
  ];
  // Bendroji apsauga — jei puslapis yra schema ar vizualizacija, atmetame
  var isSchema=/PRINCIPIN[ĖE]|Principin[ėe]|VIZUALIZACIJ|Vizualizacij/i.test(text);
  if(isSchema)return false;
  var hasTitle=titlePatterns.some(function(re){return re.test(text)});
  var hasMastelis=/M\s*1\s*:\s*\d{2,}/i.test(text);
  var coordCount=(text.match(/[XY]\s*=\s*\d/g)||[]).length;
  var hasDrawingMarkers=/(SUTARTINIAI\s+ŽYM|kabelis\s+vamzdyje|kabelis\s+klojamas|kryptiniu\s+gręžimu|Žemės\s+sklypo\s+riba|Apsaugos\s+zon[oų])/i.test(text);
  if(hasTitle&&hasMastelis)return true;
  if(hasTitle&&coordCount>=3)return true;
  if(hasTitle&&hasDrawingMarkers)return true;
  if(hasMastelis&&coordCount>=3)return true;
  if(hasMastelis&&hasDrawingMarkers)return true;
  return false;
}

// Kauno energija parašo raktažodžiai — bendrieji (fallback'as)
function hasKauoenergijaMarkers(text){
  var markers=[
    /(?:UAB\s+|AB\s+)?[„"]?[Kk]auno\s+energija["“]?/,
    /Kauno\s+energij/i,
    /[šs]ilumos\s+tinkl/i,
    /[šs]ilumos\s+tiekim/i,
    /[šs]ilumos\s+perdavim/i,
  ];
  return markers.some(function(re){return re.test(text)});
}

// Iš pritarimų lentelės teksto ištraukia Kauno energija derintojo vardą.
// Lokali paieška ~300 simb. aplink "Kauno energij" žodį, ieškoma asmens vardas+pavardė.
function extractKauoenergijaApproverName(tableText){
  if(!tableText)return null;
  var ctx=tableText.match(/(?:AB\s+|UAB\s+)?[„"]?[Kk]auno\s+energij[a-ząčęėįšųūž]*[„"]?[\s\S]{0,300}/i);
  if(!ctx)return null;
  var seg=ctx[0];
  // Filtruojame žodžius, kurie tikrai NĖRA asmens vardas
  var instWord=/^(Kauno|Energija|Energij|Projektų|Valdymo|Skyriaus|Vyresnioji|Vyresnysis|Vyresnis|Inžinieri[eu]?|UAB|AB|Šilumos|Tinklai|Tinklų|Lietuva|Lietuvos|Pareigos|Asmuo|Pastabos|Specialist|Komanda|Padalinio)$/i;
  var matches=seg.match(/([A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+\s+[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/g);
  if(matches){
    for(var i=0;i<matches.length;i++){
      var pair=matches[i].split(/\s+/);
      if(pair.length===2&&!instWord.test(pair[0])&&!instWord.test(pair[1]))return matches[i].trim();
    }
  }
  // Inicialinis formatas
  var mi=seg.match(/([A-ZĄČĘĖĮŠŲŪŽ]\.\s*[A-ZĄČĘĖĮŠŲŪŽ][a-ząčęėįšųūž]+)/);
  return mi&&mi[1]?mi[1].trim():null;
}

// Kauno energija derinimo aptikimas — drawing + KE markers (vardo-pagrįstas su fallback)
function findKauoenergijaApprovalPage(pageTexts){
  var tablePage=findProjectApprovalsTablePage(pageTexts);
  if(tablePage){
    var name=extractKauoenergijaApproverName(pageTexts[tablePage-1]);
    if(name){
      var nameRe=buildApproverNameRegex(name);
      if(nameRe){
        for(var i=0;i<pageTexts.length;i++){
          if(i+1===tablePage)continue;
          if(isDrawingPageText(pageTexts[i])&&nameRe.test(pageTexts[i]))return i+1;
        }
      }
    }
  }
  // Fallback — drawing + bendrieji KE markers
  for(var j=0;j<pageTexts.length;j++){
    if(j+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[j])&&hasKauoenergijaMarkers(pageTexts[j]))return j+1;
  }
  return null;
}

// Telia parašo raktažodžiai — bendrieji (fallback'as, jei nepavyksta išgauti vardo iš lentelės)
function hasTeliaMarkers(text){
  var markers=[
    /Telia\s+Lietuva/i,
    /Vytautas\s+Stravinskas/i,
    /Rolandas\s+Litvaitis/i,
    /ligita\.rutkauskiene/i,
    /tinklo\s+resurs/i,
    /Po[zž]emini[uų]\s+ry[sš]i[uų]/i,
  ];
  return markers.some(function(re){return re.test(text)});
}

// Ieško „BRĖŽINIAI" turinio lapo — pvz. "8. BRĖŽINIAI" su sąrašu "8.1 Inžinerinių tinklų planas"
// Grąžina puslapio numerį arba null
function findDrawingsIndexPage(pageTexts){
  for(var i=0;i<pageTexts.length;i++){
    var t=pageTexts[i];
    // Puslapis turi turėti "BRĖŽINIAI" antraštę ir bent vieną numeruotą įrašą
    if(/\bBR[ĖE][ŽZ]INIAI\b/i.test(t)&&/\b\d+[\.,]\d+\s+In[žz]/i.test(t)){
      return i+1; // 1-indexed
    }
  }
  return null;
}

// Projekto brėžinio aptikimas — daugiapakopis algoritmas:
//   0) NAUJAS: Jei rastas „BRĖŽINIAI" turinys — iš karto ieškome pirmo tinklų plano PO jo
//   1) Surenkam VISUS „švarius" brėžinio puslapius (be jokio derintojo vardo)
//   2) PIRMENYBĖ — puslapiai su „1 dalis" (trasos planas, jį Telia kasimo paraiškai reikia)
//   3) ATMETAM puslapius su „2 dalis", „3 dalis" ir t.t. (montavimo schemos, ne trasos)
//   4) Jei yra keli kandidatai — paimam paskutinį (galutinė BRĖŽINIAI skyriaus versija)
function findProjectDrawingPage(pageTexts){
  // 0) PIRMA: ieškome „BRĖŽINIAI" turinio lapo
  // Po jo pirmas tinklų planas (ne schema, ne vizualizacija) yra mūsų tikslas
  var drawingsIndexPage=findDrawingsIndexPage(pageTexts);
  if(drawingsIndexPage){
    for(var di=drawingsIndexPage;di<pageTexts.length;di++){
      var dt=pageTexts[di];
      if(isDrawingPageText(dt)&&/IN[ŽZ]INERINI[UŲ]\s+TINK[LŲU]/i.test(dt)){
        return di+1;
      }
    }
    // Jei tikslaus titulo nerado — pirmasis brėžinys po turinio
    for(var di2=drawingsIndexPage;di2<pageTexts.length;di2++){
      if(isDrawingPageText(pageTexts[di2])){
        return di2+1;
      }
    }
  }
  var tablePage=findProjectApprovalsTablePage(pageTexts);
  var allNames=tablePage?extractAllApproverNames(pageTexts[tablePage-1]):[];
  var allRes=allNames.map(buildApproverNameRegex).filter(function(re){return re!==null});
  // 1) Surenkam visus švarius brėžinio puslapius
  var cleanPages=[];
  for(var i=0;i<pageTexts.length;i++){
    if(i+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[i])&&!allRes.some(function(re){return re.test(pageTexts[i])})){
      cleanPages.push({idx:i,text:pageTexts[i]});
    }
  }
  if(cleanPages.length>0){
    // 2) Prioritetas — „1 dalis" (Telia reikia trasos plano, ne montavimo)
    var firstPart=cleanPages.filter(function(p){return /\b1\s*-?\s*[oa]?ji?\s*dalis|\b1\s*dalis\b|\b1dalis\b/i.test(p.text)});
    if(firstPart.length>0)return firstPart[firstPart.length-1].idx+1;
    // 3) Atmetam vėlesnes dalis (2, 3, 4...)
    var notLaterPart=cleanPages.filter(function(p){return !/\b[2-9]\s*-?\s*[oa]?ji?\s*dalis|\b[2-9]\s*dalis\b|\b[2-9]dalis\b/i.test(p.text)});
    if(notLaterPart.length>0)return notLaterPart[notLaterPart.length-1].idx+1;
    // 4) Visi „švarūs" turi „2 dalis" ar pan. — paimam paskutinį (mažai tikėtina situacija)
    return cleanPages[cleanPages.length-1].idx+1;
  }
  // Fallback'ai — kai nėra pritarimų lentelės arba derintojo vardų
  for(var j=pageTexts.length-1;j>=0;j--){
    if(j+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[j])&&!hasTeliaMarkers(pageTexts[j]))return j+1;
  }
  for(var k=pageTexts.length-1;k>=0;k--){
    if(k+1===tablePage)continue;
    if(isDrawingPageText(pageTexts[k]))return k+1;
  }
  return null;
}

// Iš originalaus PDF ištraukia nurodytus puslapius (1-indexed) į naują PDF.
// Grąžina base64 string, paruoštą siuntimui kaip email priedą.
async function extractPagesToNewPdf(dataUrl,pageNumbers){
  if(!Array.isArray(pageNumbers)||pageNumbers.length===0)return null;
  if(typeof PDFLib==="undefined")return null;
  try{
    var base64=dataUrl.split(',')[1];
    var binary=atob(base64);
    var bytes=new Uint8Array(binary.length);
    for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
    var src=await PDFLib.PDFDocument.load(bytes);
    var dst=await PDFLib.PDFDocument.create();
    var totalPages=src.getPageCount();
    var indices=pageNumbers
      .map(function(n){return n-1})
      .filter(function(idx){return idx>=0&&idx<totalPages});
    if(indices.length===0)return null;
    var copied=await dst.copyPages(src,indices);
    copied.forEach(function(page){dst.addPage(page)});
    var newBytes=await dst.save();
    // Uint8Array -> base64 (chunk'ais, kad nesusimuštų į stack overflow)
    var binStr='';
    var chunkSize=8192;
    for(var k=0;k<newBytes.length;k+=chunkSize){
      binStr+=String.fromCharCode.apply(null,newBytes.subarray(k,k+chunkSize));
    }
    return btoa(binStr);
  }catch(e){console.warn("PDF puslapių išskyrimo klaida:",e);return null;}
}

// Parsina input'ą "27, 28, 29" arba "27-29" arba "27, 30-32" į puslapių masyvą
function parsePageNumbers(str){
  if(!str)return [];
  var pages=[];
  String(str).split(/[,;]/).forEach(function(part){
    part=part.trim();
    if(!part)return;
    var rangeMatch=part.match(/^(\d+)\s*[-–—]\s*(\d+)$/);
    if(rangeMatch){
      var a=parseInt(rangeMatch[1],10),b=parseInt(rangeMatch[2],10);
      if(a>0&&b>0&&a<=b)for(var i=a;i<=b;i++)pages.push(i);
    }else if(/^\d+$/.test(part)){
      pages.push(parseInt(part,10));
    }
  });
  // Pašaliname dublikatus, surūšiuojame didėjančia tvarka
  var seen={};
  return pages.filter(function(p){if(seen[p])return false;seen[p]=true;return true}).sort(function(a,b){return a-b});
}

// Formatuoja puslapių masyvą į "27, 28, 29" string'ą
function formatPageNumbers(pages){
  if(!Array.isArray(pages))return "";
  return pages.join(", ");
}

// Atgalinis suderinamumas — palaikom tiek pageNumbers (naujas), tiek pageNumber (senas)
function getAttachmentPages(src){
  if(src&&Array.isArray(src.pageNumbers))return src.pageNumbers;
  if(src&&typeof src.pageNumber==="number")return [src.pageNumber];
  return [];
}

// Gauna PDF data URL — iš atminties (jei turime) arba fetch'ina iš serverio URL.
async function getPdfDataUrl(file){
  if(file.data)return file.data;
  if(file.url){
    try{
      var r=await fetch(file.url);
      var blob=await r.blob();
      return await new Promise(function(res){
        var rd=new FileReader();
        rd.onload=function(e){res(e.target.result);};
        rd.readAsDataURL(blob);
      });
    }catch(e){return null;}
  }
  return null;
}

// Atidaro paraiškos PDF naujame naršyklės skirtuke — admin gali peržiūrėti.
function openPermitPdfInNewTab(permit){
  var pdf=(permit.files||[]).find(function(f){return f.name&&f.name.match(/\.pdf$/i)});
  if(!pdf){alert("Paraiškoje nerastas PDF failas.");return;}
  // Jei yra serverio URL — atidarome tiesiogiai
  if(pdf.url){window.open(pdf.url,'_blank');return;}
  // Fallback — iš data URL
  if(!pdf.data){alert("PDF failas nepasiekiamas.");return;}
  try{
    var arr=pdf.data.split(',');
    var bin=atob(arr[1]);
    var len=bin.length;
    var u8=new Uint8Array(len);
    for(var i=0;i<len;i++)u8[i]=bin.charCodeAt(i);
    var blob=new Blob([u8],{type:'application/pdf'});
    window.open(URL.createObjectURL(blob),'_blank');
  }catch(e){alert("Nepavyko atidaryti PDF: "+e.message);}
}

function parseLocation(text){
  // Pirmas prioritetas — "Objekto adresas:" laukas (tikslus atitikmuo ESO techniniuose dokumentuose)
  var m=text.match(/[Oo]bjekto\s+adresas\s*:\s*([^\n]{5,120})/);
  if(m&&m[1]){
    var val=m[1].trim().replace(/\s+/g,' ');
    // Nukirpame po kabliataškio ar po el. pašto / telefono jei pateko
    val=val.split(/[;|]/)[0].trim();
    if(val.length>5)return val;
  }

  // Antras prioritetas — "Statybos vieta:", "Darbų vieta:"
  var m2=text.match(/(?:[Ss]tatybos\s+(?:vieta|adresas)|[Dd]arbų\s+vieta)\s*:\s*([^\n]{5,120})/);
  if(m2&&m2[1]){
    var val2=m2[1].trim().replace(/\s+/g,' ').split(/[;|]/)[0].trim();
    if(val2.length>5)return val2;
  }

  return null;
}

// Telia/KE trasos auto-aptikimas iš projekto PDF.
// Per A pasirinkimą: jei nepavyksta tiksliai išskirti pradžios ir pabaigos —
// abu laukai užpildomi tuo pačiu objekto adresu, adminas patikslins per review.
// Grąžinamos sutrumpintos formos:
//   from = gatvė, namo nr. (be miesto ir savivaldybės)
//   to   = gatvė, namo nr., miestas (be savivaldybės)
function parseTeliaRoute(text){
  var patterns=[
    /STATINIO\s+ADRESAS\s*:\s*([^\n]{5,200})/,
    /OBJEKTO\s+VIETA\s*:\s*([^\n]{5,200})/,
    /[Oo]bjekto\s+adresas\s*:\s*([^\n]{5,200})/,
    /[Oo]bjekto\s+vieta\s*:\s*([^\n]{5,200})/,
    /[Ss]tatinio\s+adresas\s*:\s*([^\n]{5,200})/,
    /(?:[Ss]tatybos\s+(?:vieta|adresas)|[Dd]arbų\s+vieta)\s*:\s*([^\n]{5,200})/,
  ];
  // Greta esančių laukų pavadinimai — užtikrina, kad tarpiniai/po jų esantys tekstai būtų atkirsti
  var boundaryRe=/\s+(?:DALIS|STADIJA|TOMAS|METAI|ETAPAS|Investicinio|Investicinis|INVESTICINIS|TECHNINI[UŲ]\s+S[AĄ]LYG[UŲ]|UŽSAKOVAS|U[Žz]SAKOVAS|Klientas|PAREIGOS|STATYBOS\s+R[ŪU][ŠS]IS|STATINIO\s+KATEGORIJA|TECHNINIS\s+PROJEKTAS|DARBO\s+PROJEKTAS|PROJEKTO\s+(?:NUMERIS|RU[SŠ]IS))\s*[:.\-—]/i;
  for(var i=0;i<patterns.length;i++){
    var m=text.match(patterns[i]);
    if(m&&m[1]){
      var val=m[1].trim().replace(/\s+/g,' ').split(/[;|]/)[0].trim();
      val=val.split(boundaryRe)[0].trim();
      if(val.length>5){
        // Pašaliname savivaldybę bet kurioje vietoje (ne tik gale): ", Xxx r./m. sav."
        var noSav=val.replace(/,?\s*[A-ZĄČĘĖĮŠŲŪŽa-ząčęėįšųūž\.]+\s+(?:r|m)\.?\s*sav\.?(?=$|[\s,])/gi,"").replace(/\s+,/g,",").replace(/,\s*$/,"").trim();
        // Atskiriame į dalis pagal kablelius
        var parts=noSav.split(",").map(function(s){return s.trim()}).filter(function(s){return s.length>0});
        // pradžia = gatvė + namo nr. (pirma dalis)
        // pabaiga = gatvė + namo nr. + miestas (visos dalys be savivaldybės)
        var from=parts[0]||noSav;
        var to=noSav;
        return {from:from,to:to};
      }
    }
  }
  return null;
}

function parseInvestNo(text){
  // Ieškome TIK investicinio numerio (E1N..., pvz. E1N2612455)
  var patterns=[
    /investicinis\s+(?:nr\.?|numeris)\s*[:.\s]+([A-Za-z0-9\-\/\.]{3,30})/i,
    /inv\.?\s*nr\.?\s*[:.\s]+([A-Za-z0-9\-\/\.]{3,30})/i,
    /investicinio\s+projekto\s+nr\.?\s*[:.\s]+([A-Za-z0-9\-\/\.]{3,30})/i,
  ];
  for(var i=0;i<patterns.length;i++){
    var m=text.match(patterns[i]);
    if(m&&m[1]){
      var val=m[1].trim();
      if(/\d/.test(val))return val;
    }
  }
  return null;
}

// Aptinka projekto numerį iš PDF — formatas pvz. "26-20-TDP-E" arba "26-20-TP-E"
function parseProjectNo(text){
  // 1) Po "PROJEKTO NUMERIS" antraštės (titulinis lapas) — tarp lentelės celių
  var m1=text.match(/PROJEKTO\s+NUMERIS[\s\S]{0,50}?(\d{2}-\d{2,4}-[A-Z]{2,6}-[A-Z]{1,3})/);
  if(m1&&m1[1])return m1[1].trim();
  // 2) Dokumento žymuo formatas NN-NN-XXX-X (ignoruojame priedų žymenis kaip E.B-01)
  var m2=text.match(/\b(\d{2}-\d{2,4}-(?:TDP|TP|PP|DP|AP)-[A-Z]{1,3})\b/);
  if(m2&&m2[1])return m2[1].trim();
  // 3) Platesnė paieška — bet ne priedų (su .B, .BSR ir pan.)
  var m3=text.match(/\b(\d{2}-\d{2,4}-[A-Z]{2,6}-[A-Z]{1,3})\b/);
  if(m3&&m3[1]&&!m3[1].includes('.'))return m3[1].trim();
  return null;
}

// ── Koordinačių pagrindu trasos aptikimas ─────────────────────
// Ištraukia LKS-94 koordinatės poras iš PDF teksto (A ir B taškai),
// konvertuoja į WGS-84 ir gauna adresus per Nominatim reverse geocoding.
// Grąžina {from, to} arba null jei nepavyko.
async function parseTrasaFromCoordinates(text){
  if(typeof proj4==="undefined")return null;
  // Ieškome X=... Y=... koordinačių porų — LKS-94 formatai:
  // "X=6082920.37\nY=495839.31" arba "X=6082920 Y=495839" arba "X=6082920,37"
  var coordRe=/X\s*=\s*([\d\s,\.]{6,12})\s*[\n\r\s,;]*Y\s*=\s*([\d\s,\.]{5,10})/gi;
  var pairs=[];
  var m;
  while((m=coordRe.exec(text))!==null){
    var x=parseFloat(m[1].replace(/\s/g,"").replace(",","."));
    var y=parseFloat(m[2].replace(/\s/g,"").replace(",","."));
    // LKS-94: X (northing) ~5900000–6400000, Y (easting) ~300000–700000
    if(x>5800000&&x<6500000&&y>200000&&y<800000){
      pairs.push({x:x,y:y});
    }
  }
  if(pairs.length<2)return null;
  // A taškas — pirmoji koordinatė, B taškas — paskutinė
  var ptA=pairs[0];
  var ptB=pairs[pairs.length-1];
  // Jei A ir B per arti (< 10m) — ta pati vieta, naudinga tik viena
  var dist=Math.sqrt(Math.pow(ptA.x-ptB.x,2)+Math.pow(ptA.y-ptB.y,2));
  if(dist<10)ptB=pairs[Math.floor(pairs.length/2)]||ptA;
  // Konvertuojame LKS-94 → WGS-84
  function lks94ToWgs84(x,y){
    try{
      // proj4: [easting, northing] = [Y, X] LKS-94
      var wgs=proj4("EPSG:3346","WGS84",[y,x]);
      return {lng:wgs[0],lat:wgs[1]};
    }catch(e){return null;}
  }
  var wgsA=lks94ToWgs84(ptA.x,ptA.y);
  var wgsB=lks94ToWgs84(ptB.x,ptB.y);
  if(!wgsA||!wgsB)return null;
  // Reverse geocoding per Nominatim
  async function reverseGeocode(lat,lng){
    try{
      var url="https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&zoom=18&addressdetails=1&accept-language=lt";
      var r=await fetch(url,{headers:{"User-Agent":"Digpoint/1.0 EnergoLT"}});
      if(!r.ok)return null;
      var d=await r.json();
      var a=d.address||{};
      // Suformuojame: gatvė + namo nr.
      var street=(a.road||a.pedestrian||a.path||"").trim();
      var house=(a.house_number||"").trim();
      var city=(a.city||a.town||a.village||a.municipality||"").trim();
      if(!street)return null;
      return {short:street+(house?" "+house:""), full:street+(house?" "+house:"")+(city?", "+city:"")};
    }catch(e){return null;}
  }
  var [addrA,addrB]=await Promise.all([
    reverseGeocode(wgsA.lat,wgsA.lng),
    reverseGeocode(wgsB.lat,wgsB.lng)
  ]);
  if(!addrA&&!addrB)return null;
  return {
    from:addrA?addrA.short:(addrB?addrB.short:""),
    to:addrB?addrB.full:(addrA?addrA.full:""),
    method:"koordinatės"
  };
}

function FileDropZone(p){

  var _uploading=useState(false);var uploading=_uploading[0],sUploading=_uploading[1];
  var ref=useRef(null);
  function readFiles(fileList){
    Array.from(fileList).forEach(function(file){
      // Įkeliame failą į serverį per /api/upload, DB saugome tik metaduomenis + data URL PDF aptikimui
      var reader=new FileReader();
      reader.onload=function(e){
        var dataUrl=e.target.result;
        // Siunčiame į serverį
        sUploading(true);
        var fd=new FormData();fd.append("file",file);
        fetch("/api/upload",{method:"POST",body:fd})
          .then(function(r){return r.json();})
          .then(function(d){
            sUploading(false);
            if(d.url){
              // Saugome ir serverio URL, ir data (tik PDF'ams reikalinga PDF.js analizei)
              // data išvalomos iš DB objekto prieš saugant — žr. addPermit stripping
              p.onAdd({name:file.name,size:file.size,type:file.type,url:d.url,filename:d.filename,data:dataUrl});

              // Fallback jei upload nepavyko — saugome tik lokaliai
              p.onAdd({name:file.name,size:file.size,type:file.type,data:dataUrl});
            }
          })
          .catch(function(){
            sUploading(false);
            p.onAdd({name:file.name,size:file.size,type:file.type,data:dataUrl});
          });
      };
      reader.readAsDataURL(file);
    });
  }

    </div>

        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:C.tx,fontFamily:F,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div>
          <div style={{fontSize:9,color:C.t3,fontFamily:FM}}>{fmtSize(f.size)}</div>

        <button onClick={function(){p.onRemove(i)}} style={{background:"none",border:"none",color:C.rd,cursor:"pointer",fontSize:14,padding:"0 2px",lineHeight:1}}>×</button>
      </div>})}

  var pdfFiles=(o.files||[]).filter(function(f){return f.name&&f.name.match(/\.pdf$/i)});

      email:ESO_EMAIL,
      url:ESO_URL,
      description:o.description||"",

      files:pdfFiles.map(function(f){return {name:f.name,size:f.size,url:f.url||null,filename:f.filename||null}}),
      createdAt:new Date().toISOString(),
      status:"pending"

    window.open(ESO_URL, '_blank');

    setTimeout(function(){
      if(typeof window.sendPrompt==='function'){

      }

          </div>;})()}
          {o.investNo&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid "+C.b1}}>
            <div style={{fontSize:9,color:C.t3,fontFamily:F}}>Investicinis nr.</div>
            <div style={{fontSize:11,fontWeight:600,color:C.tx,fontFamily:F}}>{o.investNo}</div>
          </div>}
          {hasPdf&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid "+C.b1}}>
            <div style={{fontSize:9,color:C.t3,fontFamily:F,marginBottom:4}}>PDF failai</div>
            {pdfFiles.map(function(f,i){return <div key={i} style={{fontSize:10,color:C.ac,fontFamily:FM}}>📄 {f.name}</div>})}
          </div>}
          {!hasPdf&&<div style={{marginTop:8,padding:"6px 8px",background:C.ylD,borderRadius:6,fontSize:10,color:C.yl,fontFamily:F,border:"1px solid "+C.yl+"33"}}>
            ⚠️ Neįkelti PDF failai. Brėžiniai nebus pridėti automatiškai.
          </div>}
        </div>

        {/* El. pašto statusas */}
        {o.email&&<div style={{background:emailSent?C.gnD:C.ylD,border:"1px solid "+(emailSent?C.gn:C.yl)+"44",borderRadius:8,padding:"8px 12px",fontSize:10,color:emailSent?C.gn:C.yl,fontFamily:F,lineHeight:1.6}}>
          {emailSent
            ?<span>✅ <strong>Patvirtinimas išsiųstas</strong> užsakovui: <span style={{fontFamily:FM}}>{o.email}</span></span>
            :<span>⏳ Siunčiamas patvirtinimas → <span style={{fontFamily:FM}}>{o.email}</span></span>}
        </div>}
        {!o.email&&<div style={{background:C.ylD,border:"1px solid "+C.yl+"44",borderRadius:8,padding:"8px 12px",fontSize:10,color:C.yl,fontFamily:F}}>
          ⚠️ Užsakovo el. paštas nenurodytas — patvirtinimas neišsiųstas.
        </div>}

        {/* Agento paleidimo blokas */}
        {st==="idle"&&<div style={{background:C.acD,border:"1px solid "+C.ac+"44",borderRadius:8,padding:"12px 14px",fontSize:11,color:C.ac,fontFamily:F,lineHeight:1.7}}>
          <div style={{fontWeight:700,marginBottom:6}}>🤖 Cowork agentas užpildys formą automatiškai</div>
          <div style={{fontSize:10,color:C.t2}}>Spausk mygtuką žemiau — duomenys bus išsaugoti serveryje. Tuomet Cowork lange pasakyk: <span style={{fontFamily:FM,fontWeight:700,color:C.ac}}>"pateik ESO"</span></div>
        </div>}
        {st==="saving"&&<div style={{background:C.s2,borderRadius:8,padding:"12px 14px",fontSize:11,color:C.t2,fontFamily:F,textAlign:"center"}}>
          ⏳ Saugoma užduotis serveryje...

        {st==="ready"&&<div style={{background:C.gnD,border:"1px solid "+C.gn+"44",borderRadius:8,padding:"12px 14px",fontSize:11,color:C.gn,fontFamily:F,lineHeight:1.7}}>

          <div style={{fontSize:10}}>Dabar Cowork lange pasakyk: <span style={{fontFamily:FM,fontWeight:700}}>"pateik ESO"</span> — agentas automatiškai užpildys formą ir sustabdys prieš siuntimą.</div>
        </div>}

        <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>

      </div>

// Datas YYYY-MM-DD pakeičia į YYYY.MM.DD formatą (kabamasis intervalas su brūkšniu)
function fmtDateDots(d){
  if(!d)return "";
  return String(d).replace(/-/g,".");
}
function fmtDateRangeDots(start,end){
  var sd=start?fmtDateDots(start):"";
  var ed=end?fmtDateDots(end):"";
  if(sd&&ed)return sd+"-"+ed;
  return sd||ed||"";
}

// Telia paraiškos paruošimas review'ui — aptinka PDF puslapius ir įspėja apie trūkumus.
// Grąžina permit objektą su pendingEmail (laiško peržiūra + priedų metaduomenys + įspėjimai).
// Faktiniai PDF priedų baitai NEsaugomi DB — generuojami iš naujo siuntimo metu (saugant DB dydį).
async function preparePendingTeliaEmail(permit){
  var attachmentSources=[];
  var warnings=[];
  var detectionInfo=null;
  var pdfFile=(permit.files||[]).find(function(f){return f.name&&f.name.match(/\.pdf$/i)});
  var pdfData=pdfFile?await getPdfDataUrl(pdfFile):null;
  if(pdfFile&&pdfData){
    try{
      var pageTexts=await extractPdfTextByPage(pdfData);
      // 🆕 2-as sluoksnis: jei trasa nebuvo aptikta formoje (pirmi 5 psl.),
      // bandome dar kartą iš pilno PDF teksto. Jokio papildomo I/O — pageTexts jau atmintyje.
      if(!permit.teliaRouteFrom||!permit.teliaRouteTo){
        var fullText=pageTexts.join("\n");
        var foundRoute=parseTeliaRoute(fullText);
        if(foundRoute){
          permit=Object.assign({},permit,{teliaRouteFrom:foundRoute.from,teliaRouteTo:foundRoute.to});
        }else{
          // Fallback — koordinačių pagrindu
          try{
            var coordRoute=await parseTrasaFromCoordinates(fullText);
            if(coordRoute){
              permit=Object.assign({},permit,{teliaRouteFrom:coordRoute.from,teliaRouteTo:coordRoute.to});
              detectionInfo=Object.assign({},detectionInfo||{},{trasaMetodas:"koordinatės"});
            }
          }catch(e){}
        }
      }
      // Bandome ištraukti Telia derintojo vardą iš pritarimų lentelės — informacijai
      var tablePage=findProjectApprovalsTablePage(pageTexts);
      var teliaName=tablePage?extractTeliaApproverName(pageTexts[tablePage-1]):null;
      detectionInfo={
        approvalsTablePage:tablePage,
        teliaApproverName:teliaName,
        usedMethod:teliaName?"vardo-pagrįstas":"raktažodžių"
      };
      var teliaPage=findTeliaApprovalPage(pageTexts);
      var drawingPage=findProjectDrawingPage(pageTexts);
      if(drawingPage){
        attachmentSources.push({filename:"projekto_brezinys.pdf",sourceFileName:pdfFile.name,pageNumbers:[drawingPage]});
      }else{
        warnings.push("Projekto brėžinio puslapis PDF'e nerastas — adminas turi nurodyti rankiniu būdu");
      }
      if(teliaPage){
        attachmentSources.push({filename:"telia_derinimas.pdf",sourceFileName:pdfFile.name,pageNumbers:[teliaPage]});
      }else{
        if(teliaName){
          warnings.push("Telia derinimo puslapis PDF'e nerastas — pritarimų lentelėje rastas derintojas: "+teliaName);
        }else{
          warnings.push("Telia derinimo puslapis PDF'e nerastas (pritarimų lentelė taip pat neaptikta)");
        }
      }
    }catch(e){
      warnings.push("PDF skaitymo klaida: "+e.message);
    }
  }else{
    warnings.push("Paraiškoje nepridetas projekto PDF failas");
  }
  if(!permit.teliaRouteFrom||!permit.teliaRouteTo){
    warnings.push("Trasa nenurodyta");
  }else if(permit.teliaRouteFrom===permit.teliaRouteTo){
    warnings.push("Trasos pradzia ir pabaiga sutampa — adminas turi patikslinti");
  }
  return Object.assign({},permit,{pendingEmail:{
    to:TELIA_EMAIL,
    subject:"Dėl kasimo leidimo "+(permit.teliaRouteFrom||permit.location||""),
    html:buildTeliaEmailHtml(permit),
    attachmentSources:attachmentSources,
    warnings:warnings,
    detectionInfo:detectionInfo,
    preparedAt:new Date().toISOString()
  }});
}

// Iš Telia laiško HTML (`buildExternalEmailWrapper` rezultato) ištraukia tik vidinį turinį
// — tai, kas yra tarp wrapper'io pradžios ir pėdos.
function extractTeliaEmailBodyContent(htmlDoc){
  if(!htmlDoc)return "";
  // Naujasis wrapper'is: <div style="max-width:620px...">[BODY]<div style="margin-top:28px...border-top...">
  var m=htmlDoc.match(/<div style="max-width:620px[^"]*">\s*([\s\S]*?)\s*<div style="margin-top:28px/);
  if(m)return m[1];
  // Atsarginis variantas — senesni wrapper'iai (jei dar liko paraiškų su senu HTML)
  var m2=htmlDoc.match(/<div style="padding:24px 28px">([\s\S]*?)<\/div>\s*<div style="padding:12px 28px;background:#F9FAFB/);
  return m2?m2[1]:"";
}

// Iškviečiama PermitDetail — patvirtina KE paraišką ir siunčia laišką
async function approveAndSendKauoenergija(permit){
  var pe=permit.pendingKauoenergijaEmail;
  if(!pe||!pe.to)throw new Error("Laiskas neparuoštas");
  var attachments=[];
  var srcs=pe.attachmentSources||[];
  for(var i=0;i<srcs.length;i++){
    var src=srcs[i];
    var pages=getAttachmentPages(src);
    if(pages.length===0)continue;
    var srcFile=(permit.files||[]).find(function(f){return f.name===src.sourceFileName});
    if(srcFile){
      var _d=await getPdfDataUrl(srcFile);
      if(_d){var bytes=await extractPagesToNewPdf(_d,pages);if(bytes)attachments.push({filename:src.filename,content:bytes,encoding:"base64"});}
    }
  }
  var res=await fetch("/api/notify/email",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({to:pe.to,subject:pe.subject,html:pe.html,attachments:attachments})
  });
  if(!res.ok){
    var data=await res.json().catch(function(){return{}});
    throw new Error(data.error||("HTTP "+res.status));
  }
  return attachments.length;
}

// PDF PUSLAPIŲ PARINKIMO MODALAS
// Rodo puslapių miniatiūras, leidžia pažymėti kelis puslapius.
// p.pdfData     — base64 PDF duomenys
// p.selected    — jau pažymėtų puslapių masyvas [1,2,3,...]
// p.onConfirm   — callback su pasirinktų puslapių masyvu
// p.onClose     — uždarymo callback
// ═════════════════════════════════════════════════════════════
function PdfPagePickerModal(p){
  var _pages=useState([]);var pages=_pages[0],sPages=_pages[1];
  var _sel=useState(p.selected||[]);var sel=_sel[0],sSel=_sel[1];
  var _loading=useState(true);var loading=_loading[0],sLoading=_loading[1];
  var _err=useState("");var err=_err[0],sErr=_err[1];

  useEffect(function(){
    var cancelled=false;
    (async function(){
      // Gauname PDF data — iš prop arba fetch'iname iš serverio
      var dataUrl=p.pdfData||(p.pdfFile?await getPdfDataUrl(p.pdfFile):null);
      if(!dataUrl){sErr("PDF failas nepasiekiamas.");sLoading(false);return;}
      if(cancelled)return;
      try{
        var base64=dataUrl.split(',')[1];
        var binary=atob(base64);
        var bytes=new Uint8Array(binary.length);
        for(var i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
        var pdf=await pdfjsLib.getDocument({data:bytes}).promise;
        var thumbs=[];
        for(var pg=1;pg<=pdf.numPages;pg++){
          if(cancelled)return;
          var page=await pdf.getPage(pg);
          var vp=page.getViewport({scale:0.75});
          var canvas=document.createElement('canvas');
          canvas.width=vp.width;canvas.height=vp.height;
          await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
          thumbs.push({num:pg,url:canvas.toDataURL()});
        }
        if(!cancelled){sPages(thumbs);sLoading(false);}
      }catch(e){if(!cancelled){sErr("PDF klaida: "+e.message);sLoading(false);}}
    })();
    return function(){cancelled=true;};
  },[]);

  function togglePage(n){
    sSel(function(prev){
      var idx=prev.indexOf(n);
      if(idx===-1)return prev.concat([n]).sort(function(a,b){return a-b});
      return prev.filter(function(x){return x!==n});
    });
  }


  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:C.s1,borderRadius:14,width:"100%",maxWidth:960,maxHeight:"92vh",display:"flex",flexDirection:"column",border:"1px solid "+C.b1}}>
      {/* Antraštė */}
      <div style={{padding:"14px 18px",borderBottom:"1px solid "+C.b1,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.tx,fontFamily:F}}>Pasirinkite puslapius</div>
          <div style={{fontSize:11,color:C.t2,fontFamily:F,marginTop:2}}>Pažymėti puslapiai bus sujungti į vieną PDF priedą</div>
        </div>
        <button onClick={p.onClose} style={{background:"none",border:"none",color:C.t2,fontSize:18,cursor:"pointer",padding:"0 4px"}}>✕</button>
      </div>
      {/* Turinys */}
      <div style={{flex:1,overflowY:"auto",padding:14}}>
        {loading&&<div style={{textAlign:"center",padding:40,color:C.t2,fontFamily:F,fontSize:13}}>Kraunamos miniatiūros...</div>}
        {err&&<div style={{color:C.rd,fontFamily:F,fontSize:12,padding:20}}>{err}</div>}
        {!loading&&!err&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:14}}>
          {pages.map(function(pg){
            var isSel=sel.indexOf(pg.num)!==-1;
            return <div key={pg.num} onClick={function(){togglePage(pg.num);}}
              style={{cursor:"pointer",borderRadius:8,overflow:"hidden",border:"2px solid "+(isSel?C.ac:C.b1),background:isSel?C.acD:C.bg,transition:"all .15s",position:"relative"}}>
              <img src={pg.url} style={{width:"100%",display:"block"}}/>
              <div style={{padding:"4px 6px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:10,color:isSel?C.ac:C.t2,fontFamily:FM,fontWeight:isSel?700:400}}>p. {pg.num}</span>
                {isSel&&<span style={{fontSize:10,color:C.ac,fontWeight:700}}>✓</span>}
              </div>
            </div>;
          })}
        </div>}
      </div>
      {/* Apačia */}
      <div style={{padding:"12px 18px",borderTop:"1px solid "+C.b1,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
        <div style={{fontSize:12,color:C.t2,fontFamily:F}}>
          {sel.length>0

}

function workDaysUntil(dateStr){
  if(!dateStr)return null;
  var today=new Date();today.setHours(0,0,0,0);
  var target=new Date(dateStr);target.setHours(0,0,0,0);
  if(target<today)return -1;
  var LTH={"01-01":1,"02-16":1,"03-11":1,"05-01":1,"06-24":1,"07-06":1,"08-15":1,"11-01":1,"11-02":1,"12-24":1,"12-25":1,"12-26":1};
  var count=0;var cur=new Date(today);
  while(cur<=target){
    var dow=cur.getDay();
    var mm=String(cur.getMonth()+1).padStart(2,"0");
    var dd=String(cur.getDate()).padStart(2,"0");
    if(dow!==0&&dow!==6&&!LTH[mm+"-"+dd])count++;
    cur=new Date(cur.getTime()+24*60*60*1000);
  }
  return count;
}

function ScheduleView(p){
  var now=new Date();
  var _vm=useState(now.getMonth());var viewMonth=_vm[0],sViewMonth=_vm[1];
  var _vy=useState(now.getFullYear());var viewYear=_vy[0],sViewYear=_vy[1];
  var _orgF=useState("");var orgF=_orgF[0],sOrgF=_orgF[1];
  var _stF=useState("");var stF=_stF[0],sStF=_stF[1];
  var _locF=useState("");var locF=_locF[0],sLocF=_locF[1];

  function goPrev(){if(viewMonth===0){sViewMonth(11);sViewYear(viewYear-1);}else sViewMonth(viewMonth-1);}
  function goNext(){if(viewMonth===11){sViewMonth(0);sViewYear(viewYear+1);}else sViewMonth(viewMonth+1);}

  var rangeStart=new Date(viewYear,viewMonth,1);
  var rangeEnd=new Date(viewYear,viewMonth+1,0);
  var totalDays=rangeEnd.getDate();

  // LT šventės
  var LTH={"01-01":1,"02-16":1,"03-11":1,"05-01":1,"06-24":1,"07-06":1,"08-15":1,"11-01":1,"11-02":1,"12-24":1,"12-25":1,"12-26":1};
  function isLtHoliday(d){
    var mm=String(d.getMonth()+1).padStart(2,"0");
    var dd=String(d.getDate()).padStart(2,"0");
    return !!LTH[mm+"-"+dd];
  }

  // Dienos žymės
  var DAY_LT=["S","P","A","T","K","Pn","\u0160"];
  var dayLabels=[];
  for(var di=1;di<=totalDays;di++){
    var dt=new Date(viewYear,viewMonth,di);
    var dow=dt.getDay();
    var isWeekend=dow===0||dow===6;
    var isHoliday=isLtHoliday(dt);
    var isNonWork=isWeekend||isHoliday;
    var isToday=dt.toDateString()===now.toDateString();
    dayLabels.push({
      date:di,letter:DAY_LT[dow],
      offsetPct:(di-1)/totalDays*100,
      widthPct:1/totalDays*100,
      isMonday:dow===1,isWeekend:isWeekend,isHoliday:isHoliday,
      isNonWork:isNonWork,isToday:isToday
    });
  }

  var todayPct=(now.getFullYear()===viewYear&&now.getMonth()===viewMonth)
    ?(now.getDate()-1)/totalDays*100:-1;

  // Filtravimas
  var allLocs=[...new Set(p.permits.map(function(x){return x.location||""}).filter(Boolean))].sort();
  var orgs=[...new Set(p.permits.map(function(x){return x.organization}).filter(Boolean))];
  var filtered=p.permits.filter(function(permit){
    if(orgF&&permit.organization!==orgF)return false;
    if(stF&&permit.status!==stF)return false;
    if(locF&&(permit.location||"")!==locF)return false;
    return true;
  });

  // Grupuojame pagal lokaciją
  var locMap={};
  filtered.forEach(function(permit){
    var loc=permit.location||"(vieta nenurodyta)";
    if(!locMap[loc])locMap[loc]=[];
    locMap[loc].push(permit);
  });
  var locKeys=Object.keys(locMap).sort(function(a,b){
    var aMin=locMap[a].reduce(function(m,x){return (!m||x.startDate<m)?x.startDate:m},null)||"";
    var bMin=locMap[b].reduce(function(m,x){return (!m||x.startDate<m)?x.startDate:m},null)||"";
    return aMin>bMin?1:-1;
  });

  function barStyle(permit){
    if(!permit.startDate||!permit.endDate)return null;
    var s=new Date(permit.startDate);var e=new Date(permit.endDate);
    if(s>rangeEnd||e<rangeStart)return null;
    var effS=s<rangeStart?rangeStart:s;
    var effE=e>rangeEnd?rangeEnd:e;
    var left=(effS.getDate()-1)/totalDays*100;
    var width=Math.max(0.5,(effE.getDate()-effS.getDate()+1)/totalDays*100);
    var sm=STATUS_MAP[permit.status]||STATUS_MAP["Laukiama tvirtinimo"]||{dot:C.ac};
    return {left:left+"%",width:width+"%",background:sm.dot,opacity:0.85};
  }

  function permitBarStyle(permit){
    if(!permit.permitValidFrom||!permit.permitValidUntil)return null;
    var s=new Date(permit.permitValidFrom);var e=new Date(permit.permitValidUntil);
    if(s>rangeEnd||e<rangeStart)return null;
    var effS=s<rangeStart?rangeStart:s;
    var effE=e>rangeEnd?rangeEnd:e;
    var left=(effS.getDate()-1)/totalDays*100;
    var width=Math.max(0.5,(effE.getDate()-effS.getDate()+1)/totalDays*100);
    var expired=new Date(permit.permitValidUntil)<now;
    var expiring=!expired&&(new Date(permit.permitValidUntil)-now)/(1000*60*60*24)<=14;

          <div style={{width:LEFT_W,flexShrink:0,padding:"6px 12px",fontSize:10,fontWeight:700,color:C.t3,fontFamily:F,textTransform:"uppercase",letterSpacing:1,borderRight:"1px solid "+C.b1,display:"flex",alignItems:"flex-end"}}>Objektas</div>

              <div style={{width:LEFT_W,flexShrink:0,padding:"6px 12px",borderRight:"1px solid "+C.b1,display:"flex",alignItems:"center",gap:7}}>

                    var ed=org==="Telia, Kaunas"?(permit.teliaEndDate||permit.endDate):org==="Kauno energija"?(permit.keEndDate||permit.endDate):permit.endDate;
                    rows.push({permit:permit,org:org,startDate:sd,endDate:ed});
                  });

              });
              return rows.map(function(row,pIdx){
                var permit=row.permit;
                var rowPermit=Object.assign({},permit,{startDate:row.startDate,endDate:row.endDate});
                var bs=barStyle(rowPermit);
                var ps=permitBarStyle(permit);
                var sm=STATUS_MAP[permit.status]||STATUS_MAP["Laukiama tvirtinimo"]||{bg:C.acD,c:C.ac,dot:C.ac};
                var isLastRow=pIdx===rows.length-1;
                return <div key={permit.id+"-"+row.org} onClick={function(){p.onSelect(permit)}}

                  onMouseEnter={function(e){e.currentTarget.style.background=C.s3}}

                  <div style={{width:LEFT_W,flexShrink:0,padding:"5px 12px 5px 24px",borderRight:"1px solid "+C.b1,display:"flex",flexDirection:"column",justifyContent:"center",gap:2}}>
                    <div style={{display:"flex",alignItems:"center",gap:5}}>
                      <span style={{width:6,height:6,borderRadius:"50%",background:sm.dot,flexShrink:0}}/>
                      <span style={{fontSize:10,fontWeight:700,color:C.tx,fontFamily:F}}>{row.org}</span>
                      <span style={{fontSize:8,color:C.t3,fontFamily:FM,background:C.bg,padding:"1px 3px",borderRadius:2}}>#{permit.id.slice(-5).toUpperCase()}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:5,paddingLeft:11}}>
                      <span style={{fontSize:9,color:C.t3,fontFamily:F}}>{SL[permit.status]||permit.status}</span>
                      {permit.permitValidUntil&&<span style={{fontSize:8,color:ps?ps.color:C.t3,fontFamily:FM,fontWeight:600}}>iki {permit.permitValidUntil}</span>}

                  <div style={{flex:1,position:"relative",height:ROW_H}}>
                    {dayLabels.map(function(d,i){return <div key={i} style={{position:"absolute",left:d.offsetPct+"%",top:0,bottom:0,width:d.widthPct+"%",background:d.isNonWork?"rgba(239,68,68,.04)":"transparent",pointerEvents:"none"}}/>})}

                      </div>
                    </div>}
                    {ps&&<div style={{position:"absolute",left:ps.left,width:ps.width,top:30,height:PERMIT_H,borderRadius:2,background:ps.color,opacity:.9,zIndex:2,minWidth:3}}/>}
                  </div>
                </div>;
              });
            })()}
          </div>;
        })}
      </div>}

    {/* Statistika */}
    {p.permits.length>0&&<div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
      {(function(){
        var wp=p.permits.filter(function(x){return x.permitValidUntil});
        var exp=wp.filter(function(x){return new Date(x.permitValidUntil)<now}).length;
        var soon=wp.filter(function(x){var d=(new Date(x.permitValidUntil)-now)/(1000*60*60*24);return d>=0&&d<=14}).length;
        var ok=wp.filter(function(x){return new Date(x.permitValidUntil)>=now&&(new Date(x.permitValidUntil)-now)/(1000*60*60*24)>14}).length;
        return [{n:p.permits.length,l:"Is viso",c:C.tx},{n:wp.length,l:"Turi leidima",c:C.ac},{n:ok,l:"Galioja",c:C.gn},{n:soon,l:"Baigiasi",c:C.yl},{n:exp,l:"Pasibaige",c:C.rd}]
          .map(function(item){return <div key={item.l} style={{padding:"8px 12px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1,flex:"1 1 80px",minWidth:80}}>
            <div style={{fontSize:18,fontWeight:800,color:item.c,fontFamily:F}}>{item.n}</div>
            <div style={{fontSize:9,color:C.t2,fontFamily:F}}>{item.l}</div>

      })()}
    </div>}
  </div>
}

// USER MANAGEMENT
// ═════════════════════════════════════════════════════════════
function UserMgmt(p){
  var _ar=useState(null);var assignId=_ar[0],sAR=_ar[1];
  var _arole=useState("");var aRole=_arole[0],sARole=_arole[1];
  var _add=useState(false);var showAdd=_add[0],sAdd=_add[1];
  var _mailBusy=useState(false);var mailBusy=_mailBusy[0],sMailBusy=_mailBusy[1];
  var _mailRes=useState(null);var mailRes=_mailRes[0],sMailRes=_mailRes[1];
  var _dbgRes=useState(null);var dbgRes=_dbgRes[0],sDbgRes=_dbgRes[1];
  var _dbgBusy=useState(false);var dbgBusy=_dbgBusy[0],sDbgBusy=_dbgBusy[1];
  var _smtpRes=useState(null);var smtpRes=_smtpRes[0],sSmtpRes=_smtpRes[1];
  var _smtpBusy=useState(false);var smtpBusy=_smtpBusy[0],sSmtpBusy=_smtpBusy[1];
  function checkMail(){
    sMailBusy(true);sMailRes(null);
    fetch("/api/admin/check-mail",{method:"POST"})
      .then(function(r){return r.json()})
      .then(function(d){sMailRes(d);sMailBusy(false)})
      .catch(function(e){sMailRes({error:e.message});sMailBusy(false)});
  }
  function debugMail(){
    sDbgBusy(true);sDbgRes(null);
    fetch("/api/admin/check-mail-debug")
      .then(function(r){return r.json()})
      .then(function(d){sDbgRes(d);sDbgBusy(false)})
      .catch(function(e){sDbgRes({error:e.message});sDbgBusy(false)});
  }
  function testSmtp(){
    sSmtpBusy(true);sSmtpRes(null);
    fetch("/api/admin/smtp-test")
      .then(function(r){return r.json()})
      .then(function(d){sSmtpRes(d);sSmtpBusy(false)})
      .catch(function(e){sSmtpRes({ok:false,error:e.message});sSmtpBusy(false)});
  }
  var _nn=useState("");var nn=_nn[0],sNN=_nn[1];
  var _nu=useState("");var nu=_nu[0],sNU=_nu[1];
  var _ne=useState("");var ne=_ne[0],sNE=_ne[1];
  var _nph=useState("");var nph=_nph[0],sNPH=_nph[1];
  var _np=useState("");var np=_np[0],sNP=_np[1];
  var _nr=useState("");var nr=_nr[0],sNR=_nr[1];
  var _del=useState(null);var delId=_del[0],sDel=_del[1];
  var _editId=useState(null);var editId=_editId[0],sEditId=_editId[1];
  var _eName=useState("");var eName=_eName[0],sEName=_eName[1];
  var _ePhone=useState("");var ePhone=_ePhone[0],sEPhone=_ePhone[1];
  var _eEmail=useState("");var eEmail=_eEmail[0],sEEmail=_eEmail[1];

  function openUser(u){sAR(u.id);sARole(u.role==="pending"?"":u.role)}
  function closeUser(){sAR(null);sARole("")}
  function doAssign(){
    if(!assignId||!aRole)return;
    p.onAssignRole(assignId,aRole);
    closeUser();
  }
  function doAdd(){
    if(!nn||!nu||!np||np.length<4||!nr)return;
    p.onAddUser({id:uid(),name:nn,username:nu,email:ne,phone:nph,password:np,role:nr,mustChangePassword:false,adAuth:false,createdAt:new Date().toISOString()});
    sAdd(false);sNN("");sNU("");sNE("");sNPH("");sNP("");sNR("");
  }
  function openEdit(u){sEditId(u.id);sEName(u.name||"");sEPhone(u.phone||"");sEEmail(u.email||"");}
  function closeEdit(){sEditId(null);sEName("");sEPhone("");sEEmail("");}
  function doEdit(){
    if(!eName||!editId)return;
    p.onUpdateContact(editId,{name:eName,phone:ePhone,email:eEmail});
    closeEdit();
  }

  var pending=p.users.filter(function(u){return u.role==="pending"});
  var active=p.users.filter(function(u){return u.role!=="pending"});

  return <div>
    {pending.length>0&&<div style={{marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <h2 style={{fontSize:14,fontWeight:800,color:C.tx,fontFamily:F}}>Laukia roles priskyrimo</h2>
        <span style={{background:C.rdD,color:C.rd,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:10}}>{pending.length}</span>
      </div>
      {pending.map(function(u){return <div key={u.id} style={{padding:"10px 14px",background:C.s2,borderRadius:8,border:"1.5px solid "+C.yl+"44",display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
        <Av name={u.name} size={34}/>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600,color:C.tx,fontFamily:F}}>{u.name}</div>
          <div style={{fontSize:10,color:C.t3,fontFamily:F}}>{u.email||u.username}</div>
        </div>
        <Btn sm onClick={function(){openUser(u)}}>Priskirti role</Btn>
        <Btn v="danger" sm onClick={function(){sDel(u.id)}}>Istrinti</Btn>
      </div>})}
    </div>}

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <h2 style={{fontSize:14,fontWeight:800,color:C.tx,fontFamily:F}}>Aktyvus vartotojai</h2>
      <Btn sm onClick={function(){sAdd(true)}}>+ Sukurti vartotoja</Btn>
    </div>
    {active.map(function(u){return <div key={u.id} style={{padding:"10px 14px",background:C.s2,borderRadius:8,border:"1px solid "+C.b1,display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
      <Av name={u.name} size={34}/>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:600,color:C.tx,fontFamily:F}}>{u.name}</div>
        <div style={{fontSize:10,color:C.t3,fontFamily:F}}>{u.phone?u.phone+" · ":""}{u.email||u.username} · {ROLES[u.role]||u.role}</div>
      </div>
      <Btn sm onClick={function(){openEdit(u)}}>Redaguoti</Btn>
      <Btn sm onClick={function(){openUser(u)}}>Role</Btn>
      {u.role!=="admin"&&<Btn v="danger" sm onClick={function(){sDel(u.id)}}>Istrinti</Btn>}
    </div>})}

    <div style={{marginTop:28,padding:"16px 18px",background:C.s2,border:"1px solid "+C.b1,borderRadius:10}}>
      <div style={{fontSize:10,fontWeight:700,color:C.t3,marginBottom:12,fontFamily:F,textTransform:"uppercase",letterSpacing:1}}>Sistemos įrankiai</div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:8}}>
        <Btn sm onClick={testSmtp} disabled={smtpBusy}>
          {smtpBusy?"⏳ Jungiamasi...":"🔌 Testuoti SMTP"}
        </Btn>
        <Btn sm onClick={checkMail} disabled={mailBusy}>
          {mailBusy?"⏳ Tikrinama...":"📬 Tikrinti el. paštą dabar"}
        </Btn>
        <Btn sm onClick={debugMail} disabled={dbgBusy}>
          {dbgBusy?"⏳ Kraunama...":"🔍 Rodyti pašto turinį"}
        </Btn>
        {mailRes&&!mailRes.error&&<span style={{fontSize:11,color:mailRes.processed>0?C.gn:C.t2,fontFamily:F}}>
          {mailRes.processed>0
            ?"✅ Apdorota: "+mailRes.processed+" (iš "+mailRes.checked+")"
            :(mailRes.checked===0?"📭 Laiškų nerasta":"📨 Rasta "+mailRes.checked+", leidimai neatpažinti")}
        </span>}
        {mailRes&&mailRes.error&&<span style={{fontSize:11,color:C.rd,fontFamily:F}}>❌ {mailRes.error}</span>}
      </div>
      {smtpRes&&<div style={{marginTop:4,marginBottom:8,padding:"10px 12px",borderRadius:8,background:smtpRes.ok?C.gnD:C.rdD,border:"1px solid "+(smtpRes.ok?C.gn:C.rd)+"44",fontSize:11,fontFamily:FM}}>
        <div style={{fontWeight:700,color:smtpRes.ok?C.gn:C.rd,marginBottom:6}}>{smtpRes.ok?"✅ SMTP prisijungta":"❌ SMTP klaida"}</div>
        <div style={{display:"grid",gridTemplateColumns:"120px 1fr",gap:"3px 8px",color:C.tx}}>
          <span style={{color:C.t3}}>Serveris:</span><span>192.168.1.101:465 ({smtpRes.secure||"SSL/TLS"})</span>
          <span style={{color:C.t3}}>Vartotojas:</span><span>{smtpRes.user||"uzklausos@energolt.eu"}</span>
          <span style={{color:C.t3}}>Slaptažodis:</span><span>{smtpRes.passSet?"✓ nustatytas":"⚠️ nenustatytas"}</span>
          <span style={{color:C.t3}}>Laikas:</span><span>{smtpRes.time?new Date(smtpRes.time).toLocaleString("lt-LT"):"-"}</span>
          {smtpRes.result&&<><span style={{color:C.t3}}>Rezultatas:</span><span style={{color:C.gn}}>{smtpRes.result}</span></>}
          {smtpRes.error&&<><span style={{color:C.t3}}>Klaida:</span><span style={{color:C.rd,wordBreak:"break-all"}}>{smtpRes.error}</span></>}
          {smtpRes.code&&<><span style={{color:C.t3}}>Kodas:</span><span>{smtpRes.code}</span></>}
          {smtpRes.command&&<><span style={{color:C.t3}}>Komanda:</span><span>{smtpRes.command}</span></>}
        </div>
      </div>}
      {dbgRes&&<div style={{marginTop:8,fontSize:11,fontFamily:FM}}>
        {dbgRes.error

            <div style={{color:C.t2,marginBottom:6}}>
              {dbgRes.connected?"✅ Prisijungta":"❌ Neprisijungta"} · Rasta laiškų (30 d.): <strong>{dbgRes.found}</strong>
            </div>
            {(dbgRes.emails||[]).map(function(m,i){
              return <div key={i} style={{padding:"6px 8px",background:C.bg,borderRadius:6,border:"1px solid "+C.b1,marginBottom:4}}>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>

// PROFILE PAGE — kontaktai + slaptažodžio keitimas

function ProfilePage(p){
  var _name=useState(p.user.name||"");var name=_name[0],sName=_name[1];
  var _phone=useState(p.user.phone||"");var phone=_phone[0],sPhone=_phone[1];
  var _email=useState(p.user.email||"");var email=_email[0],sEmail=_email[1];
  var _cErr=useState("");var cErr=_cErr[0],sCErr=_cErr[1];
  var _cOk=useState(false);var cOk=_cOk[0],sCOk=_cOk[1];
  var _cBusy=useState(false);var cBusy=_cBusy[0],sCBusy=_cBusy[1];
  var _old=useState("");var old=_old[0],sOld=_old[1];
  var _nw=useState("");var nw=_nw[0],sNw=_nw[1];
  var _conf=useState("");var conf=_conf[0],sConf=_conf[1];
  var _pErr=useState("");var pErr=_pErr[0],sPErr=_pErr[1];
  var _pOk=useState(false);var pOk=_pOk[0],sPOk=_pOk[1];
  function doSave(){
    if(!name.trim()){sCErr("Vardas yra privalomas.");return}
    sCErr("");sCBusy(true);sCOk(false);
    fetch('/api/users/'+p.user.id+'/contact',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name.trim(),phone:phone.trim(),email:email.trim()})})
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})})
      .then(function(res){sCBusy(false);if(!res.ok){sCErr(res.d.error||"Klaida.");return}sCOk(true);if(p.onUpdated)p.onUpdated(res.d.user);})
      .catch(function(){sCBusy(false);sCErr("Serverio klaida.");});
  }
  function doChangePwd(){
    if(nw!==conf){sPErr("Slaptazodziai nesutampa.");return}
    if(nw.length<4){sPErr("Slaptazodis per trumpas.");return}
    sPErr("");
    fetch('/api/auth/change-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:p.user.id,oldPassword:old,newPassword:nw,forceChange:false})})
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})})
      .then(function(res){if(!res.ok){sPErr(res.d.error||"Klaida.");return}sPOk(true);sOld("");sNw("");sConf("");if(p.onChanged)p.onChanged(Object.assign({},p.user,{mustChangePassword:false}));})
      .catch(function(){sPErr("Serverio klaida.");});
  }
  var secStyle={background:C.s2,borderRadius:12,border:"1px solid "+C.b1,padding:16,marginBottom:14};
  var secHdr={fontSize:11,fontWeight:700,color:C.t2,marginBottom:12,fontFamily:F,textTransform:"uppercase",letterSpacing:1};

      <div style={secHdr}>Kontaktine informacija</div>
      <Inp label="Vardas Pavarde" value={name} onChange={sName} req ph="Vardas Pavardė"/>
      <Inp label="El. pastas" type="email" value={email} onChange={sEmail} ph="vardas@imone.lt"/>
      <Inp label="Tel. nr." value={phone} onChange={sPhone} ph="+370 600 00000"/>
      {cErr&&<div style={{color:C.rd,fontSize:11,marginBottom:8,fontFamily:F}}>{cErr}</div>}
      {cOk&&<div style={{color:C.gn,fontSize:11,marginBottom:8,fontFamily:F}}>Issaugota sekmingai.</div>}
      <div style={{display:"flex",justifyContent:"flex-end"}}>
        <Btn onClick={doSave} disabled={cBusy||!name.trim()} sm>Issaugoti</Btn>
      </div>
    </div>
    <div style={secStyle}>
      <div style={secHdr}>Slaptazodzio keitimas</div>
      <Inp label="Dabartinis slaptazodis" type="password" value={old} onChange={sOld} req ph="......"/>
      <Inp label="Naujas slaptazodis" type="password" value={nw} onChange={sNw} req ph="Min. 4 simboliai"/>
      <Inp label="Pakartoti nauja slaptazodi" type="password" value={conf} onChange={sConf} req ph="......"/>
      {pErr&&<div style={{color:C.rd,fontSize:11,marginBottom:8,fontFamily:F}}>{pErr}</div>}
      {pOk&&<div style={{color:C.gn,fontSize:11,marginBottom:8,fontFamily:F}}>Slaptazodis sekmingai pakeistas.</div>}
      <div style={{display:"flex",justifyContent:"flex-end"}}>
        <Btn onClick={doChangePwd} disabled={!nw||!conf} sm>Pakeisti</Btn>
      </div>
    </div>
  </div>
}

// AUTH SCREEN  (analogiškas Geopoint: AD + Vietinis skirtukai)

function AuthScreen(p){
  var _tab=useState("ad");var tab=_tab[0],sTab=_tab[1];
  var _lu=useState("");var lu=_lu[0],sLU=_lu[1];
  var _lp=useState("");var lp=_lp[0],sLP=_lp[1];
  var _un=useState("");var un=_un[0],sUN=_un[1];
  var _ap=useState("");var ap=_ap[0],sAP=_ap[1];
  var _err=useState("");var err=_err[0],sErr=_err[1];

  function loginAD(){
    sErr("");

    sLd(true);
    fetch("/api/auth/ldap",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:un,password:ap})})

      .then(function(res){
        sLd(false);

  function loginLocal(){
    sErr("");

      .then(function(r){return r.json().then(function(d){return{ok:r.ok,d:d}})})
      .then(function(res){
        sLd(false);
        if(!res.ok){sErr(res.d.error||"Neteisingas vartotojo vardas arba slaptazodis.");return}

    <div style={{width:"100%",maxWidth:380,textAlign:"center"}}>
      <div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#F97316,#EAB308)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,margin:"0 auto 14px",boxShadow:"0 8px 28px rgba(249,115,22,.3)"}}>🚧</div>
      <h1 style={{fontSize:22,fontWeight:800,color:C.tx,fontFamily:F,marginBottom:2}}>Kasimo leidimai</h1>
      <p style={{color:C.t2,fontSize:11,fontFamily:F,marginBottom:6}}>Zemes darbu leidimo sistema</p>
      <div style={{color:C.t3,fontSize:10,fontFamily:FM,marginBottom:20}}>v1.2.50</div>
      <div style={{background:C.s1,border:"1px solid "+C.b1,borderRadius:12,overflow:"hidden",textAlign:"left"}}>
        <div style={{display:"flex",borderBottom:"1px solid "+C.b1,background:C.s2}}>
          <button style={tabSt("ad")} onClick={function(){sTab("ad");sErr("")}}>Active Directory</button>
          <button style={tabSt("local")} onClick={function(){sTab("local");sErr("")}}>Vietinis</button>
        </div>
        <div style={{padding:20}}>
          {tab==="ad"&&<div>
            <div style={{fontSize:11,color:C.t2,fontFamily:F,marginBottom:14}}>Prisijunkite naudodami <strong>hata.local</strong> paskyrą.</div>
            <Inp label="Vartotojo vardas" value={un} onChange={sUN} ph="vardas.pavardenis"/>
